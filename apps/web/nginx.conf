worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/wasm;

    server_tokens off;

    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # HSTS - enforce HTTPS for 1 year (only effective when served over HTTPS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Content Security Policy - restrict script/style sources
        #
        # Justified relaxations (audited; do not remove without re-evaluation):
        #   'unsafe-eval'        - libsodium-wrappers-sumo falls back to asm.js init
        #                          (eval-based) when WebAssembly is unavailable.
        #   'wasm-unsafe-eval'   - allow the libsodium WebAssembly module to compile.
        #   'unsafe-inline' (style-src) - inline styles emitted by third-party widgets
        #                          (e.g. Leaflet/OSM controls) and Vite-generated
        #                          critical-path style attributes. We have no nonce
        #                          plumbing for runtime-rendered styles yet.
        #
        # Hardening directives (H6):
        #   frame-ancestors 'none'        - Mosaic is never meant to be framed.
        #   object-src 'none'             - explicit block of <embed>/<object>/<applet>.
        #   base-uri 'self'               - prevent <base> hijacking via injected markup.
        #   form-action 'self'            - bound form submission targets to same origin.
        #   upgrade-insecure-requests     - block sub-resource downgrade to http://.
        #
        # img-src includes OpenStreetMap tile servers for the map view.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https://*.tile.openstreetmap.org; connect-src 'self'; worker-src 'self' blob:; font-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

        # Required headers for SharedArrayBuffer (crypto operations)
        # Using 'credentialless' to allow cross-origin resources like OpenStreetMap tiles
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;

        # Restrict browser features
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Re-add ALL security headers (add_header in location block overrides parent)
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https://*.tile.openstreetmap.org; connect-src 'self'; worker-src 'self' blob:; font-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
            add_header Cross-Origin-Opener-Policy "same-origin" always;
            add_header Cross-Origin-Embedder-Policy "credentialless" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
        }

        # SPA fallback - serve index.html for all routes
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to backend
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Clear client-supplied Remote-User header to prevent spoofing.
            # Only the trusted reverse proxy (e.g., Authelia) should set this header.
            proxy_set_header Remote-User "";
            
            # Tus upload support - disable buffering for large uploads
            proxy_request_buffering off;
            proxy_buffering off;
            client_max_body_size 10m;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
