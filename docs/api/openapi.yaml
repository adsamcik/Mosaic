openapi: 3.1.0
info:
  title: Mosaic API
  version: 1.0.0
  description: |
    Zero-knowledge encrypted photo gallery API.
    
    The server never sees plaintext photos or metadata—all encryption/decryption 
    happens client-side. The server stores encrypted blobs and facilitates 
    synchronization between clients.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /api
    description: API base path (behind reverse proxy)

security:
  - RemoteUser: []

tags:
  - name: Auth
    description: LocalAuth challenge-response and session management
  - name: Health
    description: Service health endpoints
  - name: Users
    description: User management
  - name: Albums
    description: Album CRUD and synchronization
  - name: Members
    description: Album membership management
  - name: Epoch Keys
    description: Epoch key distribution
  - name: Manifests
    description: Photo manifest operations
  - name: Shards
    description: Encrypted blob storage
  - name: Uploads
    description: |
      Tus 1.0.0 resumable upload endpoint for encrypted shard bytes.
      See https://tus.io/protocols/resumable-upload.
  - name: Share Links
    description: Shareable album links (authenticated)
  - name: Anonymous Access
    description: Anonymous access via share links (no auth required)
  - name: Admin
    description: Administrative endpoints (requires admin privileges)

paths:
  # ===========================================================================
  # Health
  # ===========================================================================
  /health:
    get:
      operationId: getHealth
      summary: Check service health
      tags: [Health]
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'


  # ===========================================================================
  # Auth (LocalAuth)
  # ===========================================================================
  /auth/config:
    get:
      operationId: getAuthConfig
      summary: Get authentication configuration
      description: Returns which authentication modes are enabled so clients can choose LocalAuth or trusted-proxy flows.
      tags: [Auth]
      security: []
      responses:
        '200':
          description: Authentication mode flags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfigResponse'

  /auth/init:
    post:
      operationId: initAuth
      summary: Start LocalAuth challenge
      description: Issues an Ed25519 challenge and returns either the real user salt or a deterministic fake salt to avoid account enumeration.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthInitRequest'
      responses:
        '200':
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthInitResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/verify:
    post:
      operationId: verifyAuth
      summary: Verify LocalAuth challenge
      description: Verifies the Ed25519 signature over the challenge and creates a scoped HttpOnly session cookie on success.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
      responses:
        '200':
          description: Authentication succeeded; session cookie is set.
          headers:
            Set-Cookie:
              description: mosaic_session HttpOnly cookie scoped to Path=/api.
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthVerifyResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/register:
    post:
      operationId: registerAuthUser
      summary: Register LocalAuth user
      description: Creates a LocalAuth user with public identity/auth keys and client-wrapped account secrets; after bootstrap this requires an admin session.
      tags: [Auth]
      security:
        - cookieAuth: []
        - RemoteUser: []
        - {}
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Recommended for retry-safe registration requests.
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRegisterResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /auth/logout:
    post:
      operationId: logout
      summary: Revoke current LocalAuth session
      description: Revokes the current session token if present and clears the mosaic_session cookie.
      tags: [Auth]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Logout result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/sessions:
    get:
      operationId: listAuthSessions
      summary: List active sessions
      description: Returns active LocalAuth sessions for the current user and marks the current session without exposing token material.
      tags: [Auth]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuthSession'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/sessions/{sessionId}:
    delete:
      operationId: revokeAuthSession
      summary: Revoke a session
      description: Revokes one active LocalAuth session belonging to the current user.
      tags: [Auth]
      security:
        - cookieAuth: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/sessions/revoke-others:
    post:
      operationId: revokeOtherAuthSessions
      summary: Revoke all other sessions
      description: Revokes every LocalAuth session for the current user except the token used for this request.
      tags: [Auth]
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Other sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeOtherSessionsResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===========================================================================
  # Users
  # ===========================================================================
  /users/me:
    get:
      operationId: getCurrentUser
      summary: Get current authenticated user
      tags: [Users]
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      operationId: updateCurrentUser
      summary: Update current user (e.g., identity pubkey)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'


  /users/me/wrapped-key:
    put:
      operationId: updateCurrentUserWrappedKey
      summary: Update current user's wrapped account key
      description: Stores a client-wrapped account key blob for identity persistence; the server never sees plaintext keys.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateWrappedKeyRequest' }
      responses:
        '200':
          description: Wrapped key updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/{userId}:
    get:
      operationId: getUser
      summary: Get a user's public info (for key exchange)
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User public info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/by-pubkey/{pubkey}:
    get:
      operationId: getUserByPubkey
      summary: Look up user by identity public key
      tags: [Users]
      parameters:
        - name: pubkey
          in: path
          required: true
          description: Base64-encoded Ed25519 public key
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # Albums
  # ===========================================================================
  /albums:
    get:
      operationId: listAlbums
      summary: List albums the user has access to
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/PageSkip'
        - $ref: '#/components/parameters/PageTake'
      responses:
        '200':
          description: List of albums
          headers:
            X-Pagination-Skip:
              $ref: '#/components/headers/PaginationSkip'
            X-Pagination-Take:
              $ref: '#/components/headers/PaginationTake'
            X-Pagination-Total-Count:
              $ref: '#/components/headers/PaginationTotalCount'
            X-Pagination-Has-More:
              $ref: '#/components/headers/PaginationHasMore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAlbums'

    post:
      operationId: createAlbum
      summary: Create a new album
      tags: [Albums]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlbumRequest'
      responses:
        '201':
          description: Album created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Album'
        '400':
          $ref: '#/components/responses/BadRequest'

  /albums/{albumId}:
    get:
      operationId: getAlbum
      summary: Get album details
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      responses:
        '200':
          description: Album details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Album'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteAlbum
      summary: Delete an album (owner only)
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      responses:
        '204':
          description: Album deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /albums/{albumId}/sync:
    get:
      operationId: syncAlbum
      summary: Get album changes since a version
      description: |
        Returns manifests created after the specified version.
        Used for incremental synchronization.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - name: since
          in: query
          required: true
          description: Version to sync from (exclusive)
          schema:
            type: integer
            format: int64
            minimum: 0
        - name: limit
          in: query
          description: Maximum number of manifests to return
          schema:
            type: integer
            default: 100
            maximum: 500
      responses:
        '200':
          description: Sync response with manifests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'


  /albums/{albumId}/expiration:
    patch:
      operationId: updateAlbumExpiration
      summary: Update album expiration
      description: Updates encrypted album lifecycle metadata; no plaintext album data crosses the server boundary.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateExpirationRequest' }
      responses:
        '200':
          description: Album expiration updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlbumExpirationResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { description: Album expired }

  /albums/{albumId}/photos/{photoId}/expiration:
    patch:
      operationId: updateAlbumPhotoExpiration
      summary: Update photo expiration via album route
      description: Updates lifecycle metadata for an encrypted photo manifest within an album.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - name: photoId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateManifestExpirationRequest' }
      responses:
        '200':
          description: Photo expiration updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManifestExpirationResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { description: Album or photo expired }

  /albums/{albumId}/photos:
    get:
      operationId: listAlbumPhotos
      summary: List album photos
      description: Returns non-deleted, non-expired encrypted photo manifests for an authenticated album member.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - $ref: '#/components/parameters/PageSkip'
        - $ref: '#/components/parameters/PageTake'
      responses:
        '200':
          description: Paged photo manifests
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PagedPhotos' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { description: Album expired }

  /shared/{albumId}/photos:
    get:
      operationId: listSharedAlbumPhotos
      summary: List shared album photos
      description: Alias for listing encrypted photo manifests from albums shared with the current authenticated user.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - $ref: '#/components/parameters/PageSkip'
        - $ref: '#/components/parameters/PageTake'
      responses:
        '200':
          description: Paged photo manifests
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PagedPhotos' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { description: Album expired }

  /albums/{albumId}/name:
    patch:
      operationId: renameAlbum
      summary: Update encrypted album name
      description: Replaces the client-encrypted album name blob; the server never decrypts it.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RenameAlbumRequest' }
      responses:
        '200':
          description: Album name updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RenameAlbumResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /albums/{albumId}/description:
    patch:
      operationId: updateAlbumDescription
      summary: Update encrypted album description
      description: Replaces or clears the client-encrypted album description blob; the server never decrypts it.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDescriptionRequest' }
      responses:
        '200':
          description: Album description updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateDescriptionResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /albums/{albumId}/content:
    get:
      operationId: getAlbumContent
      summary: Get encrypted album content document
      description: Returns the opaque encrypted album story/content document for members.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      responses:
        '200':
          description: Encrypted album content
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlbumContentResponse' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateAlbumContent
      summary: Update encrypted album content document
      description: Stores a new opaque encrypted album story/content document using optimistic concurrency.
      tags: [Albums]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAlbumContentRequest' }
      responses:
        '200':
          description: Encrypted album content updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlbumContentResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /albums/{albumId}/epoch-keys/{keyId}:
    get:
      operationId: getEpochKey
      summary: Get one epoch key bundle
      description: Returns a single encrypted epoch key bundle for its recipient.
      tags: [Epoch Keys]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - name: keyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Epoch key record
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EpochKeyRecord' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===========================================================================
  # Members
  # ===========================================================================
  /albums/{albumId}/members:
    get:
      operationId: listAlbumMembers
      summary: List album members
      tags: [Members]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - $ref: '#/components/parameters/PageSkip'
        - $ref: '#/components/parameters/PageTake'
      responses:
        '200':
          description: List of members
          headers:
            X-Pagination-Skip:
              $ref: '#/components/headers/PaginationSkip'
            X-Pagination-Take:
              $ref: '#/components/headers/PaginationTake'
            X-Pagination-Total-Count:
              $ref: '#/components/headers/PaginationTotalCount'
            X-Pagination-Has-More:
              $ref: '#/components/headers/PaginationHasMore'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAlbumMembers'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      operationId: inviteToAlbum
      summary: Invite a user to the album
      description: |
        Creates membership and distributes epoch keys to the new member.
        The epoch keys array must contain sealed bundles for all current epochs.
      tags: [Members]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteRequest'
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlbumMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /albums/{albumId}/members/{userId}:
    delete:
      operationId: removeAlbumMember
      summary: Remove a member from the album
      description: |
        Revokes membership. A new epoch should be created after removal
        to ensure post-compromise security — removed members cannot decrypt content
        uploaded under epochs they were not a part of.
      tags: [Members]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Member removed
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # Epoch Keys
  # ===========================================================================
  /albums/{albumId}/epoch-keys:
    get:
      operationId: getEpochKeys
      summary: Get epoch keys for current user
      description: Returns all epoch key bundles encrypted for the current user.
      tags: [Epoch Keys]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      responses:
        '200':
          description: List of epoch key records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EpochKeyRecord'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      operationId: createEpochKey
      summary: Create a new epoch key record
      description: |
        Used when rotating keys or sharing with new members.
        The encrypted bundle is sealed to the recipient.
      tags: [Epoch Keys]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEpochKeyRequest'
      responses:
        '201':
          description: Epoch key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpochKeyRecord'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /albums/{albumId}/epochs/{epochId}/rotate:
    post:
      operationId: rotateEpoch
      summary: Create a new epoch (key rotation)
      description: |
        Creates a new epoch with fresh keys. Used after member removal.
        Must include epoch keys for all current members.
      tags: [Epoch Keys]
      parameters:
        - $ref: '#/components/parameters/AlbumId'
        - name: epochId
          in: path
          required: true
          description: New epoch ID (must be greater than current)
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateEpochRequest'
      responses:
        '201':
          description: Epoch created
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ===========================================================================
  # Manifests
  # ===========================================================================
  /manifests:
    post:
      operationId: createManifest
      summary: Create a photo manifest
      description: |
        Links uploaded shards to a signed manifest.
        Shards must be in PENDING status and owned by the user.
        This operation is atomic.
      tags: [Manifests]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManifestRequest'
      responses:
        '201':
          description: Manifest created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /manifests/{manifestId}:
    get:
      operationId: getManifest
      summary: Get manifest details
      tags: [Manifests]
      parameters:
        - name: manifestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Manifest details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManifestRecord'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteManifest
      summary: Soft-delete a manifest
      description: Marks manifest as deleted. Shards will be garbage collected.
      tags: [Manifests]
      parameters:
        - name: manifestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Manifest deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'


  /manifests/{manifestId}/finalize:
    post:
      operationId: finalizeManifest
      summary: Finalize a client-addressed manifest
      description: Atomically binds uploaded encrypted shards to a signed manifest using a client-selected manifest id.
      tags: [Manifests]
      parameters:
        - name: manifestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateManifestRequest' }
      responses:
        '201':
          description: Manifest finalized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ManifestCreated' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '410': { description: Album expired }

  /manifests/{manifestId}/metadata:
