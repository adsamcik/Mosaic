        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '410': { description: Manifest expired }
        '412': { description: If-Match precondition failed }

  /manifests/{manifestId}/expiration:
    patch:
      operationId: updateManifestExpiration
      summary: Update manifest expiration
      description: Updates lifecycle metadata for an encrypted photo manifest.
      tags: [Manifests]
      parameters:
        - name: manifestId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: If-Match
          in: header
          required: false
