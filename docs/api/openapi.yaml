        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # Admin - Statistics
  # ===========================================================================
  /admin/stats:
    get:
      operationId: adminGetStats
      summary: Get system-wide usage statistics
      tags: [Admin]
      responses:
        '200':
          description: System statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStats'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  # ===========================================================================
  # Security Schemes
  # ===========================================================================
  securitySchemes:
    RemoteUser:
      type: apiKey
      in: header
      name: Remote-User
      description: |
        User identity from trusted reverse proxy.
        Only accepted from configured trusted IP ranges.
    cookieAuth:
      type: apiKey
      in: cookie
      name: mosaic_session
      description: |
        LocalAuth session cookie. The backend sets this cookie as HttpOnly with Path=/api,
        SameSite=Lax for development/testing HTTP, and Secure + SameSite=Strict in production.

  # ===========================================================================
  # Parameters
  # ===========================================================================
  parameters:
    AlbumId:
      name: albumId
      in: path
      required: true
      description: Album UUID
      schema:
        type: string
        format: uuid

    UserId:
      name: userId
      in: path
      required: true
      description: User UUID
      schema:
        type: string
        format: uuid

    PageSkip:
      name: skip
      in: query
      required: false
      description: Number of rows to skip before returning a page.
      schema:
        type: integer
        minimum: 0
        default: 0

    PageTake:
      name: take
      in: query
      required: false
      description: Page size. Values are clamped to the backend maximum of 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    TusResumableHeader:
      name: Tus-Resumable
      in: header
      required: true
      description: Tus protocol version. Mosaic supports Tus 1.0.0.
      schema:
        type: string
        enum: ["1.0.0"]

    TusFileId:
      name: fileId
      in: path
      required: true
      description: Tus upload resource identifier.
      schema:
        type: string

  headers:
    PaginationSkip:
      description: Normalized skip value applied by the backend.
      schema:
        type: integer
    PaginationTake:
      description: Normalized take value applied by the backend.
      schema:
        type: integer
    PaginationTotalCount:
      description: Total rows available for the query before paging.
      schema:
        type: integer
    PaginationHasMore:
      description: Whether another page exists after this response.
      schema:
        type: boolean

  # ===========================================================================
  # Responses
  # ===========================================================================
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Unauthorized:
      description: Authentication required
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Forbidden:
      description: Insufficient permissions
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Conflict:
      description: Resource conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds to wait before retrying.
          schema:
            type: integer
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  # ===========================================================================
  # Schemas
  # ===========================================================================
  schemas:
    # -------------------------------------------------------------------------
    # Common
    # -------------------------------------------------------------------------
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: true
          description: Additional error context

    ProblemDetails:
      type: object
      description: RFC 7807 problem details error response.
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        correlationId:
          type: string
          description: Request correlation identifier when available.
      additionalProperties: true

    PagedResult:
      type: object
      required: [items, nextSkip]
      properties:
        items:
          type: array
          items: {}
        nextSkip:
          type: integer
          nullable: true
          description: Skip value for the next page, or null when no further page is available.

    PagedAlbums:
      allOf:
        - $ref: '#/components/schemas/PagedResult'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Album'

    PagedAlbumMembers:
      allOf:
        - $ref: '#/components/schemas/PagedResult'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AlbumMember'

    PagedShareLinks:
      allOf:
        - $ref: '#/components/schemas/PagedResult'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ShareLinkResponse'

    PagedShareLinksWithSecrets:
      allOf:
        - $ref: '#/components/schemas/PagedResult'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ShareLinkWithSecretResponse'

    PagedShareLinkPhotos:
      allOf:
        - $ref: '#/components/schemas/PagedResult'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ShareLinkPhotoResponse'

    PagedAdminUsers:
      allOf:
        - $ref: '#/components/schemas/PagedResult'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/UserWithQuota'

    PagedAdminAlbums:
      allOf:
        - $ref: '#/components/schemas/PagedResult'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AlbumWithLimits'


    AuthConfigResponse:
      type: object
      required: [localAuthEnabled, proxyAuthEnabled]
      properties:
        localAuthEnabled: { type: boolean }
        proxyAuthEnabled: { type: boolean }

    AuthInitRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
          maxLength: 256

    AuthInitResponse:
      type: object
      required: [challengeId, challenge, userSalt, timestamp]
      properties:
        challengeId: { type: string, format: uuid }
        challenge:
          type: string
          description: Base64-encoded 32-byte challenge.
        userSalt:
          type: string
          description: Base64-encoded real or fake user salt.
        timestamp:
          type: integer
          format: int64

    AuthVerifyRequest:
      type: object
      required: [username, challengeId, signature]
      properties:
        username: { type: string, maxLength: 256 }
        challengeId: { type: string, format: uuid }
        signature:
          type: string
          maxLength: 256
          description: Base64-encoded Ed25519 signature.
        timestamp:
          type: integer
          format: int64
          nullable: true

    AuthVerifyResponse:
      type: object
      required: [success, userId]
      properties:
        success: { type: boolean }
        userId: { type: string, format: uuid }
        accountSalt: { type: string, nullable: true }
        wrappedAccountKey: { type: string, nullable: true }
        wrappedIdentitySeed: { type: string, nullable: true }
        identityPubkey: { type: string, nullable: true }

    AuthRegisterRequest:
      type: object
      required: [username, authPubkey, identityPubkey, userSalt, accountSalt]
      properties:
        username: { type: string, maxLength: 256 }
        authPubkey: { type: string, maxLength: 128 }
        identityPubkey: { type: string, maxLength: 128 }
        userSalt: { type: string, maxLength: 128 }
        accountSalt: { type: string, maxLength: 128 }
        wrappedAccountKey: { type: string, maxLength: 2048, nullable: true }
        wrappedIdentitySeed: { type: string, maxLength: 2048, nullable: true }

    AuthRegisterResponse:
      type: object
      required: [id, username, isAdmin]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        isAdmin: { type: boolean }

    AuthSession:
      type: object
      required: [id, createdAt, lastSeenAt, isCurrent]
      properties:
        id: { type: string, format: uuid }
        deviceName: { type: string, nullable: true }
        ipAddress: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time }
        isCurrent: { type: boolean }

    MessageResponse:
      type: object
      required: [message]
      properties:
        message: { type: string }

    RevokeOtherSessionsResponse:
      type: object
      required: [revokedCount]
      properties:
        revokedCount: { type: integer, minimum: 0 }

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          description: API version
        checks:
          type: object
          additionalProperties:
            type: string
            enum: [ok, warn, fail]
          description: Individual health check results

    # -------------------------------------------------------------------------
    # Users
    # -------------------------------------------------------------------------
    User:
      type: object
      required:
        - id
        - authSub
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        authSub:
          type: string
          description: Authentication subject from Remote-User header
        identityPubkey:
          type: string
          description: Base64-encoded Ed25519 public key
        createdAt:
          type: string
          format: date-time

    UserPublic:
      type: object
      required:
        - id
        - identityPubkey
      properties:
        id:
          type: string
          format: uuid
        identityPubkey:
          type: string
          description: Base64-encoded Ed25519 public key

    UpdateUserRequest:
      type: object
      properties:
        identityPubkey:
          type: string
          description: Base64-encoded Ed25519 public key

    # -------------------------------------------------------------------------
    # Albums
    # -------------------------------------------------------------------------
    Album:
      type: object
      required:
        - id
        - ownerId
        - currentVersion
        - currentEpochId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        currentVersion:
          type: integer
          format: int64
          description: Monotonically increasing version for sync
        currentEpochId:
          type: integer
          description: Current epoch for new uploads
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        encryptedName:
          type: string
          nullable: true
          description: Base64-encoded encrypted album name (client-side encrypted with epoch read key)

    CreateAlbumRequest:
      type: object
      required:
        - initialEpochKey
      properties:
        initialEpochKey:
          $ref: '#/components/schemas/CreateEpochKeyRequest'
          description: Epoch key bundle for the owner
        encryptedName:
          type: string
          description: Base64-encoded encrypted album name (optional)


    UpdateExpirationRequest:
      type: object
      properties:
        expiresAt: { type: string, format: date-time, nullable: true }
        expirationWarningDays: { type: integer, minimum: 0, nullable: true }

    AlbumExpirationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time, nullable: true }
        expirationWarningDays: { type: integer, nullable: true }
        updatedAt: { type: string, format: date-time }

    RenameAlbumRequest:
      type: object
      required: [encryptedName]
      properties:
        encryptedName: { type: string, description: Base64 encrypted album name }

    RenameAlbumResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        encryptedName: { type: string }
        updatedAt: { type: string, format: date-time }

    UpdateDescriptionRequest:
      type: object
      properties:
        encryptedDescription: { type: string, nullable: true }

    UpdateDescriptionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        encryptedDescription: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }

    PagedPhotos:
      allOf:
        - $ref: '#/components/schemas/PagedResult'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/PhotoResponse'

    PhotoResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        versionCreated: { type: integer, format: int64 }
        isDeleted: { type: boolean }
        encryptedMeta: { type: string }
        signature: { type: string }
        signerPubkey: { type: string }
        shardIds:
          type: array
          items: { type: string }
        tieredShards:
          type: array
          items: { $ref: '#/components/schemas/ManifestShardProjection' }

    AlbumContentResponse:
      type: object
      properties:
        encryptedContent: { type: string }
        nonce: { type: string }
        epochId: { type: integer }
        version: { type: integer }
        updatedAt: { type: string, format: date-time }

    UpdateAlbumContentRequest:
      type: object
      required: [encryptedContent, nonce, epochId, expectedVersion]
      properties:
        encryptedContent: { type: string }
        nonce: { type: string }
        epochId: { type: integer }
        expectedVersion: { type: integer }

    UpdateManifestMetadataRequest:
      type: object
      required: [encryptedMeta, signature, signerPubkey]
      properties:
        encryptedMeta: { type: string }
        signature: { type: string }
        signerPubkey: { type: string }

    ManifestMetadataUpdated:
      type: object
      properties:
        id: { type: string, format: uuid }
        versionCreated: { type: integer, format: int64 }

    UpdateManifestExpirationRequest:
      type: object
      properties:
        expiresAt: { type: string, format: date-time, nullable: true }

    ManifestExpirationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time, nullable: true }
        versionCreated: { type: integer, format: int64 }
        updatedAt: { type: string, format: date-time }

    ShardMetadata:
      type: object
      properties:
        id: { type: string, format: uuid }
        sizeBytes: { type: integer, format: int64 }
        status: { type: string }
        statusUpdatedAt: { type: string, format: date-time }
        sha256: { type: string }

    UpdateWrappedKeyRequest:
      type: object
      required: [wrappedAccountKey]
      properties:
        wrappedAccountKey: { type: string }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean }

    UpdateLinkExpirationRequest:
      type: object
      properties:
        expiresAt: { type: string, format: date-time, nullable: true }
        maxUses: { type: integer, minimum: 1, nullable: true }

    # -------------------------------------------------------------------------
    # Members
    # -------------------------------------------------------------------------
    AlbumMember:
      type: object
      required:
        - userId
        - role
        - joinedAt
      properties:
        userId:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, editor, viewer]
        invitedBy:
          type: string
          format: uuid
        joinedAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/UserPublic'
          description: Included user info for display

    InviteRequest:
      type: object
      required:
        - recipientId
        - role
        - epochKeys
      properties:
        recipientId:
          type: string
          format: uuid
          description: User to invite
        role:
          type: string
          enum: [editor, viewer]
        epochKeys:
          type: array
          items:
            $ref: '#/components/schemas/CreateEpochKeyRequest'
          description: Sealed epoch key bundles for all epochs

    # -------------------------------------------------------------------------
    # Epoch Keys
    # -------------------------------------------------------------------------
    EpochKeyRecord:
      type: object
      required:
        - id
        - albumId
        - epochId
        - encryptedKeyBundle
        - ownerSignature
        - sharerPubkey
        - signPubkey
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        albumId:
          type: string
          format: uuid
        epochId:
          type: integer
        encryptedKeyBundle:
          type: string
          format: byte
          description: Base64-encoded sealed box ciphertext
        ownerSignature:
          type: string
          format: byte
          description: Base64-encoded Ed25519 signature
        sharerPubkey:
          type: string
          format: byte
          description: Base64-encoded Ed25519 public key of sharer
        signPubkey:
          type: string
          format: byte
          description: Base64-encoded epoch signing public key
        createdAt:
          type: string
          format: date-time

    CreateEpochKeyRequest:
      type: object
      required:
        - recipientId
        - epochId
        - encryptedKeyBundle
        - ownerSignature
        - sharerPubkey
        - signPubkey
      properties:
        recipientId:
          type: string
          format: uuid
        epochId:
          type: integer
        encryptedKeyBundle:
          type: string
          format: byte
          description: Base64-encoded sealed box ciphertext
        ownerSignature:
          type: string
          format: byte
          description: Base64-encoded Ed25519 signature
        sharerPubkey:
          type: string
          format: byte
          description: Base64-encoded Ed25519 public key of sharer
        signPubkey:
          type: string
          format: byte
          description: Base64-encoded epoch signing public key

    RotateEpochRequest:
      type: object
      required:
        - epochKeys
      properties:
        epochKeys:
          type: array
          items:
            $ref: '#/components/schemas/CreateEpochKeyRequest'
          description: Epoch key bundles for all current members

    # -------------------------------------------------------------------------
    # Sync
    # -------------------------------------------------------------------------
    SyncResponse:
      type: object
      required:
        - manifests
        - albumVersion
        - hasMore
      properties:
        manifests:
          type: array
          items:
            $ref: '#/components/schemas/ManifestRecord'
        albumVersion:
          type: integer
          format: int64
          description: Current album version
        hasMore:
          type: boolean
          description: Whether more manifests are available

    # -------------------------------------------------------------------------
    # Manifests
    # -------------------------------------------------------------------------
    ManifestRecord:
      type: object
      required:
        - id
        - albumId
        - versionCreated
        - isDeleted
        - encryptedMeta
        - signature
        - signerPubkey
        - shardIds
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        albumId:
          type: string
          format: uuid
        versionCreated:
          type: integer
          format: int64
        isDeleted:
          type: boolean
        encryptedMeta:
          type: string
          format: byte
          description: Base64-encoded encrypted photo metadata
        signature:
          type: string
          description: Base64-encoded Ed25519 signature
        signerPubkey:
          type: string
          description: Base64-encoded epoch signing public key
        shardIds:
          type: array
          items:
            type: string
            format: uuid
          description: Ordered list of shard IDs
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateManifestRequest:
      type: object
      required:
        - albumId
        - encryptedMeta
        - signature
        - signerPubkey
        - shardIds
      properties:
        albumId:
          type: string
          format: uuid
        encryptedMeta:
          type: string
          format: byte
          description: Base64-encoded encrypted photo metadata
        signature:
          type: string
          description: Base64-encoded Ed25519 signature
        signerPubkey:
          type: string
          description: Base64-encoded epoch signing public key
        shardIds:
          type: array
          items:
            type: string
            format: uuid
          description: Ordered list of shard IDs to link

    ManifestCreated:
      type: object
      required:
        - id
        - version
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
          description: Album version after this manifest

    # -------------------------------------------------------------------------
    # Shards
    # -------------------------------------------------------------------------
    CreateShardRequest:
      type: object
      required:
        - sizeBytes
      properties:
        sizeBytes:
          type: integer
          format: int64
          minimum: 1
          maximum: 6291456
          description: Expected shard size in bytes (max 6MB)

    ShardCreated:
      type: object
      required:
        - id
        - uploadUrl
      properties:
        id:
          type: string
          format: uuid
        uploadUrl:
          type: string
          description: Tus upload endpoint URL

    # -------------------------------------------------------------------------
    # Share Links
    # -------------------------------------------------------------------------
    ShareLinkResponse:
      type: object
      required:
        - id
        - linkId
        - accessTier
        - useCount
        - isRevoked
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Internal share link ID
        linkId:
          type: string
          description: Base64-encoded public link ID (derived from secret)
        accessTier:
          type: integer
          enum: [1, 2, 3]
          description: Access tier (1=thumb, 2=preview, 3=full)
        expiresAt:
          type: string
          format: date-time
          description: Optional expiration timestamp
        maxUses:
          type: integer
          description: Optional maximum uses limit
        useCount:
          type: integer
          description: Current number of accesses
        isRevoked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ShareLinkWithSecretResponse:
      type: object
      required:
        - id
        - linkId
        - accessTier
        - isRevoked
      properties:
        id:
          type: string
          format: uuid
        linkId:
          type: string
        accessTier:
          type: integer
          enum: [1, 2, 3]
        isRevoked:
          type: boolean
        ownerEncryptedSecret:
          type: string
          format: byte
          description: Base64-encoded owner-encrypted link secret

    CreateShareLinkRequest:
      type: object
      required:
        - accessTier
        - linkId
        - wrappedKeys
      properties:
        accessTier:
          type: integer
          enum: [1, 2, 3]
          description: Maximum access tier to grant
        linkId:
          type: string
          format: byte
          description: Base64-encoded link ID (16 bytes)
        ownerEncryptedSecret:
          type: string
          format: byte
          description: Base64-encoded owner-encrypted link secret
        expiresAt:
          type: string
          format: date-time
        maxUses:
          type: integer
          minimum: 1
        wrappedKeys:
          type: array
          items:
            $ref: '#/components/schemas/WrappedKeyRequest'

    WrappedKeyRequest:
      type: object
      required:
        - epochId
        - tier
        - nonce
        - encryptedKey
      properties:
        epochId:
          type: integer
        tier:
          type: integer
          enum: [1, 2, 3]
        nonce:
          type: string
          format: byte
          description: Base64-encoded 24-byte nonce
        encryptedKey:
          type: string
          format: byte
          description: Base64-encoded encrypted tier key

    AddShareLinkEpochKeysRequest:
      type: object
      required:
        - epochKeys
      properties:
        epochKeys:
          type: array
          items:
            $ref: '#/components/schemas/ShareLinkEpochKeyRequest'

    ShareLinkEpochKeyRequest:
      type: object
      required:
        - epochId
        - tier
        - nonce
        - encryptedKey
      properties:
        epochId:
          type: integer
        tier:
          type: integer
          enum: [1, 2, 3]
        nonce:
          type: string
          format: byte
          description: Base64-encoded 24-byte nonce
        encryptedKey:
          type: string
          format: byte
          description: Base64-encoded encrypted tier key

    # -------------------------------------------------------------------------
    # Anonymous Access Responses
    # -------------------------------------------------------------------------
    LinkAccessResponse:
      type: object
      required:
        - albumId
        - accessTier
        - epochCount
      properties:
        albumId:
          type: string
          format: uuid
        accessTier:
          type: integer
          enum: [1, 2, 3]
        epochCount:
          type: integer
          description: Number of epochs with keys for this link

    LinkEpochKeyResponse:
      type: object
      required:
        - epochId
        - tier
        - nonce
        - encryptedKey
      properties:
        epochId:
          type: integer
        tier:
          type: integer
          enum: [1, 2, 3]
        nonce:
          type: string
          format: byte
          description: Base64-encoded 24-byte nonce
        encryptedKey:
          type: string
          format: byte
          description: Base64-encoded encrypted tier key
        signPubkey:
          type: string
          description: Base64-encoded epoch signing public key

    ShareLinkPhotoResponse:
      type: object
      required:
        - id
        - versionCreated
        - isDeleted
        - encryptedMeta
        - signature
        - signerPubkey
        - shardIds
      properties:
        id:
          type: string
          format: uuid
        versionCreated:
          type: integer
          format: int64
        isDeleted:
          type: boolean
        encryptedMeta:
          type: string
          format: byte
          description: Base64-encoded encrypted photo metadata
        signature:
          type: string
          description: Base64-encoded Ed25519 signature
        signerPubkey:
          type: string
          description: Base64-encoded epoch signing public key
        shardIds:
          type: array
          items:
            type: string
            format: uuid
    # -------------------------------------------------------------------------
    # Admin - Quota Settings
    # -------------------------------------------------------------------------
    QuotaDefaults:
      type: object
      required:
        - maxStorageBytesPerUser
        - maxAlbumsPerUser
        - maxPhotosPerAlbum
        - maxBytesPerAlbum
      properties:
        maxStorageBytesPerUser:
          type: integer
          format: int64
          description: Default max storage bytes per user (e.g., 10737418240 = 10GB)
        maxAlbumsPerUser:
          type: integer
          description: Default max albums a user can own
        maxPhotosPerAlbum:
          type: integer
          description: Default max photos per album
        maxBytesPerAlbum:
          type: integer
          format: int64
          description: Default max size per album in bytes

    UserWithQuota:
      type: object
      required:
        - id
        - authSub
        - isAdmin
        - createdAt
        - quota
      properties:
        id:
          type: string
          format: uuid
        authSub:
          type: string
        isAdmin:
          type: boolean
        createdAt:
          type: string
          format: date-time
        quota:
          $ref: '#/components/schemas/UserQuotaDetails'

    UserQuotaDetails:
      type: object
      required:
        - maxStorageBytes
        - usedStorageBytes
        - maxAlbums
        - currentAlbumCount
        - isCustom
      properties:
        maxStorageBytes:
          type: integer
          format: int64
        usedStorageBytes:
          type: integer
          format: int64
        maxAlbums:
          type: integer
        currentAlbumCount:
          type: integer
        isCustom:
          type: boolean
          description: True if user has custom limits (not using system defaults)

    UpdateUserQuotaRequest:
      type: object
      properties:
        maxStorageBytes:
          type: integer
          format: int64
          nullable: true
          description: Custom max storage (null = use system default)
        maxAlbums:
          type: integer
          nullable: true
          description: Custom max albums (null = use system default)

    AlbumWithLimits:
      type: object
      required:
        - id
        - ownerId
        - ownerAuthSub
        - createdAt
        - limits
      properties:
        id:
          type: string
          format: uuid
        ownerId:
          type: string
          format: uuid
        ownerAuthSub:
          type: string
        createdAt:
          type: string
          format: date-time
        limits:
          $ref: '#/components/schemas/AlbumLimitsDetails'

    AlbumLimitsDetails:
      type: object
      required:
        - maxPhotos
        - currentPhotoCount
        - maxSizeBytes
        - currentSizeBytes
        - isCustom
      properties:
        maxPhotos:
          type: integer
        currentPhotoCount:
          type: integer
        maxSizeBytes:
          type: integer
          format: int64
        currentSizeBytes:
          type: integer
          format: int64
        isCustom:
          type: boolean
          description: True if album has custom limits (not using system defaults)

    UpdateAlbumLimitsRequest:
      type: object
      properties:
        maxPhotos:
          type: integer
          nullable: true
          description: Custom max photos (null = use system default)
        maxSizeBytes:
          type: integer
          format: int64
          nullable: true
          description: Custom max size (null = use system default)

    SystemStats:
      type: object
      required:
        - totalUsers
        - totalAlbums
        - totalPhotos
        - totalStorageBytes
        - usersNearQuota
        - albumsNearLimit
      properties:
        totalUsers:
          type: integer
        totalAlbums:
          type: integer
        totalPhotos:
          type: integer
        totalStorageBytes:
          type: integer
          format: int64
        usersNearQuota:
          type: array
          items:
            $ref: '#/components/schemas/UserQuotaWarning'
        albumsNearLimit:
          type: array
          items:
            $ref: '#/components/schemas/AlbumLimitWarning'

    UserQuotaWarning:
      type: object
      required:
        - userId
        - authSub
        - usagePercent
      properties:
        userId:
          type: string
          format: uuid
        authSub:
          type: string
        usagePercent:
          type: integer
          description: Storage usage percentage (0-100)

    AlbumLimitWarning:
      type: object
      required:
        - albumId
        - ownerAuthSub
        - photoUsagePercent
        - sizeUsagePercent
      properties:
        albumId:
          type: string
          format: uuid
        ownerAuthSub:
          type: string
        photoUsagePercent:
          type: integer
          description: Photo count usage percentage (0-100)
        sizeUsagePercent:
          type: integer
          description: Size usage percentage (0-100)
