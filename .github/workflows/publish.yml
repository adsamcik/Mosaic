name: Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (defaults to git sha)'
        required: false
        type: string
      push:
        description: 'Push images to registry'
        required: false
        type: boolean
        default: true
      skip_e2e_only:
        description: '⚠️ Skip E2E tests only — unit tests ALWAYS run. Provide bypass_reason.'
        required: false
        type: boolean
        default: false
      bypass_reason:
        description: '📝 REQUIRED when skip_e2e_only is true: justification for skipping E2E tests'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  # Images will be: ghcr.io/OWNER/mosaic-backend and ghcr.io/OWNER/mosaic-frontend
  IMAGE_PREFIX: ${{ github.repository_owner }}/mosaic

jobs:
  # Detect whether the operator has supplied Android signing + cert-pin secrets.
  # When absent, the android-release job is skipped (not failed) — Android
  # binaries are optional in the operator-self-host model. Docker images still
  # publish without Android.
  detect-android-secrets:
    name: Detect Android Release Secrets
    runs-on: ubuntu-latest
    outputs:
      secrets_present: ${{ steps.check.outputs.secrets_present }}
    steps:
      - name: Probe operator secret presence
        id: check
        env:
          MOSAIC_RELEASE_PINS: ${{ secrets.MOSAIC_RELEASE_PINS }}
          MOSAIC_RELEASE_KEYSTORE_BASE64: ${{ secrets.MOSAIC_RELEASE_KEYSTORE_BASE64 }}
          MOSAIC_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.MOSAIC_RELEASE_KEYSTORE_PASSWORD }}
          MOSAIC_RELEASE_KEY_ALIAS: ${{ secrets.MOSAIC_RELEASE_KEY_ALIAS }}
          MOSAIC_RELEASE_KEY_PASSWORD: ${{ secrets.MOSAIC_RELEASE_KEY_PASSWORD }}
        run: |
          missing=()
          for name in MOSAIC_RELEASE_PINS MOSAIC_RELEASE_KEYSTORE_BASE64 MOSAIC_RELEASE_KEYSTORE_PASSWORD MOSAIC_RELEASE_KEY_ALIAS MOSAIC_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            echo "secrets_present=true" >> "$GITHUB_OUTPUT"
            echo "✅ All 5 Android release secrets are present; android-release job will run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "secrets_present=false" >> "$GITHUB_OUTPUT"
            echo "## ⏭️ Android Release Skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Operator has not supplied the required Android release secrets:" >> "$GITHUB_STEP_SUMMARY"
            for name in "${missing[@]}"; do
              echo "- \`$name\`" >> "$GITHUB_STEP_SUMMARY"
            done
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Docker images will still publish. Android APK/AAB will not be built/uploaded." >> "$GITHUB_STEP_SUMMARY"
            echo "See \`docs/RELEASE_NOTES_v0.2.0.md\` for the full secret list." >> "$GITHUB_STEP_SUMMARY"
          fi

  # Validate e2e bypass has a documented reason
  validate-bypass:
    name: Validate E2E Bypass
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_e2e_only }}
    steps:
      - name: Require bypass reason
        if: ${{ inputs.bypass_reason == '' }}
        run: |
          echo "::error::bypass_reason is REQUIRED when skip_e2e_only is true. Please provide a justification."
          exit 1

      - name: Log bypass to job summary
        run: |
          echo "## ⚠️ E2E TEST BYPASS ACTIVE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Skip E2E only | \`true\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ inputs.bypass_reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ **Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # Unit tests ALWAYS run — there is no bypass for this job
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            libs/crypto/package-lock.json
            apps/web/package-lock.json

      - name: Install and test crypto library
        working-directory: libs/crypto
        run: |
          npm ci
          npm test

      - name: Install and test admin frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run test:run

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Run backend tests
        working-directory: apps/backend/Mosaic.Backend.Tests
        run: dotnet test --verbosity normal

  # E2E tests — skippable only via skip_e2e_only on workflow_dispatch with a documented reason
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_e2e_only }}
    needs: unit-tests
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal --target wasm32-unknown-unknown
          rustup default 1.93.1

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked

      - name: Build weak-key WASM for E2E
        # E2E sets VITE_E2E_WEAK_KEYS=true on the frontend image; the WASM must be
        # compiled with the matching `weak-kdf` Cargo feature, otherwise the Rust
        # core rejects weak Argon2 profiles (KdfProfileTooWeak / code 208). Mirrors
        # the equivalent step in tests.yml (see commit 29bfa5f).
        # MOSAIC_WASM_OUT_DIR redirects the weak-kdf bytes to the dedicated
        # test-weak artifact path so they never overwrite the canonical
        # production WASM (HIGH security-review-2026-05-20-02).
        env:
          MOSAIC_WASM_CARGO_FEATURES: weak-kdf
          MOSAIC_WASM_OUT_DIR: apps/web/src/generated/mosaic-wasm-test-weak
        run: bash ./scripts/build-rust-wasm.sh

      - name: Build and start services
        run: |
          docker compose -f docker-compose.test.yml build
          docker compose -f docker-compose.test.yml up -d postgres backend frontend

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until docker compose -f docker-compose.test.yml ps | grep -q "healthy"; do sleep 2; done'

      - name: Run E2E tests
        run: docker compose -f docker-compose.test.yml run --rm e2e-tests

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            tests/e2e/results/
            tests/e2e/playwright-report/

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # Build and publish backend image — unit tests MUST pass; e2e may be skipped with documented reason
  publish-backend:
    name: Publish Backend
    runs-on: ubuntu-latest
    needs: [validate-bypass, unit-tests, e2e-tests]
    if: |
      always() &&
      needs.unit-tests.result == 'success' &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.validate-bypass.result == 'success' || needs.validate-bypass.result == 'skipped')
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive build version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          echo "MOSAIC_BUILD_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          labels: |
            org.opencontainers.image.tests.e2e-bypassed=${{ inputs.skip_e2e_only || false }}
            org.opencontainers.image.tests.bypass-reason=${{ inputs.bypass_reason || 'N/A' }}
            org.opencontainers.image.tests.bypass-actor=${{ inputs.skip_e2e_only && github.actor || 'N/A' }}
          tags: |
            # Use input tag if provided via workflow_dispatch
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            # Tag with version for releases (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            # Tag with sha for non-release builds
            type=sha,prefix=,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            # Latest tag for releases only
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./apps/backend/Mosaic.Backend/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MOSAIC_BUILD_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        if: ${{ github.event_name == 'push' || inputs.push }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.version }}
          artifact-name: sbom-backend.spdx.json

  # Build and publish frontend image — unit tests MUST pass; e2e may be skipped with documented reason
  publish-frontend:
    name: Publish Frontend
    runs-on: ubuntu-latest
    needs: [validate-bypass, unit-tests, e2e-tests]
    if: |
      always() &&
      needs.unit-tests.result == 'success' &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.validate-bypass.result == 'success' || needs.validate-bypass.result == 'skipped')
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          labels: |
            org.opencontainers.image.tests.e2e-bypassed=${{ inputs.skip_e2e_only || false }}
            org.opencontainers.image.tests.bypass-reason=${{ inputs.bypass_reason || 'N/A' }}
            org.opencontainers.image.tests.bypass-actor=${{ inputs.skip_e2e_only && github.actor || 'N/A' }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        if: ${{ github.event_name == 'push' || inputs.push }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.version }}
          artifact-name: sbom-frontend.spdx.json

  android-release:
    name: Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate-bypass, unit-tests, e2e-tests, detect-android-secrets]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.detect-android-secrets.result == 'success' &&
      needs.detect-android-secrets.outputs.secrets_present == 'true' &&
      needs.unit-tests.result == 'success' &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped') &&
      (needs.validate-bypass.result == 'success' || needs.validate-bypass.result == 'skipped')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Derive build version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "MOSAIC_BUILD_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Inject ADR-019 release pins
        env:
          MOSAIC_RELEASE_PINS: ${{ secrets.MOSAIC_RELEASE_PINS }}
        run: |
          if [ -z "${MOSAIC_RELEASE_PINS:-}" ]; then
            echo "::error::Missing required GitHub Actions secret MOSAIC_RELEASE_PINS. Set one sha256/<base64> SPKI pin per line before publishing Android release artifacts."
            exit 1
          fi
          printf '%s\n' "$MOSAIC_RELEASE_PINS" > apps/android-main/src/main/assets/adr019-pins.txt

      - name: Prepare Android release signing
        env:
          MOSAIC_RELEASE_KEYSTORE_BASE64: ${{ secrets.MOSAIC_RELEASE_KEYSTORE_BASE64 }}
          MOSAIC_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.MOSAIC_RELEASE_KEYSTORE_PASSWORD }}
          MOSAIC_RELEASE_KEY_ALIAS: ${{ secrets.MOSAIC_RELEASE_KEY_ALIAS }}
          MOSAIC_RELEASE_KEY_PASSWORD: ${{ secrets.MOSAIC_RELEASE_KEY_PASSWORD }}
        run: |
          for name in MOSAIC_RELEASE_KEYSTORE_BASE64 MOSAIC_RELEASE_KEYSTORE_PASSWORD MOSAIC_RELEASE_KEY_ALIAS MOSAIC_RELEASE_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required GitHub Actions secret $name for Android release signing."
              exit 1
            fi
          done
          KEYSTORE_PATH="$RUNNER_TEMP/mosaic-release.keystore"
          printf '%s' "$MOSAIC_RELEASE_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "MOSAIC_RELEASE_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "MOSAIC_RELEASE_KEYSTORE_PASSWORD=$MOSAIC_RELEASE_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "MOSAIC_RELEASE_KEY_ALIAS=$MOSAIC_RELEASE_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "MOSAIC_RELEASE_KEY_PASSWORD=$MOSAIC_RELEASE_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@00854ea68c109d98c75d956347303bf7c45b0277 # v3.2.1
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;29.0.14206865"

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal --component clippy,rustfmt --target aarch64-linux-android,x86_64-linux-android
          rustup default 1.93.1

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 4.1.2 --locked

      - name: Install uniffi-bindgen
        run: cargo install uniffi --version 0.31.1 --bin uniffi-bindgen --locked

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          validate-wrappers: true

      - name: Build Rust UniFFI artifacts
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
        run: bash ./scripts/build-rust-android.sh

      - name: Build Android release artifacts
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
        run: ./gradlew :apps:android-main:assembleRelease :apps:android-main:bundleRelease --no-daemon --console=plain -PmosaicVersionName="$MOSAIC_BUILD_VERSION" -PmosaicVersionCode="$GITHUB_RUN_NUMBER"

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-release-artifacts
          path: |
            apps/android-main/build/outputs/apk/release/*.apk
            apps/android-main/build/outputs/bundle/release/*.aab
            apps/android-main/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error
          retention-days: 30

  # Create GitHub Release with image info
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [publish-backend, publish-frontend, android-release]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.publish-backend.result == 'success' &&
      needs.publish-frontend.result == 'success' &&
      (needs.android-release.result == 'success' || needs.android-release.result == 'skipped')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate release notes
        id: notes
        run: |
          cat << 'EOF' > release-notes.md
          ## Docker Images

          Pull the images from GitHub Container Registry:

          ```bash
          # Backend API
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.ref_name }}

          # Frontend
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.ref_name }}
          ```

          ## Quick Start

          ```bash
          # Create docker-compose.yml with the above images, then:
          docker compose up -d
          ```

          ## Image Digests

          - Backend: `${{ needs.publish-backend.outputs.digest }}`
          - Frontend: `${{ needs.publish-frontend.outputs.digest }}`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          append_body: true
