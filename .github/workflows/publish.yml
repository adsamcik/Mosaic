name: Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (defaults to git sha)'
        required: false
        type: string
      push:
        description: 'Push images to registry'
        required: false
        type: boolean
        default: true
      skip_tests:
        description: '⚠️ BYPASS: Skip ALL tests (unit + E2E) and publish anyway'
        required: false
        type: boolean
        default: false
      skip_e2e_only:
        description: '⚠️ BYPASS: Skip E2E tests only (still runs unit tests)'
        required: false
        type: boolean
        default: false
      bypass_reason:
        description: '📝 REQUIRED if bypassing: Justification for skipping tests'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  # Images will be: ghcr.io/OWNER/mosaic-backend and ghcr.io/OWNER/mosaic-frontend
  IMAGE_PREFIX: ${{ github.repository_owner }}/mosaic

jobs:
  # Validate bypass has a reason and announce it
  validate-bypass:
    name: Validate Bypass
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests || inputs.skip_e2e_only }}
    steps:
      - name: Require bypass reason
        if: ${{ inputs.bypass_reason == '' }}
        run: |
          echo "::error::bypass_reason is REQUIRED when skipping tests. Please provide a justification."
          exit 1

      - name: Log bypass to job summary
        run: |
          echo "## ⚠️ TEST BYPASS ACTIVE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Skip ALL tests | \`${{ inputs.skip_tests }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Skip E2E only | \`${{ inputs.skip_e2e_only }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason | ${{ inputs.bypass_reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏰ **Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  # Run unit tests before publishing (can be skipped via workflow_dispatch)
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            libs/crypto/package-lock.json
            apps/admin/package-lock.json

      - name: Install and test crypto library
        working-directory: libs/crypto
        run: |
          npm ci
          npm test

      - name: Install and test admin frontend
        working-directory: apps/admin
        run: |
          npm ci
          npm run test:run

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Run backend tests
        working-directory: apps/backend/Mosaic.Backend.Tests
        run: dotnet test --verbosity normal

  # Run E2E tests (can be skipped independently)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests && !inputs.skip_e2e_only }}
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: |
          docker compose -f docker-compose.test.yml build
          docker compose -f docker-compose.test.yml up -d postgres backend frontend

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until docker compose -f docker-compose.test.yml ps | grep -q "healthy"; do sleep 2; done'

      - name: Run E2E tests
        run: docker compose -f docker-compose.test.yml run --rm e2e-tests

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            tests/e2e/results/
            tests/e2e/playwright-report/

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  # Build and publish backend image
  publish-backend:
    name: Publish Backend
    runs-on: ubuntu-latest
    needs: [validate-bypass, unit-tests, e2e-tests]
    if: |
      always() && 
      (needs.validate-bypass.result == 'success' || needs.validate-bypass.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped')
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          labels: |
            org.opencontainers.image.tests.bypassed=${{ inputs.skip_tests || inputs.skip_e2e_only || false }}
            org.opencontainers.image.tests.bypass-reason=${{ inputs.bypass_reason || 'N/A' }}
            org.opencontainers.image.tests.bypass-actor=${{ (inputs.skip_tests || inputs.skip_e2e_only) && github.actor || 'N/A' }}
          tags: |
            # Use input tag if provided via workflow_dispatch
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            # Tag with version for releases (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            # Tag with sha for non-release builds
            type=sha,prefix=,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            # Latest tag for releases only
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./apps/backend/Mosaic.Backend
          file: ./apps/backend/Mosaic.Backend/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        if: ${{ github.event_name == 'push' || inputs.push }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ steps.meta.outputs.version }}
          artifact-name: sbom-backend.spdx.json

  # Build and publish frontend image
  publish-frontend:
    name: Publish Frontend
    runs-on: ubuntu-latest
    needs: [validate-bypass, unit-tests, e2e-tests]
    if: |
      always() && 
      (needs.validate-bypass.result == 'success' || needs.validate-bypass.result == 'skipped') &&
      (needs.unit-tests.result == 'success' || needs.unit-tests.result == 'skipped') &&
      (needs.e2e-tests.result == 'success' || needs.e2e-tests.result == 'skipped')
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          labels: |
            org.opencontainers.image.tests.bypassed=${{ inputs.skip_tests || inputs.skip_e2e_only || false }}
            org.opencontainers.image.tests.bypass-reason=${{ inputs.bypass_reason || 'N/A' }}
            org.opencontainers.image.tests.bypass-actor=${{ (inputs.skip_tests || inputs.skip_e2e_only) && github.actor || 'N/A' }}
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=,enable=${{ !startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        if: ${{ github.event_name == 'push' || inputs.push }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ steps.meta.outputs.version }}
          artifact-name: sbom-frontend.spdx.json

  # Create GitHub Release with image info
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [publish-backend, publish-frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        run: |
          cat << 'EOF' > release-notes.md
          ## Docker Images

          Pull the images from GitHub Container Registry:

          ```bash
          # Backend API
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.ref_name }}

          # Frontend
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.ref_name }}
          ```

          ## Quick Start

          ```bash
          # Create docker-compose.yml with the above images, then:
          docker compose up -d
          ```

          ## Image Digests

          - Backend: `${{ needs.publish-backend.outputs.digest }}`
          - Frontend: `${{ needs.publish-frontend.outputs.digest }}`
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          append_body: true
