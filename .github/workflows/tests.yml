name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-check
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            libs/crypto/package-lock.json
            apps/web/package-lock.json
      
      - name: npm audit (high-severity gate across npm workspaces)
        # v1.0.1 s15: fail the build if any npm workspace has a high-severity
        # CVE in its locked dependency tree. Runs BEFORE install/test so a
        # vulnerable dependency cannot reach the test step. Covers all four
        # npm workspaces in the repo: libs/crypto, apps/web,
        # tests/integration, tests/e2e.
        run: |
          set -e
          for dir in libs/crypto apps/web tests/integration tests/e2e; do
            echo "::group::npm audit $dir"
            (cd "$dir" && npm audit --audit-level=high)
            echo "::endgroup::"
          done

      - name: Install crypto library dependencies
        working-directory: libs/crypto
        run: npm ci
      
      - name: Run crypto library tests
        working-directory: libs/crypto
        run: npm run test:coverage
      
      - name: Install admin dependencies
        working-directory: apps/web
        run: npm ci

      - name: Check i18n translation parity (en vs cs)
        run: node scripts/check-i18n-parity.mjs

      - name: Run admin tests
        working-directory: apps/web
        run: npm run test:run

      - name: Web test coverage gate
        working-directory: apps/web
        run: npm run test:coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Build and start services
        run: |
          docker compose -f docker-compose.test.yml build
          docker compose -f docker-compose.test.yml up -d postgres
          echo "Waiting for postgres..."
          timeout 60 bash -c 'until docker compose -f docker-compose.test.yml ps postgres | grep -q "healthy"; do sleep 2; done'
          echo "Postgres healthy, starting backend and frontend..."
          docker compose -f docker-compose.test.yml up -d backend frontend
      
      - name: Wait for services
        run: |
          timeout 120 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" mosaic-test-backend)" = "healthy" ] && [ "$(docker inspect -f "{{.State.Health.Status}}" mosaic-test-frontend)" = "healthy" ]; do sleep 2; done'
      
      - name: Run API integration tests
        run: docker compose -f docker-compose.test.yml run --rm api-tests

      - name: Backend integration tests
        run: |
          dotnet restore apps/backend/Mosaic.Backend.Tests/Mosaic.Backend.Tests.csproj --locked-mode
          dotnet test apps/backend/Mosaic.Backend.Tests/Mosaic.Backend.Tests.csproj --no-restore --filter "Category=Integration"
      
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker logs mosaic-test-backend --tail 100 2>&1 || true
          echo "=== Postgres Logs ==="
          docker logs mosaic-test-postgres --tail 50 2>&1 || true
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml ps -a 2>&1 || true
      
      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: integration-test-results
          path: tests/integration/results/
      
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust for weak-key WASM
        run: |
          rustup toolchain install 1.93.1 --profile minimal --target wasm32-unknown-unknown
          rustup default 1.93.1

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked

      - name: Build weak-key WASM for E2E
        env:
          MOSAIC_WASM_CARGO_FEATURES: weak-kdf
          MOSAIC_WASM_OUT_DIR: apps/web/src/generated/mosaic-wasm-test-weak
        run: bash ./scripts/build-rust-wasm.sh
      
      # Build and start services in Docker with port forwarding
      # Frontend: localhost:8080, Backend: localhost:5000
      - name: Build and start services
        run: |
          docker compose -f docker-compose.test.yml build postgres backend frontend
          docker compose -f docker-compose.test.yml up -d postgres
          echo "Waiting for postgres..."
          timeout 60 bash -c 'until docker compose -f docker-compose.test.yml ps postgres | grep -q "healthy"; do sleep 2; done'
          echo "Postgres healthy, starting backend and frontend..."
          docker compose -f docker-compose.test.yml up -d backend frontend
      
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" mosaic-test-backend)" = "healthy" ] && [ "$(docker inspect -f "{{.State.Health.Status}}" mosaic-test-frontend)" = "healthy" ]; do sleep 2; done'
          echo "Services are healthy!"
          
          # Verify services are accessible on localhost
          echo "Verifying frontend on localhost:8080..."
          curl -sf http://localhost:8080/health || (echo "Frontend not accessible" && exit 1)
          echo "Verifying backend on localhost:5000..."
          curl -sf http://localhost:5000/health || (echo "Backend not accessible" && exit 1)
          echo "All services verified!"
      
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker logs mosaic-test-backend --tail 100 2>&1 || true
          echo "=== Frontend Logs ==="
          docker logs mosaic-test-frontend --tail 50 2>&1 || true
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml ps -a 2>&1 || true
      
      # Setup Node.js for Playwright
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json
      
      # Install Playwright and dependencies directly on runner
      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      
      # Run tests on the runner (accessing localhost - secure context!)
      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:8080
          API_URL: http://localhost:5000
          CI: "true"
        run: npx playwright test --project=smoke --reporter=list

      # Dump backend/frontend logs when E2E tests fail (the earlier "Show logs
      # on failure" step only runs if service-startup fails, which is too
      # early to catch test-time symptoms).
      - name: Show service logs on E2E failure
        if: failure()
        run: |
          echo "=== Backend Logs (last 500 lines) ==="
          docker logs mosaic-test-backend --tail 500 2>&1 || true
          echo "=== Frontend Logs (last 200 lines) ==="
          docker logs mosaic-test-frontend --tail 200 2>&1 || true
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml ps -a 2>&1 || true
      
      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            tests/e2e/results/
            tests/e2e/playwright-report/
      
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  e2e-tests-proxyauth:
    name: E2E Tests (ProxyAuth mode)
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust for weak-key WASM
        run: |
          rustup toolchain install 1.93.1 --profile minimal --target wasm32-unknown-unknown
          rustup default 1.93.1

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked

      - name: Build weak-key WASM for E2E
        env:
          MOSAIC_WASM_CARGO_FEATURES: weak-kdf
          MOSAIC_WASM_OUT_DIR: apps/web/src/generated/mosaic-wasm-test-weak
        run: bash ./scripts/build-rust-wasm.sh

      # Build and start services in Docker with port forwarding. The
      # ProxyAuth-mode override flips the backend into ProxyAuth-only mode
      # (LocalAuth disabled, AllowDualMode off) so the auth-modes.spec.ts
      # ProxyAuth branches stop being skipped. The Playwright suite already
      # injects Remote-User headers via `page.route()`, so no real upstream
      # reverse proxy container is required.
      - name: Build and start services (ProxyAuth mode)
        run: |
          docker compose -f docker-compose.test.yml -f docker-compose.test.proxyauth.yml build postgres backend frontend
          docker compose -f docker-compose.test.yml -f docker-compose.test.proxyauth.yml up -d postgres
          echo "Waiting for postgres..."
          timeout 60 bash -c 'until docker compose -f docker-compose.test.yml -f docker-compose.test.proxyauth.yml ps postgres | grep -q "healthy"; do sleep 2; done'
          echo "Postgres healthy, starting backend and frontend..."
          docker compose -f docker-compose.test.yml -f docker-compose.test.proxyauth.yml up -d backend frontend

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" mosaic-test-backend)" = "healthy" ] && [ "$(docker inspect -f "{{.State.Health.Status}}" mosaic-test-frontend)" = "healthy" ]; do sleep 2; done'
          echo "Services are healthy!"

          echo "Verifying frontend on localhost:8080..."
          curl -sf http://localhost:8080/health || (echo "Frontend not accessible" && exit 1)
          echo "Verifying backend on localhost:5000..."
          curl -sf http://localhost:5000/health || (echo "Backend not accessible" && exit 1)
          echo "All services verified!"

          # Sanity-check: backend must be in ProxyAuth-only mode.
          # /api/v1/auth/init is the LocalAuth challenge endpoint and must
          # return 404 when LocalAuth is disabled; this is exactly the
          # signal detectAuthMode() in auth-modes.spec.ts uses to branch
          # into ProxyAuth tests.
          echo "Verifying backend is in ProxyAuth-only mode..."
          init_status=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:5000/api/v1/auth/init -H "Content-Type: application/json" -d '{"username":"mode-detect-test"}')
          if [ "$init_status" != "404" ]; then
            echo "Expected /api/v1/auth/init to return 404 in ProxyAuth-only mode, got $init_status"
            exit 1
          fi
          echo "Backend confirmed in ProxyAuth-only mode."

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker logs mosaic-test-backend --tail 100 2>&1 || true
          echo "=== Frontend Logs ==="
          docker logs mosaic-test-frontend --tail 50 2>&1 || true
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml -f docker-compose.test.proxyauth.yml ps -a 2>&1 || true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests (ProxyAuth mode)
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:8080
          API_URL: http://localhost:5000
          CI: "true"
          MOSAIC_AUTH_MODE: ProxyAuth
        run: npx playwright test --project=smoke --reporter=list

      - name: Show service logs on E2E failure
        if: failure()
        run: |
          echo "=== Backend Logs (last 500 lines) ==="
          docker logs mosaic-test-backend --tail 500 2>&1 || true
          echo "=== Frontend Logs (last 200 lines) ==="
          docker logs mosaic-test-frontend --tail 200 2>&1 || true
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml -f docker-compose.test.proxyauth.yml ps -a 2>&1 || true

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: e2e-test-results-proxyauth
          path: |
            tests/e2e/results/
            tests/e2e/playwright-report/

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml -f docker-compose.test.proxyauth.yml down -v

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Build backend
        working-directory: apps/backend/Mosaic.Backend
        run: |
          dotnet restore --locked-mode
          dotnet build --no-restore --configuration Release

      - name: OpenAPI drift gate
        # v1.0.1 s23: regenerate docs/openapi.json from the running OpenAPI
        # document provider and fail if it differs from the committed copy.
        # Forces every API surface change to be reflected in the repo so
        # clients (and the SDK consumers) cannot silently drift from the
        # backend. If this step fails locally: run
        # `pwsh scripts/export-openapi.ps1` (or `bash scripts/export-openapi.sh`)
        # and commit the updated docs/openapi.json.
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__Default: "Data Source=:memory:"
        run: |
          dotnet run --project apps/backend/Mosaic.Backend -- --export-openapi "$(pwd)/docs/openapi.json"
          if ! git diff --exit-code -- docs/openapi.json; then
            echo "::error::docs/openapi.json is out of date. Run scripts/export-openapi.sh and commit the result."
            git diff --stat docs/openapi.json
            exit 1
          fi

      - name: Forbid internal paths in public OpenAPI
        # security-review-2026-05-19-02: the public OpenAPI surface must
        # not advertise admin / dev-auth / test-seed routes. Those are
        # internal endpoints (admin: operator-only, dev-auth: dev-only,
        # test-seed: integration-test-only) and exposing them in the
        # published schema enables attack-surface mapping.
        run: |
          if grep -E '"/api/v1/(admin|dev-auth|test-seed)/' docs/openapi.json; then
            echo "::error::docs/openapi.json contains internal endpoints (admin/dev-auth/test-seed). Add [ApiExplorerSettings(IgnoreApi = true)] to the offending controller and regenerate."
            exit 1
          fi

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal --component clippy,rustfmt --target wasm32-unknown-unknown,aarch64-linux-android,x86_64-linux-android
          rustup default 1.93.1

      - name: Run Rust workspace checks
        run: bash ./scripts/rust-check.sh --skip-supply-chain

      - name: Run rust-no-secret-logs architecture guard
        run: bash ./tests/architecture/rust-no-secret-logs.sh

      - name: Run rust-crypto-primitive-boundary architecture guard
        run: bash ./tests/architecture/rust-crypto-primitive-boundary.sh

      - name: Run rust-cutover-boundary PowerShell architecture guard
        run: pwsh ./tests/architecture/rust-cutover-boundary.ps1

      - name: Run dotnet-no-crypto-bypass architecture guard
        run: bash ./tests/architecture/dotnet-no-crypto-bypass.sh

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked

      - name: Build Rust WASM package
        run: bash ./scripts/build-rust-wasm.sh

      - name: Verify committed Rust WASM artifacts are fresh
        # HARD-FAIL: contributors MUST build the committed WASM artifact
        # via `scripts/build-rust-wasm-docker.{sh,ps1}` which runs the
        # build inside the pinned `mosaic-wasm-build:1.93.1` Docker
        # image. That image matches the CI Linux toolchain byte-for-byte,
        # so a fresh CI rebuild must produce the same bytes as what was
        # committed.
        #
        # If this step fails locally:
        #   1. Run `bash scripts/build-rust-wasm-docker.sh`
        #      (or `pwsh scripts/build-rust-wasm-docker.ps1` on Windows).
        #   2. Commit the updated apps/web/src/generated/mosaic-wasm/
        #      files.
        #
        # Closes sweep42-followup-wasm-determinism. Native Windows
        # builds drift ~150 bytes from Linux/CI builds because the
        # wasm32 backend lowers a small number of internal helpers
        # differently between host LLVM builds; the Docker wrapper
        # bypasses that drift entirely.
        run: |
          if ! git diff --exit-code -- apps/web/src/generated/mosaic-wasm/; then
            echo "::error::Committed WASM artifacts differ from CI rebuild output. Run scripts/build-rust-wasm-docker.sh and commit the result."
            git diff --stat apps/web/src/generated/mosaic-wasm/
            exit 1
          fi

      - name: Run UniFFI API-shape lock
        run: cargo test -p mosaic-uniffi --test api_shape_lock --locked

      - name: Run WASM API-shape lock
        run: cargo test -p mosaic-wasm --test api_shape_lock --locked

      - name: Run WASM debug-redaction lock
        run: cargo test -p mosaic-wasm --test debug_redaction_lock --locked

      - name: Run no-raw-secret-ffi-export architecture guard
        run: bash ./tests/architecture/no-raw-secret-ffi-export.sh

      - name: Run no-arbitrary-identity-sign architecture guard
        run: bash ./tests/architecture/no-arbitrary-identity-sign.sh

      - name: Run web-raw-input-ffi PowerShell architecture guard
        run: pwsh ./tests/architecture/web-raw-input-ffi.ps1

      - name: Run web-rust-core-protocol-completeness PowerShell architecture guard
        run: pwsh ./tests/architecture/web-rust-core-protocol-completeness.ps1

      - name: Run web-listener-cleanup PowerShell architecture guard
        run: pwsh ./tests/architecture/web-listener-cleanup.ps1

      - name: Run web-raw-input-ffi Bash architecture guard
        run: bash ./tests/architecture/web-raw-input-ffi.sh

      - name: Check Rust Android targets
        run: |
          cargo check -p mosaic-uniffi --target aarch64-linux-android --locked
          cargo check -p mosaic-uniffi --target x86_64-linux-android --locked

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Check generated TypeScript worker crypto error codes
        run: node scripts/generate-worker-crypto-error-codes.mjs --check
      
      - name: Build crypto library
        working-directory: libs/crypto
        run: |
          npm ci
          npm run build
      
      - name: Build frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Run web-no-direct-console architecture guard
        run: bash ./tests/architecture/web-no-direct-console.sh

  wasm-rebuild-invariance:
    name: WASM Rebuild Invariance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # HARD-FAIL: the Docker-based deterministic builder
    # (scripts/build-rust-wasm-docker.{sh,ps1}) closes
    # sweep42-followup-wasm-determinism. A committed WASM artifact
    # built via the Docker wrapper matches a CI Linux rebuild
    # byte-for-byte, so this gate is now a true invariance check.
    #
    # If this job fails: run scripts/build-rust-wasm-docker.sh locally
    # and commit the updated apps/web/src/generated/mosaic-wasm/.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal --target wasm32-unknown-unknown
          rustup default 1.93.1

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked

      - name: Rebuild Rust WASM package
        run: bash ./scripts/build-rust-wasm.sh

      - name: Upload rebuilt WASM as artifact (for determinism investigation)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: rebuilt-mosaic-wasm
          path: apps/web/src/generated/mosaic-wasm/
          retention-days: 14

      - name: Assert committed WASM artifacts match rebuild
        run: |
          status="$(git status --porcelain apps/web/src/generated/mosaic-wasm/)"
          if [ -n "$status" ]; then
            echo "::error::Committed WASM artifact differs from CI rebuild output. Run scripts/build-rust-wasm-docker.sh locally and commit the result."
            echo "$status"
            git diff --stat apps/web/src/generated/mosaic-wasm/
            exit 1
          fi

  android-shell:
    name: Android Shell (JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Android shell is intentionally self-contained: do not depend on
    # build-check's cargo-deny / WASM api-shape gates, which are orthogonal to
    # Kotlin foundation compilation and previously hid Android regressions.

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Kotlin compiler
        run: |
          curl -fsSL -o kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q kotlin.zip -d "$HOME/kotlin"
          echo "$HOME/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Run Android shell foundation tests
        run: bash ./scripts/test-android-shell.sh

      - name: Run kotlin-raw-input-ffi architecture guard
        run: bash ./tests/architecture/kotlin-raw-input-ffi.sh

      - name: Run android-rust-core-protocol-completeness architecture guard
        run: bash ./tests/architecture/android-rust-core-protocol-completeness.sh

      - name: Run android-no-direct-log architecture guard
        run: bash ./tests/architecture/android-no-direct-log.sh

  android-main:
    name: Android Main (Gradle)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # We deliberately do NOT depend on build-check (cargo-deny + WASM
    # api-shape lock) because the Android bridge requires only Rust-core
    # compilation and UniFFI binding generation, both of which are exercised by
    # `cargo test --workspace` in unit-tests. Coupling them caused a 3-month
    # invisibility window in 2026-Q1.

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@00854ea68c109d98c75d956347303bf7c45b0277 # v3.2.1
        with:
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;29.0.14206865"

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal --component clippy,rustfmt --target aarch64-linux-android,x86_64-linux-android
          rustup default 1.93.1

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 4.1.2 --locked

      - name: Install uniffi-bindgen
        run: cargo install uniffi --version 0.31.1 --bin uniffi-bindgen --features cli --locked

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          validate-wrappers: true

      - name: Build Rust UniFFI artifacts
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
        run: bash ./scripts/build-rust-android.sh

      - name: Build Android APK (debug)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
        run: ./gradlew :apps:android-main:assembleDebug --no-daemon --console=plain

      - name: Run Android JVM unit tests
        run: ./gradlew :apps:android-main:testDebugUnitTest --no-daemon --console=plain

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-main-debug-apk
          path: apps/android-main/build/outputs/apk/debug/android-main-debug.apk
          if-no-files-found: warn
          retention-days: 7

  rust-supply-chain:
    name: Rust Supply Chain
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal
          rustup default 1.93.1

      - name: Install Rust supply-chain tools
        run: |
          cargo install cargo-deny --version 0.19.4 --locked
          cargo install cargo-audit --version 0.22.1 --locked
          cargo install cargo-vet --version 0.10.2 --locked

      - name: Run Rust supply-chain checks
        run: |
          cargo deny check
          cargo audit
          cargo vet --locked --no-registry-suggestions
