name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            libs/crypto/package-lock.json
            apps/web/package-lock.json
      
      - name: Install crypto library dependencies
        working-directory: libs/crypto
        run: npm ci
      
      - name: Run crypto library tests
        working-directory: libs/crypto
        run: npm run test:coverage
      
      - name: Install admin dependencies
        working-directory: apps/web
        run: npm ci
      
      - name: Run admin tests
        working-directory: apps/web
        run: npm run test:run

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Build and start services
        run: |
          docker compose -f docker-compose.test.yml build
          docker compose -f docker-compose.test.yml up -d postgres
          echo "Waiting for postgres..."
          timeout 60 bash -c 'until docker compose -f docker-compose.test.yml ps postgres | grep -q "healthy"; do sleep 2; done'
          echo "Postgres healthy, starting backend and frontend..."
          docker compose -f docker-compose.test.yml up -d backend frontend
      
      - name: Wait for services
        run: |
          timeout 120 bash -c 'until docker compose -f docker-compose.test.yml ps | grep -q "healthy"; do sleep 2; done'
      
      - name: Run API integration tests
        run: docker compose -f docker-compose.test.yml run --rm api-tests
      
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker logs mosaic-test-backend --tail 100 2>&1 || true
          echo "=== Postgres Logs ==="
          docker logs mosaic-test-postgres --tail 50 2>&1 || true
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml ps -a 2>&1 || true
      
      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: integration-test-results
          path: tests/integration/results/
      
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      # Build and start services in Docker with port forwarding
      # Frontend: localhost:8080, Backend: localhost:5000
      - name: Build and start services
        run: |
          docker compose -f docker-compose.test.yml build postgres backend frontend
          docker compose -f docker-compose.test.yml up -d postgres
          echo "Waiting for postgres..."
          timeout 60 bash -c 'until docker compose -f docker-compose.test.yml ps postgres | grep -q "healthy"; do sleep 2; done'
          echo "Postgres healthy, starting backend and frontend..."
          docker compose -f docker-compose.test.yml up -d backend frontend
      
      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services to be healthy..."
          timeout 120 bash -c 'until docker compose -f docker-compose.test.yml ps | grep -q "healthy"; do sleep 2; done'
          echo "Services are healthy!"
          
          # Verify services are accessible on localhost
          echo "Verifying frontend on localhost:8080..."
          curl -sf http://localhost:8080/health || (echo "Frontend not accessible" && exit 1)
          echo "Verifying backend on localhost:5000..."
          curl -sf http://localhost:5000/health || (echo "Backend not accessible" && exit 1)
          echo "All services verified!"
      
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker logs mosaic-test-backend --tail 100 2>&1 || true
          echo "=== Frontend Logs ==="
          docker logs mosaic-test-frontend --tail 50 2>&1 || true
          echo "=== Container Status ==="
          docker compose -f docker-compose.test.yml ps -a 2>&1 || true
      
      # Setup Node.js for Playwright
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json
      
      # Install Playwright and dependencies directly on runner
      - name: Install Playwright dependencies
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      
      # Run tests on the runner (accessing localhost - secure context!)
      - name: Run E2E tests
        working-directory: tests/e2e
        env:
          BASE_URL: http://localhost:8080
          API_URL: http://localhost:5000
          CI: "true"
        run: npx playwright test
      
      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            tests/e2e/results/
            tests/e2e/playwright-report/
      
      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'
      
      - name: Build backend
        working-directory: apps/backend/Mosaic.Backend
        run: dotnet build --configuration Release

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal --component clippy,rustfmt --target wasm32-unknown-unknown,aarch64-linux-android,x86_64-linux-android
          rustup default 1.93.1

      - name: Run Rust workspace checks
        run: bash ./scripts/rust-check.sh --skip-supply-chain

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.118 --locked

      - name: Build Rust WASM package
        run: bash ./scripts/build-rust-wasm.sh

      - name: Check Rust Android targets
        run: |
          cargo check -p mosaic-uniffi --target aarch64-linux-android --locked
          cargo check -p mosaic-uniffi --target x86_64-linux-android --locked

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      
      - name: Build crypto library
        working-directory: libs/crypto
        run: |
          npm ci
          npm run build
      
      - name: Build frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run build

  android-shell:
    name: Android Shell (JVM)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-check

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Kotlin compiler
        run: |
          curl -fsSL -o kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q kotlin.zip -d "$HOME/kotlin"
          echo "$HOME/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Run Android shell foundation tests
        run: bash ./scripts/test-android-shell.sh

      - name: Run kotlin-raw-input-ffi architecture guard
        run: bash ./tests/architecture/kotlin-raw-input-ffi.sh

  android-main:
    name: Android Main (Gradle)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-check

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            tools
            platform-tools
            platforms;android-35
            build-tools;35.0.0
            ndk;29.0.14206865

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal --component clippy,rustfmt --target aarch64-linux-android,x86_64-linux-android
          rustup default 1.93.1

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 4.1.2 --locked

      - name: Install uniffi-bindgen
        run: cargo install uniffi --version 0.31.1 --bin uniffi-bindgen --locked

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true

      - name: Build Rust UniFFI artifacts
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
        run: bash ./scripts/build-rust-android.sh

      - name: Build Android APK (debug)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865
        run: ./gradlew :apps:android-main:assembleDebug --no-daemon --console=plain

      - name: Run Android JVM unit tests
        run: ./gradlew :apps:android-main:testDebugUnitTest --no-daemon --console=plain

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-main-debug-apk
          path: apps/android-main/build/outputs/apk/debug/android-main-debug.apk
          if-no-files-found: warn
          retention-days: 7

  rust-supply-chain:
    name: Rust Supply Chain
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        run: |
          rustup toolchain install 1.93.1 --profile minimal
          rustup default 1.93.1

      - name: Install Rust supply-chain tools
        run: |
          cargo install cargo-deny --version 0.19.4 --locked
          cargo install cargo-audit --version 0.22.1 --locked
          cargo install cargo-vet --version 0.10.2 --locked

      - name: Run Rust supply-chain checks
        run: |
          cargo deny check
          cargo audit
          cargo vet --locked --no-registry-suggestions
