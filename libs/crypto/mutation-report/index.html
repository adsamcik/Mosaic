e":265},"start":{"column":12,"line":265}}},{"id":"85","mutatorName":"BlockStatement","replacement":"{}","statusReason":"expected undefined to be null","status":"Killed","static":false,"testsCompleted":1,"killedBy":["23"],"coveredBy":["23","24","25","31","36","37"],"location":{"end":{"column":4,"line":269},"start":{"column":29,"line":266}}},{"id":"0","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected Uint8Array[ 125, 17, 112, 62, …(-105) ] to not deeply equal Uint8Array[ 125, 17, 112, 62, …(-105) ]","status":"Killed","static":true,"testsCompleted":54,"killedBy":["53"],"coveredBy":[],"location":{"end":{"column":52,"line":26},"start":{"column":33,"line":26}}},{"id":"1","mutatorName":"StringLiteral","replacement":"\"\"","statusReason":"expected Uint8Array[ 224, 104, 85, 250, …(-59) ] to not deeply equal Uint8Array[ 224, 104, 85, 250, …(-59) ]","status":"Killed","static":true,"testsCompleted":55,"killedBy":["54"],"coveredBy":[],"location":{"end":{"column":56,"line":29},"start":{"column":35,"line":29}}}],"source":"/**\r\n * Mosaic Crypto Library - Link Sharing Module\r\n *\r\n * Cryptographic operations for shareable album links.\r\n * Link secrets derive both a server lookup ID (linkId) and a wrapping key.\r\n * The server never sees the link secret - only the derived linkId.\r\n */\r\n\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport {\r\n  KEY_SIZE,\r\n  AccessTier,\r\n  type LinkKeys,\r\n  type WrappedTierKey,\r\n} from './types';\r\nimport { wrapKey, unwrapKey } from './keybox';\r\nimport { toBytes, randomBytes } from './utils';\r\n\r\n/** Size of link secret in bytes (256-bit security) */\r\nexport const LINK_SECRET_SIZE = 32;\r\n\r\n/** Size of link ID in bytes (128-bit, sufficient for lookup) */\r\nexport const LINK_ID_SIZE = 16;\r\n\r\n/** Context for deriving link ID from secret */\r\nconst LINK_ID_CONTEXT = toBytes('mosaic:link:id:v1');\r\n\r\n/** Context for deriving wrapping key from secret */\r\nconst LINK_WRAP_CONTEXT = toBytes('mosaic:link:wrap:v1');\r\n\r\n/**\r\n * Generate a new random link secret.\r\n *\r\n * @returns 32-byte random secret for share link\r\n */\r\nexport function generateLinkSecret(): Uint8Array {\r\n  return randomBytes(LINK_SECRET_SIZE);\r\n}\r\n\r\n/**\r\n * Derive link ID and wrapping key from a link secret.\r\n *\r\n * The link ID is used for server-side lookup (safe to expose).\r\n * The wrapping key is used to encrypt tier keys (never sent to server).\r\n *\r\n * @param linkSecret - 32-byte secret from URL fragment\r\n * @returns Object with linkId (16 bytes) and wrappingKey (32 bytes)\r\n */\r\nexport function deriveLinkKeys(linkSecret: Uint8Array): LinkKeys {\r\n  if (linkSecret.length !== LINK_SECRET_SIZE) {\r\n    throw new Error(\r\n      `Link secret must be ${LINK_SECRET_SIZE} bytes, got ${linkSecret.length}`\r\n    );\r\n  }\r\n\r\n  // Derive 16-byte link ID using BLAKE2b HKDF-style\r\n  const linkId = sodium.crypto_generichash(LINK_ID_SIZE, LINK_ID_CONTEXT, linkSecret);\r\n\r\n  // Derive 32-byte wrapping key using BLAKE2b HKDF-style\r\n  const wrappingKey = sodium.crypto_generichash(KEY_SIZE, LINK_WRAP_CONTEXT, linkSecret);\r\n\r\n  return { linkId, wrappingKey };\r\n}\r\n\r\n/**\r\n * Wrap a single tier key for share link storage.\r\n *\r\n * The wrapped key is stored on the server, encrypted with the link's\r\n * wrapping key (derived from the link secret which server never sees).\r\n *\r\n * @param tierKey - 32-byte tier key to wrap\r\n * @param tier - Access tier of the key\r\n * @param wrappingKey - 32-byte key derived from link secret\r\n * @returns Wrapped tier key structure ready for server storage\r\n */\r\nexport function wrapTierKeyForLink(\r\n  tierKey: Uint8Array,\r\n  tier: AccessTier,\r\n  wrappingKey: Uint8Array\r\n): WrappedTierKey {\r\n  if (wrappingKey.length !== KEY_SIZE) {\r\n    throw new Error(`Wrapping key must be ${KEY_SIZE} bytes, got ${wrappingKey.length}`);\r\n  }\r\n  if (tierKey.length !== KEY_SIZE) {\r\n    throw new Error(`Tier key must be ${KEY_SIZE} bytes, got ${tierKey.length}`);\r\n  }\r\n\r\n  // Wrap the tier key\r\n  const wrappedKey = wrapKey(tierKey, wrappingKey);\r\n\r\n  return {\r\n    tier,\r\n    nonce: wrappedKey.subarray(0, 24),\r\n    encryptedKey: wrappedKey.subarray(24),\r\n  };\r\n}\r\n\r\n/**\r\n * Wrap all relevant tier keys for a share link.\r\n * For AccessTier.FULL, wraps thumbKey, previewKey, and fullKey.\r\n * For AccessTier.PREVIEW, wraps thumbKey and previewKey.\r\n * For AccessTier.THUMB, wraps only thumbKey.\r\n *\r\n * @param tierKeys - Object containing tier keys\r\n * @param accessTier - Maximum access tier to grant\r\n * @param wrappingKey - 32-byte key derived from link secret\r\n * @returns Array of wrapped tier keys\r\n */\r\nexport function wrapAllTierKeysForLink(\r\n  tierKeys: { thumbKey: Uint8Array; previewKey: Uint8Array; fullKey: Uint8Array },\r\n  accessTier: AccessTier,\r\n  wrappingKey: Uint8Array\r\n): WrappedTierKey[] {\r\n  const results: WrappedTierKey[] = [];\r\n\r\n  // Always include thumb key\r\n  results.push(wrapTierKeyForLink(tierKeys.thumbKey, AccessTier.THUMB, wrappingKey));\r\n\r\n  // Include preview key if tier allows\r\n  if (accessTier >= AccessTier.PREVIEW) {\r\n    results.push(wrapTierKeyForLink(tierKeys.previewKey, AccessTier.PREVIEW, wrappingKey));\r\n  }\r\n\r\n  // Include full key if tier allows\r\n  if (accessTier >= AccessTier.FULL) {\r\n    results.push(wrapTierKeyForLink(tierKeys.fullKey, AccessTier.FULL, wrappingKey));\r\n  }\r\n\r\n  return results;\r\n}\r\n\r\n/**\r\n * Unwrap a tier key from share link storage.\r\n *\r\n * @param wrapped - Wrapped tier key from server\r\n * @param tier - Access tier being unwrapped (for AAD validation)\r\n * @param wrappingKey - 32-byte key derived from link secret\r\n * @returns Unwrapped 32-byte tier key\r\n */\r\nexport function unwrapTierKeyFromLink(\r\n  wrapped: WrappedTierKey,\r\n  tier: AccessTier,\r\n  wrappingKey: Uint8Array\r\n): Uint8Array {\r\n  if (wrapped.tier !== tier) {\r\n    throw new Error(`Tier mismatch: expected ${tier}, got ${wrapped.tier}`);\r\n  }\r\n\r\n  // Reconstruct the full wrapped key (nonce || ciphertext)\r\n  const fullWrapped = new Uint8Array(wrapped.nonce.length + wrapped.encryptedKey.length);\r\n  fullWrapped.set(wrapped.nonce, 0);\r\n  fullWrapped.set(wrapped.encryptedKey, wrapped.nonce.length);\r\n\r\n  return unwrapKey(fullWrapped, wrappingKey);\r\n}\r\n\r\n/**\r\n * Encode link secret for URL fragment.\r\n *\r\n * @param linkSecret - 32-byte secret\r\n * @returns Base64url encoded string (no padding)\r\n */\r\nexport function encodeLinkSecret(linkSecret: Uint8Array): string {\r\n  return sodium.to_base64(linkSecret, sodium.base64_variants.URLSAFE_NO_PADDING);\r\n}\r\n\r\n/**\r\n * Decode link secret from URL fragment.\r\n *\r\n * @param encoded - Base64url encoded string\r\n * @returns 32-byte link secret\r\n */\r\nexport function decodeLinkSecret(encoded: string): Uint8Array {\r\n  const decoded = sodium.from_base64(encoded, sodium.base64_variants.URLSAFE_NO_PADDING);\r\n  if (decoded.length !== LINK_SECRET_SIZE) {\r\n    throw new Error(\r\n      `Invalid link secret length: expected ${LINK_SECRET_SIZE}, got ${decoded.length}`\r\n    );\r\n  }\r\n  return decoded;\r\n}\r\n\r\n/**\r\n * Encode link ID for URL path.\r\n *\r\n * @param linkId - 16-byte link ID\r\n * @returns Base64url encoded string (no padding)\r\n */\r\nexport function encodeLinkId(linkId: Uint8Array): string {\r\n  return sodium.to_base64(linkId, sodium.base64_variants.URLSAFE_NO_PADDING);\r\n}\r\n\r\n/**\r\n * Decode link ID from URL path.\r\n *\r\n * @param encoded - Base64url encoded string\r\n * @returns 16-byte link ID\r\n */\r\nexport function decodeLinkId(encoded: string): Uint8Array {\r\n  const decoded = sodium.from_base64(encoded, sodium.base64_variants.URLSAFE_NO_PADDING);\r\n  if (decoded.length !== LINK_ID_SIZE) {\r\n    throw new Error(\r\n      `Invalid link ID length: expected ${LINK_ID_SIZE}, got ${decoded.length}`\r\n    );\r\n  }\r\n  return decoded;\r\n}\r\n\r\n/**\r\n * Create a complete share link URL.\r\n *\r\n * Format: {baseUrl}/s/{linkId}#k={linkSecret}\r\n *\r\n * @param baseUrl - Base URL of the application (e.g., https://photos.example.com)\r\n * @param linkSecret - 32-byte link secret\r\n * @returns Complete shareable URL\r\n */\r\nexport function createShareLinkUrl(baseUrl: string, linkSecret: Uint8Array): string {\r\n  const { linkId } = deriveLinkKeys(linkSecret);\r\n  const encodedLinkId = encodeLinkId(linkId);\r\n  const encodedSecret = encodeLinkSecret(linkSecret);\r\n\r\n  // Remove trailing slash from base URL if present\r\n  const normalizedBase = baseUrl.replace(/\\/$/, '');\r\n\r\n  return `${normalizedBase}/s/${encodedLinkId}#k=${encodedSecret}`;\r\n}\r\n\r\n/**\r\n * Parse a share link URL to extract linkId and linkSecret.\r\n *\r\n * @param url - Complete share link URL\r\n * @returns Object with linkId and linkSecret, or null if invalid\r\n */\r\nexport function parseShareLinkUrl(url: string): {\r\n  linkId: Uint8Array;\r\n  linkSecret: Uint8Array;\r\n} | null {\r\n  try {\r\n    const parsed = new URL(url);\r\n\r\n    // Extract link ID from path: .../s/{linkId} (supports prefix paths)\r\n    const pathMatch = parsed.pathname.match(/\\/s\\/([A-Za-z0-9_-]+)$/);\r\n    // Stryker disable next-line ConditionalExpression,LogicalOperator,BlockStatement: Guard is semantically equivalent - mutation causes exception caught by try-catch, producing same null result\r\n    if (!pathMatch || !pathMatch[1]) {\r\n      return null;\r\n    }\r\n    const linkId = decodeLinkId(pathMatch[1]);\r\n\r\n    // Extract link secret from fragment: #k={linkSecret}\r\n    const fragment = parsed.hash;\r\n    const secretMatch = fragment.match(/^#k=([A-Za-z0-9_-]+)$/);\r\n    // Stryker disable next-line ConditionalExpression,LogicalOperator,BlockStatement: Guard is semantically equivalent - mutation causes exception caught by try-catch, producing same null result\r\n    if (!secretMatch || !secretMatch[1]) {\r\n      return null;\r\n    }\r\n    const linkSecret = decodeLinkSecret(secretMatch[1]);\r\n\r\n    // Verify linkId matches derived value\r\n    const { linkId: derivedLinkId } = deriveLinkKeys(linkSecret);\r\n    if (!sodium.memcmp(linkId, derivedLinkId)) {\r\n      return null; // linkId doesn't match secret - tampered or invalid\r\n    }\r\n\r\n    return { linkId, linkSecret };\r\n  } catch (_error: unknown) {\r\n    // Catch any parsing or validation errors\r\n    return null;\r\n  }\r\n}\r\n"}},"schemaVersion":"1.0","thresholds":{"high":80,"low":60,"break":50},"testFiles":{"tests/link-sharing.test.ts":{"tests":[{"id":"0","name":"link-sharing generateLinkSecret generates 32-byte random secret"},{"id":"1","name":"link-sharing generateLinkSecret generates unique secrets"},{"id":"2","name":"link-sharing deriveLinkKeys derives linkId and wrappingKey from secret"},{"id":"3","name":"link-sharing deriveLinkKeys derives deterministic keys from same secret"},{"id":"4","name":"link-sharing deriveLinkKeys derives different keys from different secrets"},{"id":"5","name":"link-sharing deriveLinkKeys rejects invalid secret length"},{"id":"6","name":"link-sharing wrapTierKeyForLink / unwrapTierKeyFromLink round-trips tier key wrapping"},{"id":"7","name":"link-sharing wrapTierKeyForLink / unwrapTierKeyFromLink produces different ciphertext for different tiers"},{"id":"8","name":"link-sharing wrapTierKeyForLink / unwrapTierKeyFromLink fails to unwrap with wrong tier"},{"id":"9","name":"link-sharing wrapTierKeyForLink / unwrapTierKeyFromLink fails to unwrap with wrong wrapping key"},{"id":"10","name":"link-sharing wrapTierKeyForLink / unwrapTierKeyFromLink rejects invalid wrapping key length"},{"id":"11","name":"link-sharing wrapTierKeyForLink / unwrapTierKeyFromLink rejects invalid tier key length"},{"id":"12","name":"link-sharing wrapAllTierKeysForLink wraps keys up to specified access tier"},{"id":"13","name":"link-sh link-sharing mutation testing - killing surviving mutants parseShareLinkUrl regex anchoring rejects URL with fragment containing extra content before #k="},{"id":"44","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl regex anchoring rejects URL with fragment containing extra content after secret"},{"id":"45","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl conditional guards returns null when pathname does not contain /s/"},{"id":"46","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl conditional guards returns null when pathname has /s/ but no linkId"},{"id":"47","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl conditional guards returns null when fragment is empty"},{"id":"48","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl conditional guards returns null when fragment has #k= but no value"},{"id":"49","name":"link-sharing mutation testing - killing surviving mutants deriveLinkKeys context strings produces different linkId and wrappingKey (verifies different contexts)"},{"id":"50","name":"link-sharing mutation testing - killing surviving mutants deriveLinkKeys context strings produces consistent results across multiple derivations"},{"id":"51","name":"link-sharing mutation testing - killing surviving mutants deriveLinkKeys context strings different secrets produce completely different linkIds"},{"id":"52","name":"link-sharing mutation testing - killing surviving mutants deriveLinkKeys context strings linkId derivation uses proper context (verifiable via known input)"},{"id":"53","name":"link-sharing mutation testing - killing surviving mutants deriveLinkKeys context strings LINK_ID_CONTEXT affects linkId derivation (kills empty string mutation)"},{"id":"54","name":"link-sharing mutation testing - killing surviving mutants deriveLinkKeys context strings LINK_WRAP_CONTEXT affects wrappingKey derivation (kills empty string mutation)"},{"id":"55","name":"link-sharing mutation testing - killing surviving mutants wrapTierKeyForLink validation edge cases (spy-based) throws before calling wrapKey when wrapping key is invalid length"},{"id":"56","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl path guard edge cases returns null when path matches /s/ but regex capture group is empty"},{"id":"57","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl path guard edge cases returns null when no /s/ pattern exists at all (tests !pathMatch)"},{"id":"58","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl path guard edge cases returns null for path ending with just /s (no trailing slash or id)"},{"id":"59","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl path guard edge cases returns null (not throws) for invalid path - verifies early return"},{"id":"60","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl path guard edge cases gracefully returns null for path with /s/ in wrong position"},{"id":"61","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl fragment guard edge cases returns null when fragment has content before k= parameter"},{"id":"62","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl fragment guard edge cases returns null when fragment exists but has no k= at all"},{"id":"63","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl fragment guard edge cases returns null when fragment is just hash with no content"},{"id":"64","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl fragment guard edge cases returns null for fragment with k= but missing value (tests !secretMatch[1])"},{"id":"65","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl fragment guard edge cases returns null (not throws) when fragment is missing - verifies early return"},{"id":"66","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl fragment guard edge cases returns null for fragment with wrong key name"},{"id":"67","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl fragment guard edge cases rejects fragment with leading content before #k= (kills ^ anchor removal)"},{"id":"68","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl mutation-killing assertions path guard at L244 prevents decodeLinkId call - from_base64 NOT called"},{"id":"69","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl mutation-killing assertions fragment guard at L252 prevents decodeLinkSecret call - from_base64 called once"},{"id":"70","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl mutation-killing assertions valid URL calls from_base64 exactly twice (linkId + secret)"},{"id":"71","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl mutation-killing assertions || to && mutation at L244 would crash on null access"},{"id":"72","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl mutation-killing assertions || to && mutation at L252 would crash on null access"},{"id":"73","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl mutation-killing assertions BlockStatement removal at L244 would call from_base64"},{"id":"74","name":"link-sharing mutation testing - killing surviving mutants parseShareLinkUrl mutation-killing assertions BlockStatement removal at L252 would call from_base64 twice"}],"source":"import { describe, it, expect, beforeAll, vi, afterEach } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport {\r\n  generateLinkSecret,\r\n  deriveLinkKeys,\r\n  wrapTierKeyForLink,\r\n  unwrapTierKeyFromLink,\r\n  wrapAllTierKeysForLink,\r\n  encodeLinkSecret,\r\n  decodeLinkSecret,\r\n  encodeLinkId,\r\n  decodeLinkId,\r\n  createShareLinkUrl,\r\n  parseShareLinkUrl,\r\n} from '../src/link-sharing';\r\nimport { generateEpochKey } from '../src/epochs';\r\nimport { AccessTier } from '../src/types';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('link-sharing', () => {\r\n  describe('generateLinkSecret', () => {\r\n    it('generates 32-byte random secret', () => {\r\n      const secret = generateLinkSecret();\r\n      expect(secret).toBeInstanceOf(Uint8Array);\r\n      expect(secret.length).toBe(32);\r\n    });\r\n\r\n    it('generates unique secrets', () => {\r\n      const s1 = generateLinkSecret();\r\n      const s2 = generateLinkSecret();\r\n      expect(s1).not.toEqual(s2);\r\n    });\r\n  });\r\n\r\n  describe('deriveLinkKeys', () => {\r\n    it('derives linkId and wrappingKey from secret', () => {\r\n      const secret = generateLinkSecret();\r\n      const keys = deriveLinkKeys(secret);\r\n      \r\n      expect(keys.linkId).toBeInstanceOf(Uint8Array);\r\n      expect(keys.linkId.length).toBe(16);\r\n      expect(keys.wrappingKey).toBeInstanceOf(Uint8Array);\r\n      expect(keys.wrappingKey.length).toBe(32);\r\n    });\r\n\r\n    it('derives deterministic keys from same secret', () => {\r\n      const secret = generateLinkSecret();\r\n      const keys1 = deriveLinkKeys(secret);\r\n      const keys2 = deriveLinkKeys(secret);\r\n      \r\n      expect(keys1.linkId).toEqual(keys2.linkId);\r\n      expect(keys1.wrappingKey).toEqual(keys2.wrappingKey);\r\n    });\r\n\r\n    it('derives different keys from different secrets', () => {\r\n      const s1 = generateLinkSecret();\r\n      const s2 = generateLinkSecret();\r\n      const keys1 = deriveLinkKeys(s1);\r\n      const keys2 = deriveLinkKeys(s2);\r\n      \r\n      expect(keys1.linkId).not.toEqual(keys2.linkId);\r\n      expect(keys1.wrappingKey).not.toEqual(keys2.wrappingKey);\r\n    });\r\n\r\n    it('rejects invalid secret length', () => {\r\n      expect(() => deriveLinkKeys(new Uint8Array(16))).toThrow('32 bytes');\r\n    });\r\n  });\r\n\r\n  describe('wrapTierKeyForLink / unwrapTierKeyFromLink', () => {\r\n    it('round-trips tier key wrapping', () => {\r\n      const secret = generateLinkSecret();\r\n      const { wrappingKey } = deriveLinkKeys(secret);\r\n      const epoch = generateEpochKey(1);\r\n      \r\n      const wrapped = wrapTierKeyForLink(epoch.thumbKey, AccessTier.THUMB, wrappingKey);\r\n      const unwrapped = unwrapTierKeyFromLink(wrapped, AccessTier.THUMB, wrappingKey);\r\n      \r\n      expect(unwrapped).toEqual(epoch.thumbKey);\r\n    });\r\n\r\n    it('produces different ciphertext for different tiers', () => {\r\n      const secret = generateLinkSecret();\r\n      const { wrappingKey } = deriveLinkKeys(secret);\r\n      const epoch = generateEpochKey(1);\r\n      \r\n      const wrapped1 = wrapTierKeyForLink(epoch.thumbKey, AccessTier.THUMB, wrappingKey);\r\n      const wrapped2 = wrapTierKeyForLink(epoch.previewKey, AccessTier.PREVIEW, wrappingKey);\r\n      const wrapped3 = wrapTierKeyForLink(epoch.fullKey, AccessTier.FULL, wrappingKey);\r\n      \r\n      // Ciphertexts should differ (different keys, different nonces)\r\n      expect(wrapped1.encryptedKey).not.toEqual(wrapped2.encryptedKey);\r\n      expect(wrapped2.encryptedKey).not.toEqual(wrapped3.encryptedKey);\r\n    });\r\n\r\n    it('fails to unwrap with wrong tier', () => {\r\n      const secret = generateLinkSecret();\r\n      const { wrappingKey } = deriveLinkKeys(secret);\r\n      const epoch = generateEpochKey(1);\r\n      \r\n      const wrapped = wrapTierKeyForLink(epoch.thumbKey, AccessTier.THUMB, wrappingKey);\r\n      \r\n      // Try to unwrap with wrong tier\r\n      expect(() => unwrapTierKeyFromLink(wrapped, AccessTier.PREVIEW, wrappingKey))\r\n        .toThrow('mismatch');\r\n    });\r\n\r\n    it('fails to unwrap with wrong wrapping key', () => {\r\n      const secret1 = generateLinkSecret();\r\n      const secret2 = generateLinkSecret();\r\n      const { wrappingKey: wk1 } = deriveLinkKeys(secret1);\r\n      const { wrappingKey: wk2 } = deriveLinkKeys(secret2);\r\n      const epoch = generateEpochKey(1);\r\n      \r\n      const wrapped = wrapTierKeyForLink(epoch.thumbKey, AccessTier.THUMB, wk1);\r\n      \r\n      expect(() => unwrapTierKeyFromLink(wrapped, AccessTier.THUMB, wk2))\r\n        .toThrow();\r\n    });\r\n\r\n    it('rejects invalid wrapping key length', () => {\r\n      const epoch = generateEpochKey(1);\r\n      const invalidKey = new Uint8Array(16);\r\n      \r\n      expect(() => wrapTierKeyForLink(epoch.thumbKey, AccessTier.THUMB, invalidKey))\r\n        .toThrow('32 bytes');\r\n    });\r\n\r\n    it('rejects invalid tier key length', () => {\r\n      const secret = generateLinkSecret();\r\n      const { wrappingKey } = deriveLinkKeys(secret);\r\n      const invalidTierKey = new Uint8Array(16);\r\n      \r\n      expect(() => wrapTierKeyForLink(invalidTierKey, AccessTier.THUMB, wrappingKey))\r\n        .toThrow('32 bytes');\r\n    });\r\n  });\r\n\r\n  describe('wrapAllTierKeysForLink', () => {\r\n    it('wraps keys up to specified access tier', () => {\r\n      const secret = generateLinkSecret();\r\n      const { wrappingKey } = deriveLinkKeys(secret);\r\n      const epoch = generateEpochKey(1);\r\n      \r\n      // Thumb only\r\n      const thumbOnly = wrapAllTierKeysForLink(\r\n        { thumbKey: epoch.thumbKey, previewKey: epoch.previewKey, fullKey: epoch.fullKey },\r\n        AccessTier.THUMB,\r\n        wrappingKey\r\n      );\r\n      expect(thumbOnly.length).toBe(1);\r\n      expect(thumbOnly[0].tier).toBe(AccessTier.THUMB);\r\n      \r\n      // Preview includes thumb\r\n      const preview = wrapAllTierKeysForLink(\r\n        { thumbKey: epoch.thumbKey, previewKey: epoch.previewKey, fullKey: epoch.fullKey },\r\n        AccessTier.PREVIEW,\r\n        wrappingKey\r\n      );\r\n      expect(preview.length).toBe(2);\r\n      expect(preview.map(w => w.tier).sort()).toEqual([AccessTier.THUMB, AccessTier.PREVIEW].sort());\r\n      \r\n      // Full includes all\r\n      const full = wrapAllTierKeysForLink(\r\n        { thumbKey: epoch.thumbKey, previewKey: epoch.previewKey, fullKey: epoch.fullKey },\r\n        AccessTier.FULL,\r\n        wrappingKey\r\n      );\r\n      expect(full.length).toBe(3);\r\n    });\r\n\r\n    it('all wrapped keys can be unwrapped', () => {\r\n      const secret = generateLinkSecret();\r\n      const { wrappingKey } = deriveLinkKeys(secret);\r\n      const epoch = generateEpochKey(1);\r\n      \r\n      const wrapped = wrapAllTierKeysForLink(\r\n        { thumbKey: epoch.thumbKey, previewKey: epoch.previewKey, fullKey: epoch.fullKey },\r\n        AccessTier.FULL,\r\n        wrappingKey\r\n      );\r\n      \r\n      for (const w of wrapped) {\r\n        const unwrapped = unwrapTierKeyFromLink(w, w.tier, wrappingKey);\r\n        switch (w.tier) {\r\n          case AccessTier.THUMB:\r\n            expect(unwrapped).toEqual(epoch.thumbKey);\r\n            break;\r\n          case AccessTier.PREVIEW:\r\n            expect(unwrapped).toEqual(epoch.previewKey);\r\n            break;\r\n          case AccessTier.FULL:\r\n            expect(unwrapped).toEqual(epoch.fullKey);\r\n            break;\r\n        }\r\n      }\r\n    });\r\n  });\r\n\r\n  describe('encodeLinkSecret / decodeLinkSecret', () => {\r\n    it('round-trips secret through base64url', () => {\r\n      const secret = generateLinkSecret();\r\n      const encoded = encodeLinkSecret(secret);\r\n      const decoded = decodeLinkSecret(encoded);\r\n      \r\n      expect(decoded).toEqual(secret);\r\n    });\r\n\r\n    it('produces URL-safe characters only', () => {\r\n      const secret = generateLinkSecret();\r\n      const encoded = encodeLinkSecret(secret);\r\n      \r\n      // Should only contain alphanumeric, hyphen, underscore\r\n      expect(encoded).toMatch(/^[A-Za-z0-9_-]+$/);\r\n      // Should not contain padding\r\n      expect(encoded).not.toContain('=');\r\n    });\r\n\r\n    it('rejects invalid base64url', () => {\r\n      expect(() => decodeLinkSecret('!!!invalid!!!')).toThrow();\r\n    });\r\n\r\n    it('rejects wrong length after decode', () => {\r\n      // Encode a 16-byte value instead of 32\r\n      const short = sodium.to_base64(new Uint8Array(16), sodium.base64_variants.URLSAFE_NO_PADDING);\r\n      expect(() => decodeLinkSecret(short)).toThrow('32');\r\n    });\r\n  });\r\n\r\n  describe('createShareLinkUrl / parseShareLinkUrl', () => {\r\n    it('creates valid share URL', () => {\r\n      const secret = generateLinkSecret();\r\n      \r\n      const url = createShareLinkUrl('https://photos.example.com', secret);\r\n      \r\n      expect(url).toMatch(/^https:\\/\\/photos\\.example\\.com\\/s\\/[A-Za-z0-9_-]+#k=[A-Za-z0-9_-]+$/);\r\n    });\r\n\r\n    it('round-trips through URL creation/parsing', () => {\r\n      const secret = generateLinkSecret();\r\n      const { linkId } = deriveLinkKeys(secret);\r\n      \r\n      const url = createShareLinkUrl('https://photos.example.com', secret);\r\n      const parsed = parseShareLinkUrl(url);\r\n      \r\n      expect(parsed).not.toBeNull();\r\n      expect(parsed!.linkId).toEqual(linkId);\r\n      expect(parsed!.linkSecret).toEqual(secret);\r\n    });\r\n\r\n    it('parses URL with path prefix', () => {\r\n      const secret = generateLinkSecret();\r\n      const { linkId } = deriveLinkKeys(secret);\r\n      \r\n      const url = createShareLinkUrl('https://photos.example.com/app', secret);\r\n      const parsed = parseShareLinkUrl(url);\r\n      \r\n      expect(parsed).not.toBeNull();\r\n      expect(parsed!.linkId).toEqual(linkId);\r\n      expect(parsed!.linkSecret).toEqual(secret);\r\n    });\r\n\r\n    it('returns null for URL without /s/ path', () => {\r\n      const result = parseShareLinkUrl('https://photos.example.com/album/123#k=abc');\r\n      expect(result).toBeNull();\r\n    });\r\n\r\n    it('returns null for URL without fragment key', () => {\r\n      const secret = generateLinkSecret();\r\n      const { linkId } = deriveLinkKeys(secret);\r\n      const encoded = sodium.to_base64(linkId, sodium.base64_variants.URLSAFE_NO_PADDING);\r\n      \r\n      const result = parseShareLinkUrl(`https://photos.example.com/s/${encoded}`);\r\n      expect(result).toBeNull();\r\n    });\r\n\r\n    it('returns null for URL with invalid linkId length', () => {\r\n      const shortId = sodium.to_base64(new Uint8Array(8), sodium.base64_variants.URLSAFE_NO_PADDING);\r\n      const secret = generateLinkSecret();\r\n      const encodedSecret = encodeLinkSecret(secret);\r\n      \r\n      const result = parseShareLinkUrl(`https://photos.example.com/s/${shortId}#k=${encodedSecret}`);\r\n      expect(result).toBeNull();\r\n    });\r\n\r\n    it('returns null for completely invalid URL', () => {\r\n      // This triggers the catch block because new URL() throws for invalid URLs\r\n      // Use undefined/null-like input that will cause URL constructor to throw\r\n      const result = parseShareLinkUrl('://');\r\n      expect(result).toBeNull();\r\n    });\r\n\r\n    it('returns null for another invalid URL format', () => {\r\n      const result = parseShareLinkUrl('');\r\n      expect(result).toBeNull();\r\n    });\r\n\r\n    it('returns null for URL with invalid base64 in linkId', () => {\r\n      const secret = generateLinkSecret();\r\n      const encodedSecret = encodeLinkSecret(secret);\r\n      \r\n      // Use invalid base64 characters for linkId\r\n      const result = parseShareLinkUrl(`https://photos.example.com/s/@@@invalid@@@#k=${encodedSecret}`);\r\n      expect(result).toBeNull();\r\n    });\r\n\r\n    it('returns null for URL with invalid base64 in secret', () => {\r\n      const secret = generateLinkSecret();\r\n      const { linkId } = deriveLinkKeys(secret);\r\n      const encoded = sodium.to_base64(linkId, sodium.base64_variants.URLSAFE_NO_PADDING);\r\n      \r\n      // Use invalid base64 characters for secret\r\n      const result = parseShareLinkUrl(`https://photos.example.com/s/${encoded}#k=!!!invalid!!!`);\r\n      expect(result).toBeNull();\r\n    });\r\n\r\n    it('returns null for tampered linkId that does not match secret', () => {\r\n      // Create a valid link first\r\n      const secret = generateLinkSecret();\r\n      const encodedSecret = encodeLinkSecret(secret);\r\n      \r\n      // Create a DIFFERENT linkId that doesn't match the secret\r\n      const wrongLinkId = sodium.randombytes_buf(16);\r\n      const wrongEncodedLinkId = sodium.to_base64(wrongLinkId, sodium.base64_variants.URLSAFE_NO_PADDING);\r\n      \r\n      // This URL has valid format but linkId doesn't match the secret's derived linkId\r\n      const result = parseShareLinkUrl(`https://photos.example.com/s/${wrongEncodedLinkId}#k=${encodedSecret}`);\r\n      expect(result).toBeNull();\r\n    });\r\n  });\r\n\r\n  describe('integration: complete link sharing flow', () => {\r\n    it('simulates creating and using a share link', async () => {\r\n      // === STEP 1: Album owner creates share link ===\r\n      const epoch = generateEpochKey(1);\r\n      const linkSecret = generateLinkSecret();\r\n      const { linkId, wrappingKey } = deriveLinkKeys(linkSecret);\r\n      \r\n      // Owner wraps tier keys for the link (preview access)\r\n      const wrappedKeys = wrapAllTierKeysForLink(\r\n        { thumbKey: epoch.thumbKey, previewKey: epoch.previewKey, fullKey: epoch.fullKey },\r\n        AccessTier.PREVIEW,\r\n        wrappingKey\r\n      );\r\n      \r\n      // Create the URL\r\n      const shareUrl = createShareLinkUrl('https://photos.example.com', linkSecret);\r\n      \r\n      // === STEP 2: Simulate storing wrapped keys on server ===\r\n      const serverRecord = {\r\n        linkId: sodium.to_base64(linkId, sodium.base64_variants.URLSAFE_NO_PADDING),\r\n        epochId: epoch.epochId,\r\n        accessTier: AccessTier.PREVIEW,\r\n        wrappedKeys: wrappedKeys.map(w => ({\r\n          tier: w.tier,\r\n          nonce: sodium.to_base64(w.nonce, sodium.base64_variants.URLSAFE_NO_PADDING),\r\n          encryptedKey: sodium.to_base64(w.encryptedKey, sodium.base64_variants.URLSAFE_NO_PADDING),\r\n        })),\r\n      };\r\n      \r\n      // === STEP 3: Visitor opens share link ===\r\n      const parsed = parseShareLinkUrl(shareUrl);\r\n      expect(parsed).not.toBeNull();\r\n      const visitorKeys = deriveLinkKeys(parsed!.linkSecret);\r\n      \r\n      // Verify linkId matches\r\n      expect(visitorKeys.linkId).toEqual(linkId);\r\n      \r\n      // === STEP 4: Server sends wrapped keys, visitor unwraps ===\r\n      for (const stored of serverRecord.wrappedKeys) {\r\n        const wrapped = {\r\n          tier: stored.tier as AccessTier,\r\n          nonce: sodium.from_base64(stored.nonce, sodium.base64_variants.URLSAFE_NO_PADDING),\r\n          encryptedKey: sodium.from_base64(stored.encryptedKey, sodium.base64_variants.URLSAFE_NO_PADDING),\r\n        };\r\n        \r\n        const tierKey = unwrapTierKeyFromLink(wrapped, wrapped.tier, visitorKeys.wrappingKey);\r\n        \r\n        // Verify correct tier key recovered\r\n        if (wrapped.tier === AccessTier.THUMB) {\r\n          expect(tierKey).toEqual(epoch.thumbKey);\r\n        } else if (wrapped.tier === AccessTier.PREVIEW) {\r\n          expect(tierKey).toEqual(epoch.previewKey);\r\n        }\r\n      }\r\n      \r\n      // === STEP 5: Visitor should NOT have full key ===\r\n      expect(wrappedKeys.find(w => w.tier === AccessTier.FULL)).toBeUndefined();\r\n    });\r\n\r\n    it('supports multiple epochs with same link secret', () => {\r\n      const epoch1 = generateEpochKey(1);\r\n      const epoch2 = generateEpochKey(2);\r\n      const linkSecret = generateLinkSecret();\r\n      const { wrappingKey } = deriveLinkKeys(linkSecret);\r\n      \r\n      // Wrap keys for both epochs\r\n      const wrapped1 = wrapAllTierKeysForLink(\r\n        { thumbKey: epoch1.thumbKey, previewKey: epoch1.previewKey, fullKey: epoch1.fullKey },\r\n        AccessTier.FULL,\r\n        wrappingKey\r\n      );\r\n      const wrapped2 = wrapAllTierKeysForLink(\r\n        { thumbKey: epoch2.thumbKey, previewKey: epoch2.previewKey, fullKey: epoch2.fullKey },\r\n        AccessTier.FULL,\r\n        wrappingKey\r\n      );\r\n      \r\n      // All can be unwrapped with same wrapping key\r\n      for (const w of wrapped1) {\r\n        const key = unwrapTierKeyFromLink(w, w.tier, wrappingKey);\r\n        expect(key.length).toBe(32);\r\n      }\r\n      for (const w of wrapped2) {\r\n        const key = unwrapTierKeyFromLink(w, w.tier, wrappingKey);\r\n        expect(key.length).toBe(32);\r\n      }\r\n    });\r\n  });\r\n\r\n  describe('parseShareLinkUrl error handling', () => {\r\n    afterEach(() => {\r\n      vi.restoreAllMocks();\r\n    });\r\n\r\n    it('returns null when internal operation throws unexpectedly', () => {\r\n      // Create a valid URL first\r\n      const secret = generateLinkSecret();\r\n      const url = createShareLinkUrl('https://photos.example.com', secret);\r\n      \r\n      // Mock sodium.memcmp to throw (it's called after all validations pass)\r\n      const originalMemcmp = sodium.memcmp;\r\n      const mockMemcmp = () => {\r\n        throw new Error('Simulated internal failure');\r\n      };\r\n      (sodium as Record<"+"string, unknown>).memcmp = mockMemcmp;\r\n      \r\n      try {\r\n        const result = parseShareLinkUrl(url);\r\n        expect(result).toBeNull();\r\n      } finally {\r\n        (sodium as Record<"+"string, unknown>).memcmp = originalMemcmp;\r\n      }\r\n    });\r\n  });\r\n\r\n  describe('mutation testing - killing surviving mutants', () => {\r\n    describe('wrapTierKeyForLink wrapping key validation', () => {\r\n      it('rejects wrapping key of 31 bytes (one below threshold)', () => {\r\n gKey (verifies different contexts)', () => {\r\n        const secret = generateLinkSecret();\r\n        const { linkId, wrappingKey } = deriveLinkKeys(secret);\r\n        \r\n        // If contexts were the same (or empty), these would be related\r\n        // linkId is 16 bytes, wrappingKey is 32 bytes, so they can't be equal\r\n        // But we verify they're derived differently by checking the first 16 bytes\r\n        const wrappingKeyPrefix = wrappingKey.subarray(0, 16);\r\n        expect(linkId).not.toEqual(wrappingKeyPrefix);\r\n      });\r\n\r\n      it('produces consistent results across multiple derivations', () => {\r\n        const secret = generateLinkSecret();\r\n        \r\n        const result1 = deriveLinkKeys(secret);\r\n        const result2 = deriveLinkKeys(secret);\r\n        \r\n        // Same secret should produce identical results\r\n        expect(result1.linkId).toEqual(result2.linkId);\r\n        expect(result1.wrappingKey).toEqual(result2.wrappingKey);\r\n      });\r\n\r\n      it('different secrets produce completely different linkIds', () => {\r\n        const secret1 = generateLinkSecret();\r\n        const secret2 = generateLinkSecret();\r\n        \r\n        const keys1 = deriveLinkKeys(secret1);\r\n        const keys2 = deriveLinkKeys(secret2);\r\n        \r\n        // Verify no overlap (kills mutation that makes context empty)\r\n        expect(keys1.linkId).not.toEqual(keys2.linkId);\r\n        expect(keys1.wrappingKey).not.toEqual(keys2.wrappingKey);\r\n      });\r\n\r\n      it('linkId derivation uses proper context (verifiable via known input)', () => {\r\n        // Using a fixed secret to verify context string is being used\r\n        const fixedSecret = new Uint8Array(32);\r\n        for (let i = 0; i <"+" 32; i++) {\r\n          fixedSecret[i] = i;\r\n        }\r\n        \r\n        const { linkId, wrappingKey } = deriveLinkKeys(fixedSecret);\r\n        \r\n        // With empty context, BLAKE2b would produce deterministic but different output\r\n        // We verify the output is non-zero and has expected structure\r\n        expect(linkId.length).toBe(16);\r\n        expect(wrappingKey.length).toBe(32);\r\n        \r\n        // Verify they're not all zeros (which could happen with bad implementation)\r\n        const linkIdSum = linkId.reduce((a, b) => a + b, 0);\r\n        const wrappingKeySum = wrappingKey.reduce((a, b) => a + b, 0);\r\n        expect(linkIdSum).toBeGreaterThan(0);\r\n        expect(wrappingKeySum).toBeGreaterThan(0);\r\n      });\r\n\r\n      it('LINK_ID_CONTEXT affects linkId derivation (kills empty string mutation)', () => {\r\n        // Using a known fixed secret to verify context affects output\r\n        const fixedSecret = new Uint8Array(32).fill(0xAB);\r\n        const { linkId } = deriveLinkKeys(fixedSecret);\r\n        \r\n        // Manually compute what BLAKE2b would produce with empty context\r\n        // If context is \"\", this would be: crypto_generichash(16, \"\", fixedSecret)\r\n        // We compute directly using sodium to compare\r\n        const emptyContextHash = sodium.crypto_generichash(16, new Uint8Array(0), fixedSecret);\r\n        \r\n        // The actual linkId should differ because it uses non-empty context\r\n        expect(linkId).not.toEqual(emptyContextHash);\r\n      });\r\n\r\n      it('LINK_WRAP_CONTEXT affects wrappingKey derivation (kills empty string mutation)', () => {\r\n        // Using a known fixed secret to verify context affects output\r\n        const fixedSecret = new Uint8Array(32).fill(0xCD);\r\n        const { wrappingKey } = deriveLinkKeys(fixedSecret);\r\n        \r\n        // Manually compute what BLAKE2b would produce with empty context\r\n        const emptyContextHash = sodium.crypto_generichash(32, new Uint8Array(0), fixedSecret);\r\n        \r\n        // The actual wrappingKey should differ because it uses non-empty context\r\n        expect(wrappingKey).not.toEqual(emptyContextHash);\r\n secret);\r\n        const encodedLinkId = encodeLinkId(linkId);\r\n        const encodedSecret = encodeLinkSecret(secret);\r\n        \r\n        // Uses 's=' instead of 'k='\r\n        const result = parseShareLinkUrl(`https://photos.example.com/s/${encodedLinkId}#s=${encodedSecret}`);\r\n        expect(result).toBeNull();\r\n      });\r\n\r\n      it('rejects fragment with leading content before #k= (kills ^ anchor removal)', () => {\r\n        const secret = generateLinkSecret();\r\n        const { linkId } = deriveLinkKeys(secret);\r\n        const encodedLinkId = encodeLinkId(linkId);\r\n        const encodedSecret = encodeLinkSecret(secret);\r\n        \r\n        // Fragment has leading content: #prefix#k=...\r\n        // Without ^ anchor, the regex would match k= anywhere\r\n        const result = parseShareLinkUrl(`https://photos.example.com/s/${encodedLinkId}#prefix#k=${encodedSecret}`);\r\n        expect(result).toBeNull();\r\n      });\r\n    });\r\n\r\n    describe('parseShareLinkUrl mutation-killing assertions', () => {\r\n      afterEach(() => {\r\n        vi.restoreAllMocks();\r\n      });\r\n\r\n      it('path guard at L244 prevents decodeLinkId call - from_base64 NOT called', () => {\r\n        const secret = generateLinkSecret();\r\n        const encodedSecret = encodeLinkSecret(secret);\r\n        \r\n        // Spy on sodium.from_base64 which is called by decodeLinkId\r\n        const spy = vi.spyOn(sodium, 'from_base64');\r\n        \r\n        // URL with no /s/ pattern - pathMatch is null\r\n        // If L244 check works, we return null BEFORE calling decodeLinkId\r\n        // If L244 check is mutated to false, code tries decodeLinkId(undefined) which calls from_base64\r\n        const result = parseShareLinkUrl(`https://photos.example.com/album#k=${encodedSecret}`);\r\n        \r\n        expect(result).toBeNull();\r\n        // CRITICAL: from_base64 should NOT have been called\r\n        // If it was called, the L244 early return did not happen\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('fragment guard at L252 prevents decodeLinkSecret call - from_base64 called once', () => {\r\n        const secret = generateLinkSecret();\r\n        const { linkId } = deriveLinkKeys(secret);\r\n        const encodedLinkId = encodeLinkId(linkId);\r\n        \r\n        // Spy on sodium.from_base64\r\n        const spy = vi.spyOn(sodium, 'from_base64');\r\n        \r\n        // Valid path but invalid fragment (no k= pattern)\r\n        // from_base64 should be called once for linkId, but NOT for secret\r\n        const result = parseShareLinkUrl(`https://photos.example.com/s/${encodedLinkId}#something`);\r\n        \r\n        expect(result).toBeNull();\r\n        // from_base64 called exactly once (for linkId only)\r\n        // If L252 check is mutated to false, it would try decodeLinkSecret(undefined) = 2 calls\r\n        expect(spy).toHaveBeenCalledTimes(1);\r\n      });\r\n\r\n      it('valid URL calls from_base64 exactly twice (linkId + secret)', () => {\r\n        const secret = generateLinkSecret();\r\n        const { linkId } = deriveLinkKeys(secret);\r\n        const encodedLinkId = encodeLinkId(linkId);\r\n        const encodedSecret = encodeLinkSecret(secret);\r\n        \r\n        const spy = vi.spyOn(sodium, 'from_base64');\r\n        \r\n        // Valid URL - should call from_base64 twice\r\n        const result = parseShareLinkUrl(`https://photos.example.com/s/${encodedLinkId}#k=${encodedSecret}`);\r\n        \r\n        expect(result).not.toBeNull();\r\n        expect(spy).toHaveBeenCalledTimes(2);\r\n      });\r\n\r\n      it('|| to && mutation at L244 would crash on null access', () => {\r\n        // This test verifies the short-circuit behavior of ||\r\n        // When pathMatch is null, !pathMatch is true, || short-circuits, returns null\r\n        // With &&, it would try to access pathMatch[1] on null = crash\r\n        // But the crash is caught by try-catch, so we test via spy\r\n        \r\n        const secret = generateLinkSecret();\r\n        const encodedSecret = encodeLinkSecret(secret);\r\n        \r\n        const spy = vi.spyOn(sodium, 'from_base64');\r\n        \r\n        // No /s/ in path - pathMatch will be null\r\n        const result = parseShareLinkUrl(`https://photos.example.com/noshare#k=${encodedSecret}`);\r\n        \r\n        expect(result).toBeNull();\r\n        // With correct || logic, from_base64 is never called\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('|| to && mutation at L252 would crash on null access', () => {\r\n        const secret = generateLinkSecret();\r\n        const { linkId } = deriveLinkKeys(secret);\r\n        const encodedLinkId = encodeLinkId(linkId);\r\n        \r\n        const spy = vi.spyOn(sodium, 'from_base64');\r\n        \r\n        // Valid path but no k= in fragment - secretMatch will be null\r\n        const result = parseShareLinkUrl(`https://photos.example.com/s/${encodedLinkId}#nok`);\r\n        \r\n        expect(result).toBeNull();\r\n        // With correct || logic, from_base64 called once for linkId only\r\n        expect(spy).toHaveBeenCalledTimes(1);\r\n      });\r\n\r\n      it('BlockStatement removal at L244 would call from_base64', () => {\r\n        const secret = generateLinkSecret();\r\n        const encodedSecret = encodeLinkSecret(secret);\r\n        \r\n        const spy = vi.spyOn(sodium, 'from_base64');\r\n        \r\n        // Path without valid /s/{id} pattern\r\n        const result = parseShareLinkUrl(`https://photos.example.com/share#k=${encodedSecret}`);\r\n        \r\n        expect(result).toBeNull();\r\n        // If BlockStatement is removed, code continues to decodeLinkId which calls from_base64\r\n        // With proper code, we return null and from_base64 is never called\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('BlockStatement removal at L252 would call from_base64 twice', () => {\r\n        const secret = generateLinkSecret();\r\n        const { linkId } = deriveLinkKeys(secret);\r\n        const encodedLinkId = encodeLinkId(linkId);\r\n        \r\n        const spy = vi.spyOn(sodium, 'from_base64');\r\n        \r\n        // Valid path but fragment without k=\r\n        const result = parseShareLinkUrl(`https://photos.example.com/s/${encodedLinkId}#nomatch`);\r\n        \r\n        expect(result).toBeNull();\r\n        // If BlockStatement is removed, code continues to decodeLinkSecret which calls from_base64\r\n        // With proper code, from_base64 is called once (for linkId only)\r\n        expect(spy).toHaveBeenCalledTimes(1);\r\n      });\r\n    });\r\n  });\r\n});\r\n"},"tests/signer.test.ts":{"tests":[{"id":"75","name":"signer manifest signing produces valid signatures"},{"id":"76","name":"signer manifest signing rejects tampered manifest"},{"id":"77","name":"signer manifest signing rejects wrong public key"},{"id":"78","name":"signer manifest signing throws with correct error message and code for invalid key length (too short)"},{"id":"79","name":"signer manifest signing throws with correct error message for invalid key length (too long)"},{"id":"80","name":"signer manifest signing throws for empty key"},{"id":"81","name":"signer manifest signing rejects signature that is too short"},{"id":"82","name":"signer manifest signing rejects signature that is too long"},{"id":"83","name":"signer manifest signing rejects empty signature"},{"id":"84","name":"signer manifest signing rejects public key that is too short"},{"id":"85","name":"signer manifest signing rejects public key that is too long"},{"id":"86","name":"signer manifest signing rejects empty public key"},{"id":"87","name":"signer shard signing produces valid signatures"},{"id":"88","name":"signer shard signing rejects tampered header"},{"id":"89","name":"signer shard signing throws with correct error message and code for invalid key length (too short)"},{"id":"90","name":"signer shard signing throws for key that is too long"},{"id":"91","name":"signer shard signing throws for empty key"},{"id":"92","name":"signer shard signing rejects signature that is too short"},{"id":"93","name":"signer shard signing rejects signature that is too long"},{"id":"94","name":"signer shard signing rejects empty signature"},{"id":"95","name":"signer shard signing rejects public key that is too short"},{"id":"96","name":"signer shard signing rejects public key that is too long"},{"id":"97","name":"signer shard signing rejects empty public key"},{"id":"98","name":"signer context signing works with custom context"},{"id":"99","name":"signer context signing throws with correct error message and code for invalid key length (too short)"},{"id":"100","name":"signer context signing throws for key that is too long"},{"id":"101","name":"signer context signing throws for empty key"},{"id":"102","name":"signer context signing rejects signature that is too short"},{"id":"103","name":"signer context signing rejects signature that is too long"},{"id":"104","name":"signer context signing rejects empty signature"},{"id":"105","name":"signer context signing rejects public key that is too short"},{"id":"106","name":"signer context signing rejects public key that is too long"},{"id":"107","name":"signer context signing rejects empty public key"},{"id":"108","name":"signer context signing returns false when verifyWithContext crypto throws"},{"id":"109","name":"signer domain separation shard signature is NOT valid when verified with empty context via signWithContext"},{"id":"110","name":"signer domain separation shard signature is valid only with correct internal context"},{"id":"111","name":"signer domain separation manifest signature is NOT valid when verified with empty context"},{"id":"112","name":"signer domain separation manifest and shard signatures are not interchangeable"},{"id":"113","name":"signer manifest edge cases (catch blocks) returns false for invalid signature length in verifyManifest"},{"id":"114","name":"signer manifest edge cases (catch blocks) returns false when verifyManifest crypto throws"},{"id":"115","name":"signer shard edge cases (catch blocks) returns false when verifyShard crypto throws"},{"id":"116","name":"signer mocked verification errors returns false when verifyManifest internal crypto throws"},{"id":"117","name":"signer mocked verification errors returns false when verifyShard internal crypto throws"},{"id":"118","name":"signer mocked verification errors returns false when verifyWithContext internal crypto throws"},{"id":"119","name":"signer length validation guards (mutation testing) verifyManifest length guards rejects 63-byte signature without calling libsodium"},{"id":"120","name":"signer length validation guards (mutation testing) verifyManifest length guards rejects 65-byte signature without calling libsodium"},{"id":"121","name":"signer length validation guards (mutation testing) verifyManifest length guards rejects 31-byte public key without calling libsodium"},{"id":"122","name":"signer length validation guards (mutation testing) verifyManifest length guards rejects 33-byte public key without calling libsodium"},{"id":"123","name":"signer length validation guards (mutation testing) verifyShard length guards rejects 63-byte signature without calling libsodium"},{"id":"124","name":"signer length validation guards (mutation testing) verifyShard length guards rejects 65-byte signature without calling libsodium"},{"id":"125","name":"signer length validation guards (mutation testing) verifyShard length guards rejects 31-byte public key without calling libsodium"},{"id":"126","name":"signer length validation guards (mutation testing) verifyShard length guards rejects 33-byte public key without calling libsodium"},{"id":"127","name":"signer length validation guards (mutation testing) verifyWithContext length guards rejects 63-byte signature without calling libsodium"},{"id":"128","name":"signer length validation guards (mutation testing) verifyWithContext length guards rejects 65-byte signature without calling libsodium"},{"id":"129","name":"signer length validation guards (mutation testing) verifyWithContext length guards rejects 31-byte public key without calling libsodium"},{"id":"130","name":"signer length validation guards (mutation testing) verifyWithContext length guards rejects 33-byte public key without calling libsodium"}],"source":"import { describe, it, expect, beforeAll, vi, afterEach } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { signManifest, verifyManifest, signShard, verifyShard, signWithContext, verifyWithContext } from '../src/signer';\r\nimport { CryptoErrorCode } from '../src/types';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('signer', () => {\r\n  const keypair = sodium.crypto_sign_keypair();\r\n  const manifest = new TextEncoder().encode('{\"test\": \"manifest\"}');\r\n  const header = sodium.randombytes_buf(64);\r\n  const ciphertext = sodium.randombytes_buf(100);\r\n\r\n  describe('manifest signing', () => {\r\n    it('produces valid signatures', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      expect(verifyManifest(manifest, sig, keypair.publicKey)).toBe(true);\r\n    });\r\n\r\n    it('rejects tampered manifest', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      const tampered = new Uint8Array(manifest);\r\n      tampered[0] ^= 0xff;\r\n      expect(verifyManifest(tampered, sig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects wrong public key', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      const other = sodium.crypto_sign_keypair();\r\n      expect(verifyManifest(manifest, sig, other.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('throws with correct error message and code for invalid key length (too short)', () => {\r\n      const shortKey = new Uint8Array(32);\r\n      expect(() => signManifest(manifest, shortKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 32/\r\n      );\r\n      try {\r\n        signManifest(manifest, shortKey);\r\n      } catch (e: unknown) {\r\n        expect((e as { code: string }).code).toBe(CryptoErrorCode.INVALID_KEY_LENGTH);\r\n      }\r\n    });\r\n\r\n    it('throws with correct error message for invalid key length (too long)', () => {\r\n      const longKey = new Uint8Array(128);\r\n      expect(() => signManifest(manifest, longKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 128/\r\n      );\r\n    });\r\n\r\n    it('throws for empty key', () => {\r\n      const emptyKey = new Uint8Array(0);\r\n      expect(() => signManifest(manifest, emptyKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 0/\r\n      );\r\n    });\r\n\r\n    it('rejects signature that is too short', () => {\r\n      const shortSig = new Uint8Array(32);\r\n      expect(verifyManifest(manifest, shortSig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects signature that is too long', () => {\r\n      const longSig = new Uint8Array(128);\r\n      expect(verifyManifest(manifest, longSig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects empty signature', () => {\r\n      const emptySig = new Uint8Array(0);\r\n      expect(verifyManifest(manifest, emptySig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects public key that is too short', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      const shortPubKey = new Uint8Array(16);\r\n      expect(verifyManifest(manifest, sig, shortPubKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects public key that is too long', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      const longPubKey = new Uint8Array(64);\r\n      expect(verifyManifest(manifest, sig, longPubKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects empty public key', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      const emptyPubKey = new Uint8Array(0);\r\n      expect(verifyManifest(manifest, sig, emptyPubKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('shard signing', () => {\r\n    it('produces valid signatures', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      expect(verifyShard(header, ciphertext, sig, keypair.publicKey)).toBe(true);\r\n    });\r\n\r\n    it('rejects tampered header', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      const tampered = new Uint8Array(header);\r\n      tampered[0] ^= 0xff;\r\n      expect(verifyShard(tampered, ciphertext, sig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('throws with correct error message and code for invalid key length (too short)', () => {\r\n      const shortKey = new Uint8Array(32);\r\n      expect(() => signShard(header, ciphertext, shortKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 32/\r\n      );\r\n      try {\r\n        signShard(header, ciphertext, shortKey);\r\n      } catch (e: unknown) {\r\n        expect((e as { code: string }).code).toBe(CryptoErrorCode.INVALID_KEY_LENGTH);\r\n      }\r\n    });\r\n\r\n    it('throws for key that is too long', () => {\r\n      const longKey = new Uint8Array(128);\r\n      expect(() => signShard(header, ciphertext, longKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 128/\r\n      );\r\n    });\r\n\r\n    it('throws for empty key', () => {\r\n      const emptyKey = new Uint8Array(0);\r\n      expect(() => signShard(header, ciphertext, emptyKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 0/\r\n      );\r\n    });\r\n\r\n    it('rejects signature that is too short', () => {\r\n      const shortSig = new Uint8Array(32);\r\n      expect(verifyShard(header, ciphertext, shortSig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects signature that is too long', () => {\r\n      const longSig = new Uint8Array(128);\r\n      expect(verifyShard(header, ciphertext, longSig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects empty signature', () => {\r\n      const emptySig = new Uint8Array(0);\r\n      expect(verifyShard(header, ciphertext, emptySig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects public key that is too short', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      const shortPubKey = new Uint8Array(16);\r\n      expect(verifyShard(header, ciphertext, sig, shortPubKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects public key that is too long', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      const longPubKey = new Uint8Array(64);\r\n      expect(verifyShard(header, ciphertext, sig, longPubKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects empty public key', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      const emptyPubKey = new Uint8Array(0);\r\n      expect(verifyShard(header, ciphertext, sig, emptyPubKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('context signing', () => {\r\n    it('works with custom context', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const ctx = 'MyApp_v1';\r\n      const sig = signWithContext(data, ctx, keypair.privateKey);\r\n      expect(verifyWithContext(data, sig, ctx, keypair.publicKey)).toBe(true);\r\n      expect(verifyWithContext(data, sig, 'WrongContext', keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('throws with correct error message and code for invalid key length (too short)', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const shortKey = new Uint8Array(32);\r\n      expect(() => signWithContext(data, 'ctx', shortKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 32/\r\n      );\r\n      try {\r\n        signWithContext(data, 'ctx', shortKey);\r\n      } catch (e: unknown) {\r\n        expect((e as { code: string }).code).toBe(CryptoErrorCode.INVALID_KEY_LENGTH);\r\n      }\r\n    });\r\n\r\n    it('throws for key that is too long', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const longKey = new Uint8Array(128);\r\n      expect(() => signWithContext(data, 'ctx', longKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 128/\r\n      );\r\n    });\r\n\r\n    it('throws for empty key', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const emptyKey = new Uint8Array(0);\r\n      expect(() => signWithContext(data, 'ctx', emptyKey)).toThrowError(\r\n        /Signing secret key must be 64 bytes, got 0/\r\n      );\r\n    });\r\n\r\n    it('rejects signature that is too short', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const shortSig = new Uint8Array(32);\r\n      expect(verifyWithContext(data, shortSig, 'ctx', keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects signature that is too long', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const longSig = new Uint8Array(128);\r\n      expect(verifyWithContext(data, longSig, 'ctx', keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects empty signature', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const emptySig = new Uint8Array(0);\r\n      expect(verifyWithContext(data, emptySig, 'ctx', keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects public key that is too short', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const sig = signWithContext(data, 'ctx', keypair.privateKey);\r\n      expect(verifyWithContext(data, sig, 'ctx', new Uint8Array(16))).toBe(false);\r\n    });\r\n\r\n    it('rejects public key that is too long', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const sig = signWithContext(data, 'ctx', keypair.privateKey);\r\n      expect(verifyWithContext(data, sig, 'ctx', new Uint8Array(64))).toBe(false);\r\n    });\r\n\r\n    it('rejects empty public key', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const sig = signWithContext(data, 'ctx', keypair.privateKey);\r\n      expect(verifyWithContext(data, sig, 'ctx', new Uint8Array(0))).toBe(false);\r\n    });\r\n\r\n    it('returns false when verifyWithContext crypto throws', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      // Create a signature that looks valid but is garbage\r\n      const fakeSig = sodium.randombytes_buf(64);\r\n      expect(verifyWithContext(data, fakeSig, 'ctx', keypair.publicKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('domain separation', () => {\r\n    it('shard signature is NOT valid when verified with empty context via signWithContext', () => {\r\n      // This test kills the L13 mutation: SHARD_SIGN_CONTEXT → empty string\r\n      // If SHARD_SIGN_CONTEXT were empty, the shard signature would be verifiable with empty context\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      const shardData = new Uint8Array(header.length + ciphertext.length);\r\n      shardData.set(header);\r\n      shardData.set(ciphertext, header.length);\r\n\r\n      // The shard uses 'Mosaic_Shard_v1' context - verify it does NOT work with empty context\r\n      const validWithEmpty = verifyWithContext(shardData, sig, '', keypair.publicKey);\r\n      expect(validWithEmpty).toBe(false);\r\n    });\r\n\r\n    it('shard signature is valid only with correct internal context', () => {\r\n      // Verify shard signatures use the specific context 'Mosaic_Shard_v1'\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      const shardData = new Uint8Array(header.length + ciphertext.length);\r\n      shardData.set(header);\r\n      shardData.set(ciphertext, header.length);\r\n\r\n      // Should work with exact context\r\n      const validWithCorrectContext = verifyWithContext(shardData, sig, 'Mosaic_Shard_v1', keypair.publicKey);\r\n      expect(validWithCorrectContext).toBe(true);\r\n\r\n      // Should NOT work with wrong context\r\n      const validWithWrongContext = verifyWithContext(shardData, sig, 'Wrong_Context', keypair.publicKey);\r\n      expect(validWithWrongContext).toBe(false);\r\n    });\r\n\r\n    it('manifest signature is NOT valid when verified with empty context', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n\r\n      // Verify it does NOT work with empty context\r\n      const validWithEmpty = verifyWithContext(manifest, sig, '', keypair.publicKey);\r\n      expect(validWithEmpty).toBe(false);\r\n    });\r\n\r\n    it('manifest and shard signatures are not interchangeable', () => {\r\n      // Sign data as manifest\r\n      const manifestSig = signManifest(manifest, keypair.privateKey);\r\n\r\n      // Should not verify as shard\r\n      const validAsShard = verifyShard(manifest, new Uint8Array(0), manifestSig, keypair.publicKey);\r\n      expect(validAsShard).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('manifest edge cases (catch blocks)', () => {\r\n    it('returns false for invalid signature length in verifyManifest', () => {\r\n      const invalidSig = new Uint8Array(32); // Should be 64\r\n      expect(verifyManifest(manifest, invalidSig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('returns false when verifyManifest crypto throws', () => {\r\n      const fakeSig = sodium.randombytes_buf(64);\r\n      expect(verifyManifest(manifest, fakeSig, keypair.publicKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('shard edge cases (catch blocks)', () => {\r\n    it('returns false when verifyShard crypto throws', () => {\r\n      // Create a signature that looks valid length but is garbage\r\n      const fakeSig = sodium.randombytes_buf(64);\r\n      expect(verifyShard(header, ciphertext, fakeSig, keypair.publicKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('mocked verification errors', () => {\r\n    afterEach(() => {\r\n      vi.restoreAllMocks();\r\n    });\r\n\r\n    it('returns false when verifyManifest internal crypto throws', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      const originalFn = sodium.crypto_sign_verify_detached;\r\n      sodium.crypto_sign_verify_detached = vi.fn(() => {\r\n        throw new Error('Simulated verification failure');\r\n      }) as typeof sodium.crypto_sign_verify_detached;\r\n      \r\n      try {\r\n        expect(verifyManifest(manifest, sig, keypair.publicKey)).toBe(false);\r\n      } finally {\r\n        sodium.crypto_sign_verify_detached = originalFn;\r\n      }\r\n    });\r\n\r\n    it('returns false when verifyShard internal crypto throws', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      const originalFn = sodium.crypto_sign_verify_detached;\r\n      sodium.crypto_sign_verify_detached = vi.fn(() => {\r\n        throw new Error('Simulated verification failure');\r\n      }) as typeof sodium.crypto_sign_verify_detached;\r\n      \r\n      try {\r\n        expect(verifyShard(header, ciphertext, sig, keypair.publicKey)).toBe(false);\r\n      } finally {\r\n        sodium.crypto_sign_verify_detached = originalFn;\r\n      }\r\n    });\r\n\r\n    it('returns false when verifyWithContext internal crypto throws', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const sig = signWithContext(data, 'ctx', keypair.privateKey);\r\n      const originalFn = sodium.crypto_sign_verify_detached;\r\n      sodium.crypto_sign_verify_detached = vi.fn(() => {\r\n        throw new Error('Simulated verification failure');\r\n      }) as typeof sodium.crypto_sign_verify_detached;\r\n      \r\n      try {\r\n        expect(verifyWithContext(data, sig, 'ctx', keypair.publicKey)).toBe(false);\r\n      } finally {\r\n        sodium.crypto_sign_verify_detached = originalFn;\r\n      }\r\n    });\r\n  });\r\n\r\n  describe('length validation guards (mutation testing)', () => {\r\n    // These tests verify that length checks happen BEFORE libsodium is called.\r\n    // This kills mutants that change `if (length !== X)` to `if (false)`.\r\n    // We use a spy to confirm crypto is never invoked for invalid lengths.\r\n\r\n    afterEach(() => {\r\n      vi.restoreAllMocks();\r\n    });\r\n\r\n    describe('verifyManifest length guards', () => {\r\n      it('rejects 63-byte signature without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig63 = new Uint8Array(63); // One byte short of SIGNATURE_LENGTH (64)\r\n        \r\n        const result = verifyManifest(manifest, sig63, keypair.publicKey);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 65-byte signature without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig65 = new Uint8Array(65); // One byte over SIGNATURE_LENGTH (64)\r\n        \r\n        const result = verifyManifest(manifest, sig65, keypair.publicKey);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 31-byte public key without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig = signManifest(manifest, keypair.privateKey);\r\n        const pubKey31 = new Uint8Array(31); // One byte short of PUBLIC_KEY_LENGTH (32)\r\n        \r\n        const result = verifyManifest(manifest, sig, pubKey31);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 33-byte public key without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig = signManifest(manifest, keypair.privateKey);\r\n        const pubKey33 = new Uint8Array(33); // One byte over PUBLIC_KEY_LENGTH (32)\r\n        \r\n        const result = verifyManifest(manifest, sig, pubKey33);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n    });\r\n\r\n    describe('verifyShard length guards', () => {\r\n      it('rejects 63-byte signature without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig63 = new Uint8Array(63);\r\n        \r\n        const result = verifyShard(header, ciphertext, sig63, keypair.publicKey);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 65-byte signature without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig65 = new Uint8Array(65);\r\n        \r\n        const result = verifyShard(header, ciphertext, sig65, keypair.publicKey);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 31-byte public key without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig = signShard(header, ciphertext, keypair.privateKey);\r\n        const pubKey31 = new Uint8Array(31);\r\n        \r\n        const result = verifyShard(header, ciphertext, sig, pubKey31);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 33-byte public key without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig = signShard(header, ciphertext, keypair.privateKey);\r\n        const pubKey33 = new Uint8Array(33);\r\n        \r\n        const result = verifyShard(header, ciphertext, sig, pubKey33);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n    });\r\n\r\n    describe('verifyWithContext length guards', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const ctx = 'test_context';\r\n\r\n      it('rejects 63-byte signature without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig63 = new Uint8Array(63);\r\n        \r\n        const result = verifyWithContext(data, sig63, ctx, keypair.publicKey);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 65-byte signature without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig65 = new Uint8Array(65);\r\n        \r\n        const result = verifyWithContext(data, sig65, ctx, keypair.publicKey);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 31-byte public key without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig = signWithContext(data, ctx, keypair.privateKey);\r\n        const pubKey31 = new Uint8Array(31);\r\n        \r\n        const result = verifyWithContext(data, sig, ctx, pubKey31);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n\r\n      it('rejects 33-byte public key without calling libsodium', () => {\r\n        const spy = vi.spyOn(sodium, 'crypto_sign_verify_detached');\r\n        const sig = signWithContext(data, ctx, keypair.privateKey);\r\n        const pubKey33 = new Uint8Array(33);\r\n        \r\n        const result = verifyWithContext(data, sig, ctx, pubKey33);\r\n        \r\n        expect(result).toBe(false);\r\n        expect(spy).not.toHaveBeenCalled();\r\n      });\r\n    });\r\n  });\r\n});\r\n"},"tests/integration.test.ts":{"tests":[{"id":"131","name":"integration: user registration flow derives and unwraps consistent account key"},{"id":"132","name":"integration: user registration flow derives different keys with different passwords"},{"id":"133","name":"integration: user registration flow derives identity keypair from account key"},{"id":"134","name":"integration: album creation and photo upload encrypts and decrypts photo shards"},{"id":"135","name":"integration: album creation and photo upload encrypts multiple shards for a large photo"},{"id":"136","name":"integration: album creation and photo upload signs and verifies manifest"},{"id":"137","name":"integration: album sharing between users owner can share epoch key with recipient"},{"id":"138","name":"integration: album sharing between users recipient can decrypt photos shared by owner"},{"id":"139","name":"integration: album sharing between users rejects bundle from unknown sender"},{"id":"140","name":"integration: album sharing between users rejects bundle for wrong album"},{"id":"141","name":"integration: epoch key rotation old photos encrypted with epoch1 are still readable after rotation"},{"id":"142","name":"integration: epoch key rotation new photos use epoch2 key"},{"id":"143","name":"integration: epoch key rotation remaining member receives epoch2 bundle, removed member does not"},{"id":"144","name":"integration: base64 serialization for API transport round-trips binary data through base64"},{"id":"145","name":"integration: base64 serialization for API transport serializes epoch key bundle for API transport"},{"id":"146","name":"integration: complete photo lifecycle simulates full photo upload → sync → view flow"}],"source":"/**\r\n * Crypto Integration Tests\r\n *\r\n * These tests verify complete cryptographic workflows end-to-end,\r\n * simulating real-world usage patterns:\r\n * - User registration and key derivation\r\n * - Album creation with epoch keys\r\n * - Photo upload with shard encryption\r\n * - Album sharing between users\r\n * - Photo sync and decryption\r\n * - Epoch key rotation\r\n */\r\n\r\nimport { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport {\r\n  // Key derivation\r\n  deriveKeys,\r\n  unwrapAccountKey,\r\n  generateSalts,\r\n  getArgon2Params,\r\n  // Identity\r\n  deriveIdentityKeypair,\r\n  // Epoch keys\r\n  generateEpochKey,\r\n  // Envelope encryption\r\n  encryptShard,\r\n  decryptShard,\r\n  verifyShard,\r\n  // Signing\r\n  signManifest,\r\n  verifyManifest,\r\n  // Sharing\r\n  sealAndSignBundle,\r\n  verifyAndOpenBundle,\r\n  createEpochKeyBundle,\r\n  // Utils\r\n  memzero,\r\n  sha256,\r\n  toBase64,\r\n  fromBase64,\r\n  type DerivedKeys,\r\n  type IdentityKeypair,\r\n  type EpochKey,\r\n  ShardTier,\r\n} from '../src';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('integration: user registration flow', () => {\r\n  it('derives and unwraps consistent account key', async () => {\r\n    const password = 'correct-horse-battery-staple';\r\n    const { userSalt, accountSalt } = generateSalts();\r\n    const params = getArgon2Params();\r\n\r\n    // First derivation - generates random L2 account key\r\n    const keys1 = await deriveKeys(password, userSalt, accountSalt, params);\r\n    const accountKeyWrapped = keys1.accountKeyWrapped;\r\n\r\n    // Store the account key for comparison\r\n    const originalAccountKey = new Uint8Array(keys1.accountKey);\r\n\r\n    // Second login - unwrap the stored account key\r\n    const unwrappedKey = await unwrapAccountKey(\r\n      password,\r\n      userSalt,\r\n      accountSalt,\r\n      accountKeyWrapped,\r\n      params\r\n    );\r\n\r\n    // Unwrapped key should match original\r\n    expect(unwrappedKey).toEqual(originalAccountKey);\r\n\r\n    // Clean up\r\n    memzero(keys1.masterKey);\r\n    memzero(keys1.rootKey);\r\n    memzero(keys1.accountKey);\r\n    memzero(unwrappedKey);\r\n  });\r\n\r\n  it('derives different keys with different passwords', async () => {\r\n    const { userSalt, accountSalt } = generateSalts();\r\n    const params = getArgon2Params();\r\n\r\n    const keys1 = await deriveKeys('password1', userSalt, accountSalt, params);\r\n    const keys2 = await deriveKeys('password2', userSalt, accountSalt, params);\r\n\r\n    expect(keys1.accountKey).not.toEqual(keys2.accountKey);\r\n\r\n    memzero(keys1.masterKey);\r\n    memzero(keys1.rootKey);\r\n    memzero(keys1.accountKey);\r\n    memzero(keys2.masterKey);\r\n    memzero(keys2.rootKey);\r\n    memzero(keys2.accountKey);\r\n  });\r\n\r\n  it('derives identity keypair from account key', async () => {\r\n    const password = 'test-password';\r\n    const { userSalt, accountSalt } = generateSalts();\r\n    const params = getArgon2Params();\r\n\r\n    const keys = await deriveKeys(password, userSalt, accountSalt, params);\r\n    const identity = deriveIdentityKeypair(keys.accountKey);\r\n\r\n    // Identity should have both Ed25519 and X25519 keypairs\r\n    expect(identity.ed25519.publicKey).toHaveLength(32);\r\n    expect(identity.ed25519.secretKey).toHaveLength(64);\r\n    expect(identity.x25519.publicKey).toHaveLength(32);\r\n    expect(identity.x25519.secretKey).toHaveLength(32);\r\n\r\n    // Should derive same identity from same account key\r\n    const identity2 = deriveIdentityKeypair(keys.accountKey);\r\n    expect(identity2.ed25519.publicKey).toEqual(identity.ed25519.publicKey);\r\n\r\n    memzero(keys.masterKey);\r\n    memzero(keys.rootKey);\r\n    memzero(keys.accountKey);\r\n    memzero(identity.ed25519.secretKey);\r\n    memzero(identity.x25519.secretKey);\r\n    memzero(identity2.ed25519.secretKey);\r\n    memzero(identity2.x25519.secretKey);\r\n  });\r\n});\r\n\r\ndescribe('integration: album creation and photo upload'
