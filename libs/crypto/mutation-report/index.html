s wrapSymmetricKey validation accepts exactly 32-byte key (boundary)"},{"id":"270","name":"keybox symmetric key helpers unwrapSymmetricKey validation rejects wrapped key that unwraps to less than 32 bytes"},{"id":"271","name":"keybox symmetric key helpers unwrapSymmetricKey validation rejects wrapped key that unwraps to more than 32 bytes"},{"id":"272","name":"keybox symmetric key helpers unwrapSymmetricKey validation includes actual and expected length in error message"},{"id":"273","name":"keybox symmetric key helpers unwrapSymmetricKey validation throws with INVALID_KEY_LENGTH error code"},{"id":"274","name":"keybox symmetric key helpers unwrapSymmetricKey validation accepts wrapped key that unwraps to exactly 32 bytes"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { wrapKey, unwrapKey, wrapSymmetricKey, unwrapSymmetricKey } from '../src/keybox';\r\nimport { CryptoError, CryptoErrorCode, NONCE_SIZE, TAG_SIZE, KEY_SIZE } from '../src/types';\r\n\r\n// MIN_WRAPPED_LENGTH = NONCE_SIZE + TAG_SIZE + 1 = 24 + 16 + 1 = 41\r\nconst MIN_WRAPPED_LENGTH = NONCE_SIZE + TAG_SIZE + 1;\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('keybox', () => {\r\n  const wrapper = sodium.randombytes_buf(32);\r\n  const key = sodium.randombytes_buf(32);\r\n\r\n  it('round-trips wrap/unwrap', () => {\r\n    const wrapped = wrapKey(key, wrapper);\r\n    const unwrapped = unwrapKey(wrapped, wrapper);\r\n    expect(unwrapped).toEqual(key);\r\n  });\r\n\r\n  it('produces different ciphertext each time (random nonce)', () => {\r\n    const wrapped1 = wrapKey(key, wrapper);\r\n    const wrapped2 = wrapKey(key, wrapper);\r\n    expect(wrapped1).not.toEqual(wrapped2);\r\n  });\r\n\r\n  it('fails unwrap with wrong wrapper key', () => {\r\n    const wrapped = wrapKey(key, wrapper);\r\n    const wrongWrapper = sodium.randombytes_buf(32);\r\n    expect(() => unwrapKey(wrapped, wrongWrapper)).toThrow();\r\n  });\r\n\r\n  it('fails unwrap with corrupted ciphertext', () => {\r\n    const wrapped = wrapKey(key, wrapper);\r\n    wrapped[30] ^= 0xff; // Corrupt a byte\r\n    expect(() => unwrapKey(wrapped, wrapper)).toThrow();\r\n  });\r\n\r\n  describe('wrapKey validation', () => {\r\n    it('rejects wrapper key shorter than 32 bytes', () => {\r\n      const shortWrapper = new Uint8Array(16);\r\n      expect(() => wrapKey(key, shortWrapper)).toThrow(CryptoError);\r\n    });\r\n\r\n    it('rejects wrapper key longer than 32 bytes', () => {\r\n      const longWrapper = new Uint8Array(64);\r\n      expect(() => wrapKey(key, longWrapper)).toThrow(CryptoError);\r\n    });\r\n\r\n    it('includes actual and expected length in error message', () => {\r\n      const shortWrapper = new Uint8Array(16);\r\n      expect(() => wrapKey(key, shortWrapper)).toThrow(/Wrapper key must be 32 bytes, got 16/);\r\n    });\r\n\r\n    it('throws with INVALID_KEY_LENGTH error code', () => {\r\n      const shortWrapper = new Uint8Array(16);\r\n      try {\r\n        wrapKey(key, shortWrapper);\r\n        expect.fail('should have thrown');\r\n      } catch (e) {\r\n        expect(e).toBeInstanceOf(CryptoError);\r\n        expect((e as CryptoError).code).toBe(CryptoErrorCode.INVALID_KEY_LENGTH);\r\n      }\r\n    });\r\n  });\r\n\r\n  describe('unwrapKey validation', () => {\r\n    it('rejects wrapper key shorter than 32 bytes', () => {\r\n      const wrapped = wrapKey(key, wrapper);\r\n      const shortWrapper = new Uint8Array(16);\r\n      expect(() => unwrapKey(wrapped, shortWrapper)).toThrow(CryptoError);\r\n    });\r\n\r\n    it('rejects wrapper key longer than 32 bytes', () => {\r\n      const wrapped = wrapKey(key, wrapper);\r\n      const longWrapper = new Uint8Array(64);\r\n      expect(() => unwrapKey(wrapped, longWrapper)).toThrow(CryptoError);\r\n    });\r\n\r\n    it('includes actual and expected length in wrapper error message', () => {\r\n      const wrapped = wrapKey(key, wrapper);\r\n      const shortWrapper = new Uint8Array(16);\r\n      expect(() => unwrapKey(wrapped, shortWrapper)).toThrow(/Wrapper key must be 32 bytes, got 16/);\r\n    });\r\n\r\n    it('rejects wrapped data shorter than MIN_WRAPPED_LENGTH', () => {\r\n      // MIN_WRAPPED_LENGTH - 1 = 40 bytes should fail\r\n      const tooShort = new Uint8Array(MIN_WRAPPED_LENGTH - 1);\r\n      expect(() => unwrapKey(tooShort, wrapper)).toThrow(CryptoError);\r\n    });\r\n\r\n    it('accepts wrapped data exactly MIN_WRAPPED_LENGTH bytes', () => {\r\n      // Wrap a 1-byte key - result is nonce(24) + ciphertext(1+16) = 41 = MIN_WRAPPED_LENGTH\r\n      const oneByteKey = new Uint8Array([0x42]);\r\n      const wrapped = wrapKey(oneByteKey, wrapper);\r\n      expect(wrapped.length).toBe(MIN_WRAPPED_LENGTH);\r\n      const unwrapped = unwrapKey(wrapped, wrapper);\r\n      expect(unwrapped).toEqual(oneByteKey);\r\n    });\r\n\r\n    it('rejects wrapped data at MIN_WRAPPED_LENGTH - 1 boundary', () => {\r\n      // 40 bytes is just under the minimum, should fail\r\n      const justUnder = new Uint8Array(40);\r\n      expect(() => unwrapKey(justUnder, wrapper)).toThrow(CryptoError);\r\n    });\r\n\r\n    it('includes actual and minimum length in short data error message', () => {\r\n      const tooShort = new Uint8Array(30);\r\n      expect(() => unwrapKey(tooShort, wrapper)).toThrow(/Wrapped key too short: 30 bytes, minimum 41/);\r\n    });\r\n\r\n    it('includes authentication failed message for tampered data', () => {\r\n      const wrapped = wrapKey(key, wrapper);\r\n      wrapped[30] ^= 0xff; // Corrupt a byte\r\n      expect(() => unwrapKey(wrapped, wrapper)).toThrow(/Failed to unwrap key - authentication failed/);\r\n    });\r\n\r\n    it('throws DECRYPTION_FAILED for short wrapped data', () => {\r\n      const tooShort = new Uint8Array(30);\r\n      try {\r\n        unwrapKey(tooShort, wrapper);\r\n        expect.fail('should have thrown');\r\n      } catch (e) {\r\n        expect(e).toBeInstanceOf(CryptoError);\r\n        expect((e as CryptoError).code).toBe(CryptoErrorCode.DECRYPTION_FAILED);\r\n      }\r\n    });\r\n  });\r\n\r\n  describe('symmetric key helpers', () => {\r\n    it('round-trips wrapSymmetricKey/unwrapSymmetricKey', () => {\r\n      const wrapped = wrapSymmetricKey(key, wrapper);\r\n      const unwrapped = unwrapSymmetricKey(wrapped, wrapper);\r\n      expect(unwrapped).toEqual(key);\r\n    });\r\n\r\n    describe('wrapSymmetricKey validation', () => {\r\n      it('rejects key shorter than 32 bytes', () => {\r\n        const shortKey = new Uint8Array(16);\r\n        expect(() => wrapSymmetricKey(shortKey, wrapper)).toThrow(CryptoError);\r\n      });\r\n\r\n      it('rejects key longer than 32 bytes', () => {\r\n        const longKey = new Uint8Array(64);\r\n        expect(() => wrapSymmetricKey(longKey, wrapper)).toThrow(CryptoError);\r\n      });\r\n\r\n      it('includes actual and expected length in error message', () => {\r\n        const shortKey = new Uint8Array(16);\r\n        expect(() => wrapSymmetricKey(shortKey, wrapper)).toThrow(/Key must be 32 bytes, got 16/);\r\n      });\r\n\r\n      it('throws with INVALID_KEY_LENGTH error code', () => {\r\n        const shortKey = new Uint8Array(16);\r\n        try {\r\n          wrapSymmetricKey(shortKey, wrapper);\r\n          expect.fail('should have thrown');\r\n        } catch (e) {\r\n          expect(e).toBeInstanceOf(CryptoError);\r\n          expect((e as CryptoError).code).toBe(CryptoErrorCode.INVALID_KEY_LENGTH);\r\n        }\r\n      });\r\n\r\n      it('accepts exactly 32-byte key (boundary)', () => {\r\n        const exactKey = sodium.randombytes_buf(32);\r\n        expect(() => wrapSymmetricKey(exactKey, wrapper)).not.toThrow();\r\n      });\r\n    });\r\n\r\n    describe('unwrapSymmetricKey validation', () => {\r\n      it('rejects wrapped key that unwraps to less than 32 bytes', () => {\r\n        const shortKey = new Uint8Array(16);\r\n        const wrapped = wrapKey(shortKey, wrapper);\r\n        expect(() => unwrapSymmetricKey(wrapped, wrapper)).toThrow(CryptoError);\r\n      });\r\n\r\n      it('rejects wrapped key that unwraps to more than 32 bytes', () => {\r\n        const longKey = new Uint8Array(64);\r\n        const wrapped = wrapKey(longKey, wrapper);\r\n        expect(() => unwrapSymmetricKey(wrapped, wrapper)).toThrow(CryptoError);\r\n      });\r\n\r\n      it('includes actual and expected length in error message', () => {\r\n        const shortKey = new Uint8Array(16);\r\n        const wrapped = wrapKey(shortKey, wrapper);\r\n        expect(() => unwrapSymmetricKey(wrapped, wrapper)).toThrow(/Unwrapped key expected to be 32 bytes, got 16/);\r\n      });\r\n\r\n      it('throws with INVALID_KEY_LENGTH error code', () => {\r\n        const shortKey = new Uint8Array(16);\r\n        const wrapped = wrapKey(shortKey, wrapper);\r\n        try {\r\n          unwrapSymmetricKey(wrapped, wrapper);\r\n          expect.fail('should have thrown');\r\n        } catch (e) {\r\n          expect(e).toBeInstanceOf(CryptoError);\r\n          expect((e as CryptoError).code).toBe(CryptoErrorCode.INVALID_KEY_LENGTH);\r\n        }\r\n      });\r\n\r\n      it('accepts wrapped key that unwraps to exactly 32 bytes', () => {\r\n        const exactKey = sodium.randombytes_buf(32);\r\n        const wrapped = wrapKey(exactKey, wrapper);\r\n        const unwrapped = unwrapSymmetricKey(wrapped, wrapper);\r\n        expect(unwrapped.length).toBe(32);\r\n        expect(unwrapped).toEqual(exactKey);\r\n      });\r\n    });\r\n  });\r\n});\r\n"},"tests/epochs.test.ts":{"tests":[{"id":"275","name":"epochs generates valid epoch keys with tiered keys"},{"id":"276","name":"epochs generates different keys each time"},{"id":"277","name":"epochs derives consistent tier keys from seed"},{"id":"278","name":"epochs serializes epoch key public info"},{"id":"279","name":"epochs round-trips wrap/unwrap"},{"id":"280","name":"epochs rotates epoch with incremented id"},{"id":"281","name":"epochs validates epoch key structure"},{"id":"282","name":"epochs validates epochId is a number (kills typeof mutation)"},{"id":"283","name":"epochs accepts epochId=0 as valid (kills boundary mutation)"},{"id":"284","name":"epochs rejects invalid seed length in deriveTierKeys"},{"id":"285","name":"epochs getTierKey returns thumbKey for THUMB tier"},{"id":"286","name":"epochs getTierKey returns previewKey for PREVIEW tier"},{"id":"287","name":"epochs getTierKey returns fullKey for ORIGINAL tier"},{"id":"288","name":"epochs getTierKey throws for invalid tier"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { generateEpochKey, serializeEpochKeyPublic, wrapEpochKey, unwrapEpochKey, rotateEpochKey, isValidEpochKey, deriveTierKeys, getTierKey } from '../src/epochs';\r\nimport { ShardTier } from '../src/types';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('epochs', () => {\r\n  const wrapper = sodium.randombytes_buf(32);\r\n\r\n  it('generates valid epoch keys with tiered keys', () => {\r\n    const epoch = generateEpochKey(1);\r\n    expect(epoch.epochId).toBe(1);\r\n    expect(epoch.epochSeed.length).toBe(32);\r\n    expect(epoch.thumbKey.length).toBe(32);\r\n    expect(epoch.previewKey.length).toBe(32);\r\n    expect(epoch.fullKey.length).toBe(32);\r\n    expect(epoch.signKeypair.publicKey.length).toBe(32);\r\n    expect(epoch.signKeypair.secretKey.length).toBe(64);\r\n    expect(isValidEpochKey(epoch)).toBe(true);\r\n  });\r\n\r\n  it('generates different keys each time', () => {\r\n    const e1 = generateEpochKey(1);\r\n    const e2 = generateEpochKey(1);\r\n    expect(e1.epochSeed).not.toEqual(e2.epochSeed);\r\n    expect(e1.thumbKey).not.toEqual(e2.thumbKey);\r\n    expect(e1.fullKey).not.toEqual(e2.fullKey);\r\n  });\r\n\r\n  it('derives consistent tier keys from seed', () => {\r\n    const epoch = generateEpochKey(1);\r\n    const derived = deriveTierKeys(epoch.epochSeed);\r\n    expect(derived.thumbKey).toEqual(epoch.thumbKey);\r\n    expect(derived.previewKey).toEqual(epoch.previewKey);\r\n    expect(derived.fullKey).toEqual(epoch.fullKey);\r\n  });\r\n\r\n  it('serializes epoch key public info', () => {\r\n    const epoch = generateEpochKey(5);\r\n    const serialized = serializeEpochKeyPublic(epoch);\r\n    expect(serialized.epochId).toBe(5);\r\n    expect(typeof serialized.signPublicKey).toBe('string');\r\n  });\r\n\r\n  it('round-trips wrap/unwrap', () => {\r\n    const epoch = generateEpochKey(5);\r\n    const wrapped = wrapEpochKey(epoch, wrapper);\r\n    const unwrapped = unwrapEpochKey(wrapped.epochId, wrapped.signPublicKey, wrapped.wrapped, wrapper);\r\n    \r\n    expect(unwrapped.epochId).toBe(epoch.epochId);\r\n    expect(unwrapped.epochSeed).toEqual(epoch.epochSeed);\r\n    expect(unwrapped.thumbKey).toEqual(epoch.thumbKey);\r\n    expect(unwrapped.previewKey).toEqual(epoch.previewKey);\r\n    expect(unwrapped.fullKey).toEqual(epoch.fullKey);\r\n    expect(unwrapped.signKeypair.publicKey).toEqual(epoch.signKeypair.publicKey);\r\n    expect(unwrapped.signKeypair.secretKey).toEqual(epoch.signKeypair.secretKey);\r\n  });\r\n\r\n  it('rotates epoch with incremented id', () => {\r\n    const current = generateEpochKey(3);\r\n    const next = rotateEpochKey(current);\r\n    expect(next.epochId).toBe(4);\r\n    expect(next.epochSeed).not.toEqual(current.epochSeed);\r\n    expect(next.fullKey).not.toEqual(current.fullKey);\r\n  });\r\n\r\n  it('validates epoch key structure', () => {\r\n    const valid = generateEpochKey(1);\r\n    expect(isValidEpochKey(valid)).toBe(true);\r\n    \r\n    expect(isValidEpochKey({ ...valid, epochId: -1 })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, epochSeed: new Uint8Array(16) })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, thumbKey: new Uint8Array(16) })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, previewKey: new Uint8Array(16) })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, fullKey: new Uint8Array(16) })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, signKeypair: { ...valid.signKeypair, publicKey: new Uint8Array(16) } })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, signKeypair: { ...valid.signKeypair, secretKey: new Uint8Array(16) } })).toBe(false);\r\n  });\r\n\r\n  it('validates epochId is a number (kills typeof mutation)', () => {\r\n    const valid = generateEpochKey(1);\r\n    \r\n    // Test non-number epochId values - these should all be invalid\r\n    // This kills the mutation: typeof epochKey.epochId !== 'number' → false\r\n    expect(isValidEpochKey({ ...valid, epochId: '1' as unknown as number })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, epochId: undefined as unknown as number })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, epochId: null as unknown as number })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, epochId: {} as unknown as number })).toBe(false);\r\n  });\r\n\r\n  it('accepts epochId=0 as valid (kills boundary mutation)', () => {\r\n    // epochId=0 should be VALID - this kills the mutation: epochId <"+" 0 → epochId <"+"= 0\r\n    const epochZero = generateEpochKey(0);\r\n    expect(epochZero.epochId).toBe(0);\r\n    expect(isValidEpochKey(epochZero)).toBe(true);\r\n  });\r\n\r\n  it('rejects invalid seed length in deriveTierKeys', () => {\r\n    const invalidSeed = new Uint8Array(16); // Should be 32 bytes\r\n    expect(() => deriveTierKeys(invalidSeed)).toThrow('32 bytes');\r\n  });\r\n\r\n  describe('getTierKey', () => {\r\n    it('returns thumbKey for THUMB tier', () => {\r\n      const epoch = generateEpochKey(1);\r\n      const key = getTierKey(epoch, ShardTier.THUMB);\r\n      expect(key).toEqual(epoch.thumbKey);\r\n    });\r\n\r\n    it('returns previewKey for PREVIEW tier', () => {\r\n      const epoch = generateEpochKey(1);\r\n      const key = getTierKey(epoch, ShardTier.PREVIEW);\r\n      expect(key).toEqual(epoch.previewKey);\r\n    });\r\n\r\n    it('returns fullKey for ORIGINAL tier', () => {\r\n      const epoch = generateEpochKey(1);\r\n      const key = getTierKey(epoch, ShardTier.ORIGINAL);\r\n      expect(key).toEqual(epoch.fullKey);\r\n    });\r\n\r\n    it('throws for invalid tier', () => {\r\n      const epoch = generateEpochKey(1);\r\n      expect(() => getTierKey(epoch, 0 as ShardTier)).toThrow('Invalid shard tier');\r\n      expect(() => getTierKey(epoch, 99 as ShardTier)).toThrow('Invalid shard tier');\r\n    });\r\n  });\r\n});\r\n"},"tests/utils.test.ts":{"tests":[{"id":"289","name":"utils concat concatenates multiple arrays"},{"id":"290","name":"utils concat handles empty arrays"},{"id":"291","name":"utils constantTimeEqual returns true for equal arrays"},{"id":"292","name":"utils constantTimeEqual returns false for different arrays"},{"id":"293","name":"utils constantTimeEqual returns false for different lengths"},{"id":"294","name":"utils sha256 produces consistent hashes"},{"id":"295","name":"utils sha256 produces different hashes for different data"},{"id":"296","name":"utils sha256Sync produces consistent hashes"},{"id":"297","name":"utils sha256Sync returns a non-empty base64url string"},{"id":"298","name":"utils sha256Sync produces different hashes for different data"},{"id":"299","name":"utils sha256Sync handles empty input"},{"id":"300","name":"utils randomBytes generates bytes of correct length"},{"id":"301","name":"utils randomBytes generates different values each time"},{"id":"302","name":"utils base64 round-trip encodes and decodes correctly"},{"id":"303","name":"utils memzero zeros buffer contents"},{"id":"304","name":"utils toBytes and fromBytes converts string to bytes and back"},{"id":"305","name":"utils toBytes and fromBytes handles empty string"},{"id":"306","name":"utils toBytes and fromBytes handles unicode characters"},{"id":"307","name":"utils toBytes and fromBytes fromBytes decodes known UTF-8 byte sequence"},{"id":"308","name":"utils toBytes and fromBytes fromBytes handles multi-byte UTF-8 sequences"},{"id":"309","name":"utils toBytes and fromBytes fromBytes is the inverse of toBytes"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { concat, constantTimeEqual, sha256, sha256Sync, memzero, randomBytes, toBase64, fromBase64, toBytes, fromBytes } from '../src/utils';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('utils', () => {\r\n  describe('concat', () => {\r\n    it('concatenates multiple arrays', () => {\r\n      const a = new Uint8Array([1, 2]);\r\n      const b = new Uint8Array([3, 4, 5]);\r\n      const c = new Uint8Array([6]);\r\n      expect(concat(a, b, c)).toEqual(new Uint8Array([1, 2, 3, 4, 5, 6]));\r\n    });\r\n\r\n    it('handles empty arrays', () => {\r\n      expect(concat()).toEqual(new Uint8Array(0));\r\n      expect(concat(new Uint8Array([1]), new Uint8Array(0))).toEqual(new Uint8Array([1]));\r\n    });\r\n  });\r\n\r\n  describe('constantTimeEqual', () => {\r\n    it('returns true for equal arrays', () => {\r\n      const a = new Uint8Array([1, 2, 3]);\r\n      const b = new Uint8Array([1, 2, 3]);\r\n      expect(constantTimeEqual(a, b)).toBe(true);\r\n    });\r\n\r\n    it('returns false for different arrays', () => {\r\n      expect(constantTimeEqual(new Uint8Array([1, 2, 3]), new Uint8Array([1, 2, 4]))).toBe(false);\r\n    });\r\n\r\n    it('returns false for different lengths', () => {\r\n      expect(constantTimeEqual(new Uint8Array([1, 2]), new Uint8Array([1, 2, 3]))).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('sha256', () => {\r\n    it('produces consistent hashes', async () => {\r\n      const data = new Uint8Array([1, 2, 3, 4, 5]);\r\n      const hash1 = await sha256(data);\r\n      const hash2 = await sha256(data);\r\n      expect(hash1).toBe(hash2);\r\n    });\r\n\r\n    it('produces different hashes for different data', async () => {\r\n      const hash1 = await sha256(new Uint8Array([1, 2, 3]));\r\n      const hash2 = await sha256(new Uint8Array([1, 2, 4]));\r\n      expect(hash1).not.toBe(hash2);\r\n    });\r\n  });\r\n\r\n  describe('sha256Sync', () => {\r\n    it('produces consistent hashes', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      expect(sha256Sync(data)).toBe(sha256Sync(data));\r\n    });\r\n\r\n    it('returns a non-empty base64url string', () => {\r\n      const data = new Uint8Array([1, 2, 3, 4, 5]);\r\n      const hash = sha256Sync(data);\r\n      // Must be a non-empty string\r\n      expect(typeof hash).toBe('string');\r\n      expect(hash.length).toBeGreaterThan(0);\r\n      // SHA256 produces 32 bytes = 43 base64url chars (no padding)\r\n      expect(hash.length).toBe(43);\r\n      // Verify it's valid base64url (no + or / or =)\r\n      expect(hash).toMatch(/^[A-Za-z0-9_-]+$/);\r\n    });\r\n\r\n    it('produces different hashes for different data', () => {\r\n      const hash1 = sha256Sync(new Uint8Array([1, 2, 3]));\r\n      const hash2 = sha256Sync(new Uint8Array([1, 2, 4]));\r\n      expect(hash1).not.toBe(hash2);\r\n    });\r\n\r\n    it('handles empty input', () => {\r\n      const hash = sha256Sync(new Uint8Array(0));\r\n      expect(typeof hash).toBe('string');\r\n      expect(hash.length).toBe(43);\r\n    });\r\n  });\r\n\r\n  describe('randomBytes', () => {\r\n    it('generates bytes of correct length', () => {\r\n      expect(randomBytes(16).length).toBe(16);\r\n      expect(randomBytes(32).length).toBe(32);\r\n    });\r\n\r\n    it('generates different values each time', () => {\r\n      const a = randomBytes(32);\r\n      const b = randomBytes(32);\r\n      expect(constantTimeEqual(a, b)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('base64 round-trip', () => {\r\n    it('encodes and decodes correctly', () => {\r\n      const original = randomBytes(32);\r\n      const encoded = toBase64(original);\r\n      const decoded = fromBase64(encoded);\r\n      expect(decoded).toEqual(original);\r\n    });\r\n  });\r\n\r\n  describe('memzero', () => {\r\n    it('zeros buffer contents', () => {\r\n      const buf = new Uint8Array([1, 2, 3, 4]);\r\n      memzero(buf);\r\n      expect(buf).toEqual(new Uint8Array([0, 0, 0, 0]));\r\n    });\r\n  });\r\n\r\n  describe('toBytes and fromBytes', () => {\r\n    it('converts string to bytes and back', () => {\r\n      const original = 'Hello, World! 🌍';\r\n      const bytes = toBytes(original);\r\n      const restored = fromBytes(bytes);\r\n      expect(restored).toBe(original);\r\n    });\r\n\r\n    it('handles empty string', () => {\r\n      const empty = '';\r\n      const bytes = toBytes(empty);\r\n      expect(bytes.length).toBe(0);\r\n      expect(fromBytes(bytes)).toBe(empty);\r\n    });\r\n\r\n    it('handles unicode characters', () => {\r\n      const unicode = '日本語テスト';\r\n      const bytes = toBytes(unicode);\r\n      expect(fromBytes(bytes)).toBe(unicode);\r\n    });\r\n\r\n    it('fromBytes decodes known UTF-8 byte sequence', () => {\r\n      // \"Hello\" in UTF-8 bytes\r\n      const helloBytes = new Uint8Array([72, 101, 108, 108, 111]);\r\n      const result = fromBytes(helloBytes);\r\n      expect(result).toBe('Hello');\r\n      expect(typeof result).toBe('string');\r\n      expect(result.length).toBe(5);\r\n    });\r\n\r\n    it('fromBytes handles multi-byte UTF-8 sequences', () => {\r\n      // \"é\" is 0xC3 0xA9 in UTF-8\r\n      const accentBytes = new Uint8Array([0xC3, 0xA9]);\r\n      expect(fromBytes(accentBytes)).toBe('é');\r\n      \r\n      // \"€\" is 0xE2 0x82 0xAC in UTF-8\r\n      const euroBytes = new Uint8Array([0xE2, 0x82, 0xAC]);\r\n      expect(fromBytes(euroBytes)).toBe('€');\r\n    });\r\n\r\n    it('fromBytes is the inverse of toBytes', () => {\r\n      const testStrings = ['', 'a', 'abc', 'Hello World', '日本語', '🎉🎊🎁'];\r\n      for (const str of testStrings) {\r\n        expect(fromBytes(toBytes(str))).toBe(str);\r\n      }\r\n    });\r\n  });\r\n});\r\n"}},"projectRoot":"G:\\Github\\Mosaic\\libs\\crypto","config":{"$schema":"https://raw.githubusercontent.com/stryker-mutator/stryker/master/packages/core/schema/stryker-schema.json","packageManager":"npm","testRunner":"vitest","reporters":["html","clear-text","progress"],"htmlReporter":{"fileName":"mutation-report/index.html"},"coverageAnalysis":"perTest","mutate":["src/link-sharing.ts"],"thresholds":{"high":80,"low":60,"break":50},"timeoutMS":60000,"concurrency":4,"disableTypeChecks":"src/**/*.ts","vitest":{"configFile":"vitest.config.ts"},"ignorePatterns":["node_modules","dist","coverage","mutation-report"],"allowConsoleColors":true,"checkers":[],"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":{"baseUrl":"https://dashboard.stryker-mutator.io/api/reports","reportType":"full"},"dryRunOnly":false,"eventReporter":{"baseDir":"reports/mutation/events"},"ignoreStatic":false,"incremental":false,"incrementalFile":"reports/stryker-incremental.json","force":false,"fileLogLevel":"off","inPlace":false,"logLevel":"info","maxConcurrentTestRunners":9007199254740991,"maxTestRunnerReuse":0,"mutator":{"plugins":null,"excludedMutations":[]},"plugins":["@stryker-mutator/*"],"appendPlugins":[],"jsonReporter":{"fileName":"reports/mutation/mutation.json"},"symlinkNodeModules":true,"tempDirName":".stryker-tmp","cleanTempDir":true,"testRunnerNodeArgs":[],"timeoutFactor":1.5,"dryRunTimeoutMinutes":5,"tsconfigFile":"tsconfig.json","warnings":true,"disableBail":false,"allowEmpty":false,"ignorers":[]},"framework":{"name":"StrykerJS","version":"8.7.1","branding":{"homepageUrl":"https://stryker-mutator.io","imageUrl":"data:image/svg+xml;utf8,%3Csvg viewBox='0 0 1458 1458' xmlns='http://www.w3.org/2000/svg' fill-rule='evenodd
