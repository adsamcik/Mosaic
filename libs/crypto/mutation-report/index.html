Envelope Module\r\n *\r\n * Implements the 64-byte shard envelope header format\r\n * with XChaCha20-Poly1305 AEAD encryption.\r\n *\r\n * Header Format (64 bytes):\r\n * - Magic:    4 bytes  \"SGzk\" (0x53 0x47 0x7a 0x6b)\r\n * - Version:  1 byte   0x03\r\n * - EpochID:  4 bytes  Little-endian u32\r\n * - ShardID:  4 bytes  Little-endian u32\r\n * - Nonce:    24 bytes Random (MUST be unique per encryption)\r\n * - Reserved: 27 bytes MUST be zero (validated on decrypt)\r\n */\r\n\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport {\r\n  CryptoError,\r\n  CryptoErrorCode,\r\n  ENVELOPE_HEADER_SIZE,\r\n  ENVELOPE_MAGIC,\r\n  ENVELOPE_VERSION,\r\n  KEY_SIZE,\r\n  NONCE_SIZE,\r\n  MAX_SHARD_SIZE,\r\n  type ShardHeader,\r\n  type EncryptedShard,\r\n} from './types';\r\nimport { sha256 } from './utils';\r\n\r\n/** Magic bytes as Uint8Array */\r\nconst MAGIC_BYTES = new Uint8Array([0x53, 0x47, 0x7a, 0x6b]); // \"SGzk\"\r\n\r\n/** Offset positions in header */\r\nconst OFFSET_MAGIC = 0;\r\nconst OFFSET_VERSION = 4;\r\nconst OFFSET_EPOCH_ID = 5;\r\nconst OFFSET_SHARD_ID = 9;\r\nconst OFFSET_NONCE = 13;\r\nconst OFFSET_RESERVED = 37;\r\n\r\n/** Reserved bytes length */\r\nconst RESERVED_LENGTH = 27;\r\n\r\n/**\r\n * Build a shard envelope header.\r\n * Nonce is always fresh random bytes.\r\n *\r\n * @param epochId - Epoch identifier\r\n * @param shardId - Shard index within photo\r\n * @returns 64-byte header\r\n */\r\nfunction buildHeader(epochId: number, shardId: number): Uint8Array {\r\n  const header = new Uint8Array(ENVELOPE_HEADER_SIZE);\r\n  const view = new DataView(header.buffer);\r\n\r\n  // Magic (4 bytes)\r\n  header.set(MAGIC_BYTES, OFFSET_MAGIC);\r\n\r\n  // Version (1 byte)\r\n  header[OFFSET_VERSION] = ENVELOPE_VERSION;\r\n\r\n  // EpochID (4 bytes, little-endian)\r\n  view.setUint32(OFFSET_EPOCH_ID, epochId, true);\r\n\r\n  // ShardID (4 bytes, little-endian)\r\n  view.setUint32(OFFSET_SHARD_ID, shardId, true);\r\n\r\n  // Nonce (24 bytes) - CRITICAL: );\r\n  }\r\n\r\n  // Generate Ed25519 keypair from seed\r\n  const ed25519 = sodium.crypto_sign_seed_keypair(seed);\r\n\r\n  // Convert Ed25519 to X25519 for encryption\r\n  // libsodium handles clamping internally\r\n  let x25519Secret: Uint8Array;\r\n  let x25519Public: Uint8Array;\r\n\r\n  try {\r\n    x25519Secret = sodium.crypto_sign_ed25519_sk_to_curve25519(ed25519.privateKey);\r\n    x25519Public = sodium.crypto_sign_ed25519_pk_to_curve25519(ed25519.publicKey);\r\n  } catch (error) {\r\n    throw new CryptoError(\r\n      'Failed to convert Ed25519 to X25519',\r\n      CryptoErrorCode.KEY_CONVERSION_FAILED,\r\n      error\r\n    );\r\n  }\r\n\r\n  return {\r\n    ed25519: {\r\n      publicKey: ed25519.publicKey,\r\n      secretKey: ed25519.privateKey,\r\n    },\r\n    x25519: {\r\n      publicKey: x25519Public,\r\n      secretKey: x25519Secret,\r\n    },\r\n  };\r\n}\r\n\r\n/**\r\n * Convert Ed25519 public key to X25519 public key.\r\n * Used for encrypting to a recipient given their Ed25519 identity.\r\n *\r\n * @param ed25519Pub - Ed25519 public key (32 bytes)\r\n * @returns X25519 public key (32 bytes)\r\n * @throws CryptoError if conversion fails\r\n */\r\nexport function ed25519PubToX25519(ed25519Pub: Uint8Array): Uint8Array {\r\n  if (ed25519Pub.length !== ED25519_PUBLIC_KEY_LENGTH) {\r\n    throw new CryptoError(\r\n      `Ed25519 public key must be ${ED25519_PUBLIC_KEY_LENGTH} bytes, got ${ed25519Pub.length}`,\r\n      CryptoErrorCode.INVALID_KEY_LENGTH\r\n    );\r\n  }\r\n\r\n  try {\r\n    return sodium.crypto_sign_ed25519_pk_to_curve25519(ed25519Pub);\r\n  } catch (error) {\r\n    throw new CryptoError(\r\n      'Failed to convert Ed25519 public key to X25519',\r\n      CryptoErrorCode.KEY_CONVERSION_FAILED,\r\n      error\r\n    );\r\n  }\r\n}\r\n\r\n/**\r\n * Convert Ed25519 secret key to X25519 secret key.\r\n * Used for deriving X25519 keypair from stored Ed25519 keypair.\r\n *\r\n * @param ed25519Secret - Ed25519 secret key (64 bytes)\r\n * @returns X25519 secret key (32 bytes)\r\n * @throws CryptoError if conversion fails\r\n */\r\nexport function ed25519SecretToX25519(ed25519Secret: Uint8Array): Uint8Array {\r\n  if (ed25519Secret.length !== ED25519_SECRET_KEY_LENGTH) {\r\n    throw new CryptoError(\r\n      `Ed25519 secret key must be ${ED25519_SECRET_KEY_LENGTH} bytes, got ${ed25519Secret.length}`,\r\n      CryptoErrorCode.INVALID_KEY_LENGTH\r\n    );\r\n  }\r\n\r\n  try {\r\n    return sodium.crypto_sign_ed25519_sk_to_curve25519(ed25519Secret);\r\n  } catch (error) {\r\n    throw new CryptoError(\r\n      'Failed to convert Ed25519 secret key to X25519',\r\n      CryptoErrorCode.KEY_CONVERSION_FAILED,\r\n      error\r\n    );\r\n  }\r\n}\r\n\r\n/**\r\n * Generate a new random 32-byte identity seed.\r\n * Used when creating new accounts.\r\n *\r\n * @returns 32 random bytes suitable for deriveIdentityKeypair\r\n */\r\nexport function generateIdentitySeed(): Uint8Array {\r\n  return randomBytes(KEY_SIZE);\r\n}\r\n\r\n/**\r\n * Generate a random Ed25519 keypair.\r\n * Used when a fresh keypair is needed without a specific seed.\r\n *\r\n * @returns Fresh Ed25519 keypair\r\n */\r\nexport function generateEd25519Keypair(): {\r\n  publicKey: Uint8Array;\r\n  secretKey: Uint8Array;\r\n} {\r\n  const keypair = sodium.crypto_sign_keypair();\r\n  return {\r\n    publicKey: keypair.publicKey,\r\n    secretKey: keypair.privateKey,\r\n  };\r\n}\r\n\r\n/**\r\n * Verify that an Ed25519 public key is valid.\r\n * Attempts conversion to X25519 as a validation check.\r\n *\r\n * @param publicKey - Ed25519 public key to validate\r\n * @returns true if valid\r\n */\r\nexport function isValidEd25519PublicKey(publicKey: Uint8Array): boolean {\r\n  if (publicKey.length !== ED25519_PUBLIC_KEY_LENGTH) {\r\n    return false;\r\n  }\r\n\r\n  try {\r\n    // Try to convert to X25519 as validation\r\n    sodium.crypto_sign_ed25519_pk_to_curve25519(publicKey);\r\n    return true;\r\n  } catch {\r\n    return false;\r\n  }\r\n}\ re for authenticity (proves owner sent it).\r\n */\r\n\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport {\r\n  CryptoError,\r\n  CryptoErrorCode,\r\n  BUNDLE_SIGN_CONTEXT,\r\n  type EpochKeyBundle,\r\n  type SealedBundle,\r\n  type IdentityKeypair,\r\n  type BundleValidationContext,\r\n} from './types';\r\nimport { ed25519PubToX25519 } from './identity';\r\nimport { concat, toBytes, toBase64, fromBase64 } from './utils';\r\n\r\n/** Bundle context for signing */\r\nconst BUNDLE_CONTEXT = toBytes(BUNDLE_SIGN_CONTEXT);\r\n\r\n/** Current bundle format version */\r\nconst BUNDLE_VERSION = 1;\r\n\r\n/**\r\n * Seal and sign an epoch key bundle for a recipient.\r\n *\r\n * The bundle is encrypted using crypto_box_seal (anonymous encryption)\r\n * so only the recipient can open it. The owner signs the sealed ciphertext\r\n * to prove authenticity.\r\n *\r\n * @param bundle - Epoch key bundle to send\r\n * @param recipientEd25519Pub - Recipient's Ed25519 public key (32 bytes)\r\n * @param ownerIdentity - Owner's full identity keypair\r\n * @returns Sealed bundle with signature\r\n * @throws CryptoError if key lengths are invalid\r\n */\r\nexport function sealAndSignBundle(\r\n  bundle: EpochKeyBundle,\r\n  recipientEd25519Pub: Uint8Array,\r\n  ownerIdentity: IdentityKeypair\r\n): SealedBundle {\r\n  if (recipientEd25519Pub.length !== 32) {\r\n    throw new CryptoError(\r\n      `Recipient Ed25519 public key must be 32 bytes, got ${recipientEd25519Pub.length}`,\r\n      CryptoErrorCode.INVALID_KEY_LENGTH\r\n    );\r\n  }\r\n\r\n  // Serialize bundle to JSON with base64 encoding for binary fields\r\n  const bundleJson = JSON.stringify({\r\n    version: bundle.version,\r\n    albumId: bundle.albumId,\r\n    epochId: bundle.epochId,\r\n    recipientPubkey: toBase64(bundle.recipientPubkey),\r\n    readKey: toBase64(bundle.readKey),\r\n    signKeypair: {\r\n      publicKey: toBase64(bundle.signKeypair.publicKey),\r\n      secretKey: toBase64(bundle.signKeypair.secretKey),\r\n    },\r\n  });\r\n  const bundleBytes = toBytes(bundleJson);\r\n\r\n  // Convert recipient Ed25519 to X25519 for encryption\r\n  const recipientX25519Pub = ed25519PubToX25519(recipientEd25519Pub);\r\n\r\n  // Seal (anonymous encryption - only recipient can open)\r\n  const sealed = sodium.crypto_box_seal(bundleBytes, recipientX25519Pub);\r\n\r\n  // Sign the sealed ciphertext with context\r\n  const toSign = concat(BUNDLE_CONTEXT, sealed);\r\n  const signature = sodium.crypto_sign_detached(toSign, ownerIdentity.ed25519.secretKey);\r\n\r\n  return {\r\n    sealed,\r\n    signature,\r\n    sharerPubkey: ownerIdentity.ed25519.publicKey,\r\n  };\r\n}\r\n\r\n/**\r\n * Verify signature and open a sealed epoch key bundle.\r\n *\r\n * SECURITY: Verifies owner signature FIRST before attempting decryption.\r\n * This prevents processing forged bundles.\r\n *\r\n * @param sealed - Sealed bundle ciphertext\r\n * @param signature - Owner's signature\r\n * @param ownerEd25519Pub - Owner's Ed25519 public key (for verification)\r\n * @param myIdentity - Recipient's full identity keypair\r\n * @param expectedContext - Context to validate against (albumId, minEpochId)\r\n * @returns Decrypted and validated epoch key bundle\r\n * @throws CryptoError if signature invalid, decryption fails, or context mismatch\r\n */\r\nexport function verifyAndOpenBundle(\r\n  sealed: Uint8Array,\r\n  signature: Uint8Array,\r\n  ownerEd25519Pub: Uint8Array,\r\n  myIdentity: IdentityKeypair,\r\n  expectedContext: BundleValidationContext\r\n): EpochKeyBundle {\r\n  // Verify signature FIRST - reject forgeries before decryption\r\n  const toVerify = concat(BUNDLE_CONTEXT, sealed);\r\n  if (!sodium.crypto_sign_verify_detached(signature, toVerify, ownerEd25519Pub)) {\r\n    throw new CryptoError(\r\n      'Invalid bundle signature - not from claimed owner',\r\n      CryptoErrorCode.SIGNATURE_INVALID\r\n    );\r\n  }\r\n\r\n  // Open sealed box\r\n  let bundleBytes: Uint8Array;\r\n  try {\r\n    bundle ","status":"Survived","static":true,"testsCompleted":81,"coveredBy":[],"location":{"end":{"column":49,"line":12},"start":{"column":28,"line":12}}}],"source":"/**\r\n * Mosaic Crypto Library - Keybox Module\r\n *\r\n * Key wrapping and unwrapping using XChaCha20-Poly1305.\r\n * Used for encrypting keys with other keys.\r\n */\r\n\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { CryptoError, CryptoErrorCode, KEY_SIZE, NONCE_SIZE, TAG_SIZE } from './types';\r\n\r\n/** Minimum wrapped key length: nonce (24) + tag (16) + at least 1 byte */\r\nconst MIN_WRAPPED_LENGTH = NONCE_SIZE + TAG_SIZE + 1;\r\n\r\n/**\r\n * Wrap (encrypt) a key with another key.\r\n * Uses XChaCha20-Poly1305 with a random 24-byte nonce.\r\n *\r\n * Output format: nonce (24 bytes) || ciphertext || tag (16 bytes)\r\n *\r\n * @param key - Key to wrap (any length)\r\n * @param wrapper - Wrapping key (32 bytes)\r\n * @returns Wrapped key bytes\r\n * @throws CryptoError if wrapper key is not 32 bytes\r\n */\r\nexport function wrapKey(key: Uint8Array, wrapper: Uint8Array): Uint8Array {\r\n  if (wrapper.length !== KEY_SIZE) {\r\n    throw new CryptoError(\r\n      `Wrapper key must be ${KEY_SIZE} bytes, got ${wrapper.length}`,\r\n      CryptoErrorCode.INVALID_KEY_LENGTH\r\n    );\r\n  }\r\n\r\n  // Generate fresh random nonce - CRITICAL for security\r\n  const nonce = sodium.randombytes_buf(NONCE_SIZE);\r\n\r\n  // Encrypt with XChaCha20-Poly1305 (secretbox uses this internally)\r\n  const ciphertext = sodium.crypto_secretbox_easy(key, nonce, wrapper);\r\n\r\n  // Prepend nonce to ciphertext\r\n  const result = new Uint8Array(NONCE_SIZE + ciphertext.length);\r\n  result.set(nonce, 0);\r\n  result.set(ciphertext, NONCE_SIZE);\r\n\r\n  return result;\r\n}\r\n\r\n/**\r\n * Unwrap (decrypt) a wrapped key.\r\n *\r\n * @param wrapped - Wrapped key from wrapKey()\r\n * @param wrapper - Wrapping key (32 bytes)\r\n * @returns Unwrapped key bytes\r\n * @throws CryptoError if decryption fails or inputs are invalid\r\n */\r\nexport function unwrapKey(wrapped: Uint8Array, wrapper: Uint8Array): Uint8Array {\r\n  if (wrapper.length !== KEY_SIZE) {\r\n    throw new CryptoError(\r\n      `Wrapper key must be ${KEY_SIZE} bytes, got ${wrapper.length}`,\r\n      CryptoErrorCode.INVALID_KEY_LENGTH\r\n    );\r\n  }\r\n\r\n  if (wrapped.length <"+" MIN_WRAPPED_LENGTH) {\r\n    throw new CryptoError(\r\n      `Wrapped key too short: ${wrapped.length} bytes, minimum ${MIN_WRAPPED_LENGTH}`,\r\n      CryptoErrorCode.DECRYPTION_FAILED\r\n    );\r\n  }\r\n\r\n  const nonce = wrapped.slice(0, NONCE_SIZE);\r\n  const ciphertext = wrapped.slice(NONCE_SIZE);\r\n\r\n  try {\r\n    const plaintext = sodium.crypto_secretbox_open_easy(ciphertext, nonce, wrapper);\r\n    return plaintext;\r\n  } catch {\r\n    throw new CryptoError(\r\n      'Failed to unwrap key - authentication failed',\r\n      CryptoErrorCode.DECRYPTION_FAILED\r\n    );\r\n  }\r\n}\r\n\r\n/**\r\n * Wrap a 32-byte symmetric key with another 32-byte key.\r\n * Convenience function that validates both keys are 32 bytes.\r\n *\r\n * @param key - Key to wrap (32 bytes)\r\n * @param wrapper - Wrapping key (32 bytes)\r\n * @returns Wrapped key bytes\r\n */\r\nexport function wrapSymmetricKey(key: Uint8Array, wrapper: Uint8Array): Uint8Array {\r\n  if (key.length !== KEY_SIZE) {\r\n    throw new CryptoError(\r\n      `Key must be ${KEY_SIZE} bytes, got ${key.length}`,\r\n      CryptoErrorCode.INVALID_KEY_LENGTH\r\n    );\r\n  }\r\n  return wrapKey(key, wrapper);\r\n}\r\n\r\n/**\r\n * Unwrap a 32-byte symmetric key.\r\n * Convenience function that validates the unwrapped key is 32 bytes.\r\n *\r\n * @param wrapped - Wrapped key\r\n * @param wrapper - Wrapping key (32 bytes)\r\n * @returns Unwrapped key (32 bytes)\r\n */\r\nexport function unwrapSymmetricKey(wrapped: Uint8Array, wrapper: Uint8Array): Uint8Array {\r\n  const key = unwrapKey(wrapped, wrapper);\r\n  if (key.length !== KEY_SIZE) {\r\n    throw new CryptoError(\r\n      `Unwrapped key expected to be ${KEY_SIZE} bytes, got ${key.length}`,\r\n      CryptoErrorCode.INVALID_KEY_LENGTH\r\n    );\r\n  }\r\n  return key;\r\n}\r\n"}},"schemaVersion":"1.0","thresholds":{"high":80,"low":60,"break":50},"testFiles":{"tests/integration.test.ts":{"tests":[{"id":"0","name":"integration: user registration flow derives and unwraps consistent account key"},{"id":"1","name":"integration: user registration flow derives different keys with different passwords"},{"id":"2","name":"integration: user registration flow derives identity keypair from account key"},{"id":"3","name":"integration: album creation and photo upload encrypts and decrypts photo shards"},{"id":"4","name":"integration: album creation and photo upload encrypts multiple shards for a large photo"},{"id":"5","name":"integration: album creation and photo upload signs and verifies manifest"},{"id":"6","name":"integration: album sharing between users owner can share epoch key with recipient"},{"id":"7","name":"integration: album sharing between users recipient can decrypt photos shared by owner"},{"id":"8","name":"integration: album sharing between users rejects bundle from unknown sender"},{"id":"9","name":"integration: album sharing between users rejects bundle for wrong album"},{"id":"10","name":"integration: epoch key rotation old photos encrypted with epoch1 are still readable after rotation"},{"id":"11","name":"integration: epoch key rotation new photos use epoch2 key"},{"id":"12","name":"integration: epoch key rotation remaining member receives epoch2 bundle, removed member does not"},{"id":"13","name":"integration: base64 serialization for API transport round-trips binary data through base64"},{"id":"14","name":"integration: base64 serialization for API transport serializes epoch key bundle for API transport"},{"id":"15","name":"integration: complete photo lifecycle simulates full photo upload → sync → view flow"}],"source":"/**\r\n * Crypto Integration Tests\r\n *\r\n * These tests verify complete cryptographic workflows end-to-end,\r\n * simulating real-world usage patterns:\r\n * - User registration and key derivation\r\n * - Album creation with epoch keys\r\n * - Photo upload with shard encryption\r\n * - Album sharing between users\r\n * - Photo sync and decryption\r\n * - Epoch key rotation\r\n */\r\n\r\nimport { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport {\r\n  // Key derivation\r\n  deriveKeys,\r\n  unwrapAccountKey,\r\n  generateSalts,\r\n  getArgon2Params,\r\n  // Identity\r\n  deriveIdentityKeypair,\r\n  // Epoch keys\r\n  generateEpochKey,\r\n  // Envelope encryption\r\n  encryptShard,\r\n  decryptShard,\r\n  verifyShard,\r\n  // Signing\r\n  signManifest,\r\n  verifyManifest,\r\n  // Sharing\r\n  sealAndSignBundle,\r\n  verifyAndOpenBundle,\r\n  createEpochKeyBundle,\r\n  // Utils\r\n  memzero,\r\n  sha256,\r\n  toBase64,\r\n  fromBase64,\r\n  type DerivedKeys,\r\n  type IdentityKeypair,\r\n  type EpochKey,\r\n} from '../src';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('integration: user registration flow', () => {\r\n  it('derives and unwraps consistent account key', async () => {\r\n    const password = 'correct-horse-battery-staple';\r\n    const { userSalt, accountSalt } = generateSalts();\r\n    const params = getArgon2Params();\r\n\r\n    // First derivation - generates random L2 account key\r\n    const keys1 = await deriveKeys(password, userSalt, accountSalt, params);\r\n    const accountKeyWrapped = keys1.accountKeyWrapped;\r\n\r\n    // Store the account key for comparison\r\n    const originalAccountKey = new Uint8Array(keys1.accountKey);\r\n\r\n    // Second login - unwrap the stored account key\r\n    const unwrappedKey = await unwrapAccountKey(\r\n      password,\r\n      userSalt,\r\n      accountSalt,\r\n      accountKeyWrapped,\r\n      params\r\n    );\r\n\r\n    // Unwrapped key should match original\r\n    expect(unwrappedKey).toEqual(originalAccountKey);\r\n\r\n    // Clean up\r\n    memzero(keys1.masterKey);\r\n    memzero(keys1.rootKey);\r\n    memzero(keys1.accountKey);\r\n    memzero(unwrappedKey);\r\n  });\r\n\r\n  it('derives different keys with different passwords', async () => {\r\n    const { userSalt, accountSalt } = generateSalts();\r\n    const params = getArgon2Params();\r\n\r\n    const keys1 = await deriveKeys('password1', userSalt, accountSalt, params);\r\n    const keys2 = await deriveKeys('password2', userSalt, accountSalt, params);\r\n\r\n    expect(keys1.accountKey).not.toEqual(keys2.accountKey);\r\n\r\n    memzero(keys1.masterKey);\r\n    memzero(keys1.rootKey);\r\n    memzero(keys1.accountKey);\r\n    memzero(keys2.masterKey);\r\n    memzero(keys2.rootKey);\r\n    memzero(keys2.accountKey);\r\n  });\r\n\r\n  it('derives identity keypair from account key', async () => {\r\n    const password = 'test-password';\r\n    const { userSalt, accountSalt } = generateSalts();\r\n    const params = getArgon2Params();\r\n\r\n    const keys = await deriveKeys(password, userSalt, accountSalt, params);\r\n    const identity = deriveIdentityKeypair(keys.accountKey);\r\n\r\n    // Identity should have both Ed25519 and X25519 keypairs\r\n    expect(identity.ed25519.publicKey).toHaveLength(32);\r\n    expect(identity.ed25519.secretKey).toHaveLength(64);\r\n    expect(identity.x25519.publicKey).toHaveLength(32);\r\n    expect(identity.x25519.secretKey).toHaveLength(32);\r\n\r\n    // Should derive same identity from same account key\r\n    const identity2 = deriveIdentityKeypair(keys.accountKey);\r\n    expect(identity2.ed25519.publicKey).toEqual(identity.ed25519.publicKey);\r\n\r\n    memzero(keys.masterKey);\r\n    memzero(keys.rootKey);\r\n    memzero(keys.accountKey);\r\n    memzero(identity.ed25519.secretKey);\r\n    memzero(identity.x25519.secretKey);\r\n    memzero(identity2.ed25519.secretKey);\r\n    memzero(identity2.x25519.secretKey);\r\n  });\r\n});\r\n\r\ndescribe('integration: album creation and photo upload', () => {\r\n  let ownerIdentity: IdentityKeypair;\r\n  let epochKey: EpochKey;\r\n  const albumId = 'album-' + Date.now();\r\n\r\n  beforeAll(async () => {\r\n    // Simulate owner registration\r\n    const { userSalt, accountSalt } = generateSalts();\r\n    const params = getArgon2Params();\r\n    const keys = await deriveKeys('owner-password', userSalt, accountSalt, params);\r\n    ownerIdentity = deriveIdentityKeypair(keys.accountKey);\r\n    memzero(keys.masterKey);\r\n    memzero(keys.rootKey);\r\n    memzero(keys.accountKey);\r\n\r\n    // Create epoch key for new album\r\n    epochKey = generateEpochKey(1);\r\n  });\r\n\r\n  it('encrypts and decrypts photo shards', async () => {\r\n    // Simulate a 1MB photo chunk\r\n    const photoData = sodium.randombytes_buf(1024 * 1024);\r\n\r\n    // Encrypt shard\r\n    const encrypted = await encryptShard(\r\n      photoData,\r\n      epochKey.readKey,\r\n      epochKey.epochId,\r\n      0 // shard index\r\n    );\r\n\r\n    // Verify SHA256 hash\r\n    const isValid = await verifyShard(encrypted.ciphertext, encrypted.sha256);\r\n    expect(isValid).toBe(true);\r\n\r\n    // Decrypt shard\r\n    const decrypted = await decryptShard(encrypted.ciphertext, epochKey.readKey);\r\n    expect(decrypted).toEqual(photoData);\r\n  });\r\n\r\n  it('encrypts multiple shards for a large photo', async () => {\r\n    // Use smaller chunks for faster testing\r\n    const CHUNK_SIZE = 64 * 1024; // 64KB per chunk\r\n    const totalSize = 180 * 1024; // 180KB photo = 3 shards\r\n    const shardCount = Math.ceil(totalSize / CHUNK_SIZE);\r\n\r\n    const shards: Array<"+"{ ciphertext: Uint8Array; sha256: string }> = [];\r\n\r\n    for (let i = 0; i <"+" shardCount; i++) {\r\n      const chunkSize = Math.min(CHUNK_SIZE, totalSize - i * CHUNK_SIZE);\r\n      const chunk = sodium.randombytes_buf(chunkSize);\r\n\r\n      const encrypted = await encryptShard(\r\n        chunk,\r\n        epochKey.readKey,\r\n        epochKey.epochId,\r\n        i\r\n      );\r\n\r\n      shards.push(encrypted);\r\n    }\r\n\r\n    expect(shards).toHaveLength(3);\r\n\r\n    // All shards should have unique hashes\r\n    const hashes = new Set(shards.map((s) => s.sha256));\r\n    expect(hashes.size).toBe(3);\r\n  });\r\n\r\n  it('signs and verifies manifest', async () => {\r\n    // Create manifest metadata\r\n    const manifestData = new TextEncoder().encode(\r\n      JSON.stringify({\r\n        filename: 'photo.jpg',\r\n        mimeType: 'image/jpeg',\r\n        width: 4000,\r\n        height: 3000,\r\n        shardIds: ['shard-1', 'shard-2', 'shard-3'],\r\n      })\r\n    );\r\n\r\n    // Sign manifest with epoch sign key\r\n    const signature = signManifest(manifestData, epochKey.signKeypair.secretKey);\r\n\r\n    // Verify signature\r\n    const isValid = verifyManifest(\r\n      manifestData,\r\n      signature,\r\n      epochKey.signKeypair.publicKey\r\n    );\r\n    expect(isValid).toBe(true);\r\n\r\n    // Tampered manifest should fail verification\r\n    const tamperedManifest = new Uint8Array(manifestData);\r\n    tamperedManifest[0] ^= 0xff;\r\n    const isInvalid = verifyManifest(\r\n      tamperedManifest,\r\n      signature,\r\n      epochKey.signKeypair.publicKey\r\n    );\r\n    expect(isInvalid).toBe(false);\r\n  });\r\n});\r\n\r\ndescribe('integration: album sharing between users', () => {\r\n  let ownerIdentity: IdentityKeypair;\r\n  let recipientIdentity: IdentityKeypair;\r\n  let epochKey: EpochKey;\r\n  const albumId = 'shared-album-' + Date.now();\r\n\r\n  beforeAll(async () => {\r\n    const params = getArgon2Params();\r\n\r\n    // Owner setup\r\n    const ownerSalts = generateSalts();\r\n    const ownerKeys = await deriveKeys(\r\n      'owner-password',\r\n      ownerSalts.userSalt,\r\n      ownerSalts.accountSalt,\r\n      params\r\n    );\r\n    ownerIdentity = deriveIdentityKeypair(ownerKeys.accountKey);\r\n    memzero(ownerKeys.masterKey);\r\n    memzero(ownerKeys.rootKey);\r\n    memzero(ownerKeys.accountKey);\r\n\r\n    // Recipient setup\r\n    const recipientSalts = generateSalts();\r\n    const recipientKeys = await deriveKeys(\r\n      'recipient-password',\r\n      recipientSalts.userSalt,\r\n      recipientSalts.accountSalt,\r\n      params\r\n    );\r\n    recipientIdentity = deriveIdentityKeypair(recipientKeys.accountKey);\r\n    memzero(recipientKeys.masterKey);\r\n    memzero(recipientKeys.rootKey);\r\n    memzero(recipientKeys.accountKey);\r\n\r\n    // Create epoch key\r\n    epochKey = generateEpochKey(1);\r\n  });\r\n\r\n  it('owner can share epoch key with recipient', () => {\r\n    // Owner creates epoch key bundle for recipient\r\n    const bundle = createEpochKeyBundle(\r\n      albumId,\r\n      epochKey.epochId,\r\n      epochKey.readKey,\r\n      epochKey.signKeypair,\r\n      recipientIdentity.ed25519.publicKey\r\n    );\r\n\r\n    // Owner seals and signs the bundle\r\n    const sealed = sealAndSignBundle(\r\n      bundle,\r\n      recipientIdentity.ed25519.publicKey,\r\n      ownerIdentity\r\n    );\r\n\r\n    // Recipient opens the bundle\r\n    const opened = verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      recipientIdentity,\r\n      { albumId, minEpochId: 0 }\r\n    );\r\n\r\n    // Recipient should have the epoch key\r\n    expect(opened.albumId).toBe(albumId);\r\n    expect(opened.epochId).toBe(epochKey.epochId);\r\n    expect(opened.readKey).toEqual(epochKey.readKey);\r\n    expect(opened.signKeypair.publicKey).toEqual(epochKey.signKeypair.publicKey);\r\n  });\r\n\r\n  it('recipient can decrypt photos shared by owner', async () => {\r\n    // Owner encrypts a photo\r\n    const photoData = new TextEncoder().encode('This is a secret photo!');\r\n    const encrypted = await encryptShard(\r\n      photoData,\r\n      epochKey.readKey,\r\n      epochKey.epochId,\r\n      0\r\n    );\r\n\r\n    // Simulate sharing: recipient receives epoch key bundle\r\n    const bundle = createEpochKeyBundle(\r\n      albumId,\r\n      epochKey.epochId,\r\n      epochKey.readKey,\r\n      epochKey.signKeypair,\r\n      recipientIdentity.ed25519.publicKey\r\n    );\r\n    const sealed = sealAndSignBundle(\r\n      bundle,\r\n      recipientIdentity.ed25519.publicKey,\r\n      ownerIdentity\r\n    );\r\n    const opened = verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      recipientIdentity,\r\n      { albumId, minEpochId: 0 }\r\n    );\r\n\r\n    // Recipient decrypts the photo using the shared key\r\n    const decrypted = await decryptShard(encrypted.ciphertext, opened.readKey);\r\n    expect(new TextDecoder().decode(decrypted)).toBe('This is a secret photo!');\r\n  });\r\n\r\n  it('rejects bundle from unknown sender', () => {\r\n    // Attacker tries to send a fake bundle\r\n    const attackerSalts = generateSalts();\r\n    const attackerIdentity = deriveIdentityKeypair(\r\n      sodium.crypto_generichash(32, attackerSalts.userSalt)\r\n    );\r\n\r\n    const fakeBundle = createEpochKeyBundle(\r\n      albumId,\r\n      epochKey.epochId,\r\n      epochKey.readKey,\r\n      epochKey.signKeypair,\r\n      recipientIdentity.ed25519.publicKey\r\n    );\r\n\r\n    const sealed = sealAndSignBundle(\r\n      fakeBundle,\r\n      recipientIdentity.ed25519.publicKey,\r\n      attackerIdentity // Signed by attacker, not owner\r\n    );\r\n\r\n    // Recipient verifies with owner's pubkey - should fail\r\n    expect(() =>\r\n      verifyAndOpenBundle(\r\n        sealed.sealed,\r\n        sealed.signature,\r\n        ownerIdentity.ed25519.publicKey, // Expected owner\r\n        recipientIdentity,\r\n        { albumId, minEpochId: 0 }\r\n      )\r\n    ).toThrow();\r\n  });\r\n\r\n  it('rejects bundle for wrong album', () => {\r\n    const bundle = createEpochKeyBundle(\r\n      albumId,\r\n      epochKey.epochId,\r\n      epochKey.readKey,\r\n      epochKey.signKeypair,\r\n      recipientIdentity.ed25519.publicKey\r\n    );\r\n\r\n    const sealed = sealAndSignBundle(\r\n      bundle,\r\n      recipientIdentity.ed25519.publicKey,\r\n      ownerIdentity\r\n    );\r\n\r\n    // Try to open for different album\r\n    expect(() =>\r\n      verifyAndOpenBundle(\r\n        sealed.sealed,\r\n        sealed.signature,\r\n        ownerIdentity.ed25519.publicKey,\r\n        recipientIdentity,\r\n        { albumId: 'different-album', minEpochId: 0 }\r\n      )\r\n    ).toThrow('albumId');\r\n  });\r\n});\r\n\r\ndescribe('integration: epoch key rotation', () => {\r\n  let ownerIdentity: IdentityKeypair;\r\n  let memberIdentity: IdentityKeypair;\r\n  let removedMemberIdentity: IdentityKeypair;\r\n  let epoch1: EpochKey;\r\n  let epoch2: EpochKey;\r\n  const albumId = 'rotating-album-' + Date.now();\r\n\r\n  beforeAll(async () => {\r\n    const params = getArgon2Params();\r\n\r\n    // Create three users\r\n    for (const password of ['owner', 'member', 'removed-member']) {\r\n      const salts = generateSalts();\r\n      const keys = await deriveKeys(password, salts.userSalt, salts.accountSalt, params);\r\n      const identity = deriveIdentityKeypair(keys.accountKey);\r\n      memzero(keys.masterKey);\r\n      memzero(keys.rootKey);\r\n      memzero(keys.accountKey);\r\n\r\n      if (password === 'owner') ownerIdentity = identity;\r\n      else if (password === 'member') memberIdentity = identity;\r\n      else removedMemberIdentity = identity;\r\n    }\r\n\r\n    // Create initial epoch\r\n    epoch1 = generateEpochKey(1);\r\n    // Create rotated epoch\r\n    epoch2 = generateEpochKey(2);\r\n  });\r\n\r\n  it('old photos encrypted with epoch1 are still readable after rotation', async () => {\r\n    // Encrypt photo with epoch 1\r\n    const oldPhoto = new TextEncoder().encode('Photo from before rotation');\r\n    const encrypted = await encryptShard(oldPhoto, epoch1.readKey, 1, 0);\r\n\r\n    // Rotation happens - epoch 2 created\r\n    // Member should still have epoch 1 key cached\r\n\r\n    // Decrypt with epoch 1 key still works\r\n    const decrypted = await decryptShard(encrypted.ciphertext, epoch1.readKey);\r\n    expect(new TextDecoder().decode(decrypted)).toBe('Photo from before rotation');\r\n  });\r\n\r\n  it('new photos use epoch2 key', async () => {\r\n    // New photo uploaded after rotation\r\n    const newPhoto = new TextEncoder().encode('Photo after rotation');\r\n    const encrypted = await encryptShard(newPhoto, epoch2.readKey, 2, 0);\r\n\r\n    // Cannot decrypt with old epoch key\r\n    await expect(decryptShard(encrypted.ciphertext, epoch1.readKey)).rejects.toThrow();\r\n\r\n    // Can decrypt with new epoch key\r\n    const decrypted = await decryptShard(encrypted.ciphertext, epoch2.readKey);\r\n    expect(new TextDecoder().decode(decrypted)).toBe('Photo after rotation');\r\n  });\r\n\r\n  it('remaining member receives epoch2 bundle, removed member does not', () => {\r\n    // Owner creates epoch2 bundle only for remaining member\r\n    const memberBundle = createEpochKeyBundle(\r\n      albumId,\r\n      epoch2.epochId,\r\n      epoch2.readKey,\r\n      epoch2.signKeypair,\r\n      memberIdentity.ed25519.publicKey\r\n    );\r\n\r\n    const sealed = sealAndSignBundle(\r\n      memberBundle,\r\n      memberIdentity.ed25519.publicKey,\r\n      ownerIdentity\r\n    );\r\n\r\n    // Member can open the bundle\r\n    const opened = verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      memberIdentity,\r\n      { albumId, minEpochId: 0 }\r\n    );\r\n    expect(opened.epochId).toBe(2);\r\n\r\n    // Removed member cannot open (was encrypted for memberIdentity)\r\n    expect(() =>\r\n      verifyAndOpenBundle(\r\n        sealed.sealed,\r\n        sealed.signature,\r\n        ownerIdentity.ed25519.publicKey,\r\n        removedMemberIdentity, // Wrong recipient\r\n        { albumId, minEpochId: 0 }\r\n      )\r\n    ).toThrow();\r\n  });\r\n});\r\n\r\ndescribe('integration: base64 serialization for API transport', () => {\r\n  it('round-trips binary data through base64', async () => {\r\n    const originalData = sodium.randombytes_buf(256);\r\n\r\n    const base64 = toBase64(originalData);\r\n    expect(typeof base64).toBe('string');\r\n\r\n    const recovered = fromBase64(base64);\r\n    expect(recovered).toEqual(originalData);\r\n  });\r\n\r\n  it('serializes epoch key bundle for API transport', () => {\r\n    const epochKey = generateEpochKey(1);\r\n\r\n    // Simulate API payload\r\n    const apiPayload = {\r\n      epochId: epochKey.epochId,\r\n      readKey: toBase64(epochKey.readKey),\r\n      signPubkey: toBase64(epochKey.signKeypair.publicKey),\r\n    };\r\n\r\n    // Verify it's valid JSON\r\n    const json = JSON.stringify(apiPayload);\r\n    const parsed = JSON.parse(json);\r\n\r\n    // Recover binary\r\n    const recoveredReadKey = fromBase64(parsed.readKey);\r\n    expect(recoveredReadKey).toEqual(epochKey.readKey);\r\n  });\r\n});\r\n\r\ndescribe('integration: complete photo lifecycle', () => {\r\n  it('simulates full photo upload → sync → view flow', async () => {\r\n    const params = getArgon2Params();\r\n\r\n    // === STEP 1: User Registration ===\r\n    const { userSalt, accountSalt } = generateSalts();\r\n    const keys = await deriveKeys('user-password', userSalt, accountSalt, params);\r\n    const identity = deriveIdentityKeypair(keys.accountKey);\r\n\r\n    // === STEP 2: Album Creation ===\r\n    const albumId = 'lifecycle-album-' + Date.now();\r\n    const epochKey = generateEpochKey(1);\r\n\r\n    // === STEP 3: Photo Upload ===\r\n    const photoMetadata = {\r\n      id: 'photo-' + Date.now(),\r\n      filename: 'vacation.jpg',\r\n      mimeType: 'image/jpeg',\r\n      width: 4000,\r\n      height: 3000,\r\n      takenAt: new Date().toISOString(),\r\n      tags: ['vacation', '2024'],\r\n    };\r\n\r\n    // Encrypt photo data (simulated 2MB file)\r\n    const photoData = sodium.randombytes_buf(2 * 1024 * 1024);\r\n    const encrypted = await encryptShard(photoData, epochKey.readKey, 1, 0);\r\n\r\n    // Encrypt and sign manifest\r\n    const manifestJson = JSON.stringify(photoMetadata);\r\n    const manifestEncrypted = await encryptShard(\r\n      new TextEncoder().encode(manifestJson),\r\n      epochKey.readKey,\r\n      1,\r\n      0\r\n    );\r\n    const signature = signManifest(\r\n      manifestEncrypted.ciphertext,\r\n      epochKey.signKeypair.secretKey\r\n    );\r\n\r\n    // === STEP 4: Simulate API Storage ===\r\n    const serverRecord = {\r\n      id: photoMetadata.id,\r\n      albumId,\r\n      encryptedMeta: toBase64(manifestEncrypted.ciphertext),\r\n      signature: toBase64(signature),\r\n      signerPubkey: toBase64(epochKey.signKeypair.publicKey),\r\n      shardIds: [encrypted.sha256],\r\n    };\r\n\r\n    // === STEP 5: Sync and Decrypt ===\r\n    // Client receives record from server\r\n    const receivedMeta = fromBase64(serverRecord.encryptedMeta);\r\n    const receivedSig = fromBase64(serverRecord.signature);\r\n    const receivedPubkey = fromBase64(serverRecord.signerPubkey);\r\n\r\n    // Verify signature\r\n    const sigValid = verifyManifest(receivedMeta, receivedSig, receivedPubkey);\r\n    expect(sigValid).toBe(true);\r\n\r\n    // Decrypt manifest\r\n    const decryptedManifest = await decryptShard(receivedMeta, epochKey.readKey);\r\n    const metadata = JSON.parse(new TextDecoder().decode(decryptedManifest));\r\n    expect(metadata.filename).toBe('vacation.jpg');\r\n    expect(metadata.tags).toContain('vacation');\r\n\r\n    // === STEP 6: View Photo ===\r\n    // Download and decrypt shard\r\n    const decryptedPhoto = await decryptShard(encrypted.ciphertext, epochKey.readKey);\r\n    expect(decryptedPhoto).toEqual(photoData);\r\n\r\n    // Cleanup\r\n    memzero(keys.masterKey);\r\n    memzero(keys.rootKey);\r\n    memzero(keys.accountKey);\r\n    memzero(identity.ed25519.secretKey);\r\n    memzero(identity.x25519.secretKey);\r\n    memzero(epochKey.readKey);\r\n    memzero(epochKey.signKeypair.secretKey);\r\n  });\r\n});\r\n"},"tests/identity.test.ts":{"tests":[{"id":"16","name":"identity derives consistent keypairs from same seed"},{"id":"17","name":"identity produces valid Ed25519 signatures"},{"id":"18","name":"identity produces valid X25519 key exchange"},{"id":"19","name":"identity converts Ed25519 pubkey to X25519"},{"id":"20","name":"identity converts Ed25519 secret to X25519"},{"id":"21","name":"identity rejects invalid seed lengths"},{"id":"22","name":"identity rejects invalid Ed25519 pubkey length for conversion"},{"id":"23","name":"identity rejects invalid Ed25519 secret length for conversion"},{"id":"24","name":"identity generates random Ed25519 keypairs"},{"id":"25","name":"identity validates Ed25519 public keys"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { deriveIdentityKeypair, ed25519PubToX25519, ed25519SecretToX25519, generateIdentitySeed, generateEd25519Keypair, isValidEd25519PublicKey } from '../src/identity';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('identity', () => {\r\n  it('derives consistent keypairs from same seed', () => {\r\n    const seed = sodium.randombytes_buf(32);\r\n    const kp1 = deriveIdentityKeypair(seed);\r\n    const kp2 = deriveIdentityKeypair(seed);\r\n    expect(kp1.ed25519.publicKey).toEqual(kp2.ed25519.publicKey);\r\n    expect(kp1.x25519.publicKey).toEqual(kp2.x25519.publicKey);\r\n  });\r\n\r\n  it('produces valid Ed25519 signatures', () => {\r\n    const seed = generateIdentitySeed();\r\n    const kp = deriveIdentityKeypair(seed);\r\n    const message = new Uint8Array([1, 2, 3, 4]);\r\n    const sig = sodium.crypto_sign_detached(message, kp.ed25519.secretKey);\r\n    expect(sodium.crypto_sign_verify_detached(sig, message, kp.ed25519.publicKey)).toBe(true);\r\n  });\r\n\r\n  it('produces valid X25519 key exchange', () => {\r\n    const seed1 = generateIdentitySeed();\r\n    const seed2 = generateIdentitySeed();\r\n    const kp1 = deriveIdentityKeypair(seed1);\r\n    const kp2 = deriveIdentityKeypair(seed2);\r\n    \r\n    const shared1 = sodium.crypto_scalarmult(kp1.x25519.secretKey, kp2.x25519.publicKey);\r\n    const shared2 = sodium.crypto_scalarmult(kp2.x25519.secretKey, kp1.x25519.publicKey);\r\n    expect(shared1).toEqual(shared2);\r\n  });\r\n\r\n  it('converts Ed25519 pubkey to X25519', () => {\r\n    const seed = generateIdentitySeed();\r\n    const kp = deriveIdentityKeypair(seed);\r\n    const converted = ed25519PubToX25519(kp.ed25519.publicKey);\r\n    expect(converted).toEqual(kp.x25519.publicKey);\r\n  });\r\n\r\n  it('converts Ed25519 secret to X25519', () => {\r\n    const seed = generateIdentitySeed();\r\n    const kp = deriveIdentityKeypair(seed);\r\n    const converted = ed25519SecretToX25519(kp.ed25519.secretKey);\r\n    expect(converted).toEqual(kp.x25519.secretKey);\r\n  });\r\n\r\n  it('rejects invalid seed lengths', () => {\r\n    expect(() => deriveIdentityKeypair(new Uint8Array(16))).toThrow();\r\n  });\r\n\r\n  it('rejects invalid Ed25519 pubkey length for conversion', () => {\r\n    expect(() => ed25519PubToX25519(new Uint8Array(16))).toThrow();\r\n  });\r\n\r\n  it('rejects invalid Ed25519 secret length for conversion', () => {\r\n    expect(() => ed25519SecretToX25519(new Uint8Array(16))).toThrow();\r\n  });\r\n\r\n  it('generates random Ed25519 keypairs', () => {\r\n    const kp1 = generateEd25519Keypair();\r\n    const kp2 = generateEd25519Keypair();\r\n    expect(kp1.publicKey.length).toBe(32);\r\n    expect(kp1.secretKey.length).toBe(64);\r\n    expect(kp1.publicKey).not.toEqual(kp2.publicKey);\r\n  });\r\n\r\n  it('validates Ed25519 public keys', () => {\r\n    const seed = generateIdentitySeed();\r\n    const kp = deriveIdentityKeypair(seed);\r\n    expect(isValidEd25519PublicKey(kp.ed25519.publicKey)).toBe(true);\r\n    expect(isValidEd25519PublicKey(new Uint8Array(16))).toBe(false); // Wrong length\r\n  });\r\n\r\n  it('returns false for isValidEd25519PublicKey with invalid key that fails conversion', () => {\r\n    // A 32-byte key that is not a valid Ed25519 public key (all zeros is not on curve)\r\n    const invalidKey = new Uint8Array(32).fill(0);\r\n    expect(isValidEd25519PublicKey(invalidKey)).toBe(false);\r\n  });\r\n\r\n  it('handles ed25519PubToX25519 conversion failure for torsion point', () => {\r\n    // Try with a key that might cause issues - point of small order\r\n    // libsodium should handle this, but we test the error path\r\n    const lowOrderPoint = new Uint8Array(32);\r\n    lowOrderPoint[0] = 1; // Not a valid public key\r\n    \r\n    // This should throw or return false based on libsodium behavior\r\n    // We're testing the error handling path\r\n    try {\r\n      ed25519PubToX25519(lowOrderPoint);\r\n      // If it doesn't throw, the conversion might still be invalid\r\n      // but we've at least exercised the code path\r\n    } catch (e) {\r\n      expect((e as Error).message).toContain('convert');\r\n    }\r\n  });\r\n\r\n  it('handles ed25519SecretToX25519 with valid secret key', () => {\r\n    const seed = generateIdentitySeed();\r\n    const kp = deriveIdentityKeypair(seed);\r\n    // This should work without throwing\r\n    const x25519Secret = ed25519SecretToX25519(kp.ed25519.secretKey);\r\n    expect(x25519Secret.length).toBe(32);\r\n  });\r\n});\r\n"},"tests/keychain.test.ts":{"tests":[{"id":"26","name":"keychain derives consistent keys from same inputs"},{"id":"27","name":"keychain produces different keys for different passwords"},{"id":"28","name":"keychain produces different keys for different salts"},{"id":"29","name":"keychain produces 32-byte keys"},{"id":"30","name":"keychain unwraps account key correctly"},{"id":"31","name":"keychain fails unwrap with wrong password"},{"id":"32","name":"keychain rewraps account key with new password"},{"id":"33","name":"keychain rejects invalid salt lengths"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { deriveKeys, unwrapAccountKey, rewrapAccountKey, generateSalts } from '../src/keychain';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('keychain', () => {\r\n  const password = 'test-password-123';\r\n  const { userSalt, accountSalt } = generateSalts();\r\n  const fastParams = { memory: 1024, iterations: 1, parallelism: 1 }; // Fast for tests\r\n\r\n  it('derives consistent keys from same inputs', async () => {\r\n    const keys1 = await deriveKeys(password, userSalt, accountSalt, fastParams);\r\n    const keys2 = await deriveKeys(password, userSalt, accountSalt, fastParams);\r\n    expect(keys1.masterKey).toEqual(keys2.masterKey);\r\n    expect(keys1.rootKey).toEqual(keys2.rootKey);\r\n  });\r\n\r\n  it('produces different keys for different passwords', async () => {\r\n    const keys1 = await deriveKeys('password1', userSalt, accountSalt, fastParams);\r\n    const keys2 = await deriveKeys('password2', userSalt, accountSalt, fastParams);\r\n    expect(keys1.masterKey).not.toEqual(keys2.masterKey);\r\n  });\r\n\r\n  it('produces different keys for different salts', async () => {\r\n    const { userSalt: salt2 } = generateSalts();\r\n    const keys1 = await deriveKeys(password, userSalt, accountSalt, fastParams);\r\n    const keys2 = await deriveKeys(password, salt2, accountSalt, fastParams);\r\n    expect(keys1.masterKey).not.toEqual(keys2.masterKey);\r\n  });\r\n\r\n  it('produces 32-byte keys', async () => {\r\n    const keys = await deriveKeys(password, userSalt, accountSalt, fastParams);\r\n    expect(keys.masterKey.length).toBe(32);\r\n    expect(keys.rootKey.length).toBe(32);\r\n    expect(keys.accountKey.length).toBe(32);\r\n  });\r\n\r\n  it('unwraps account key correctly', async () => {\r\n    const keys = await deriveKeys(password, userSalt, accountSalt, fastParams);\r\n    const unwrapped = await unwrapAccountKey(password, userSalt, accountSalt, keys.accountKeyWrapped, fastParams);\r\n    expect(unwrapped).toEqual(keys.accountKey);\r\n  });\r\n\r\n  it('fails unwrap with wrong password', async () => {\r\n    const keys = await deriveKeys(password, userSalt, accountSalt, fastParams);\r\n    await expect(unwrapAccountKey('wrong', userSalt, accountSalt, keys.accountKeyWrapped, fastParams)).rejects.toThrow();\r\n  });\r\n\r\n  it('rewraps account key with new password', async () => {\r\n    const keys = await deriveKeys(password, userSalt, accountSalt, fastParams);\r\n    const newWrapped = await rewrapAccountKey(keys.accountKey, 'new-password', userSalt, accountSalt, fastParams);\r\n    const unwrapped = await unwrapAccountKey('new-password', userSalt, accountSalt, newWrapped, fastParams);\r\n    expect(unwrapped).toEqual(keys.accountKey);\r\n  });\r\n\r\n  it('rejects invalid salt lengths', async () => {\r\n    await expect(deriveKeys(password, new Uint8Array(8), accountSalt, fastParams)).rejects.toThrow();\r\n    await expect(deriveKeys(password, userSalt, new Uint8Array(8), fastParams)).rejects.toThrow();\r\n  });\r\n\r\n  it('rejects wrapped account key too short', async () => {\r\n    // Need at least 24 (nonce) + 16 (tag) + 1 (data) = 41 bytes\r\n    const tooShort = new Uint8Array(30);\r\n    await expect(unwrapAccountKey(password, userSalt, accountSalt, tooShort, fastParams)).rejects.toThrow('too short');\r\n  });\r\n\r\n  it('rejects invalid salt lengths for unwrapAccountKey', async () => {\r\n    const keys = await deriveKeys(password, userSalt, accountSalt, fastParams);\r\n    await expect(unwrapAccountKey(password, new Uint8Array(8), accountSalt, keys.accountKeyWrapped, fastParams)).rejects.toThrow();\r\n    await expect(unwrapAccountKey(password, userSalt, new Uint8Array(8), keys.accountKeyWrapped, fastParams)).rejects.toThrow();\r\n  });\r\n\r\n  it('rejects rewrapAccountKey with invalid account key length', async () => {\r\n    const invalidAccountKey = new Uint8Array(16); // Should be 32 bytes\r\n    await expect(rewrapAccountKey(invalidAccountKey, 'new-password', userSalt, accountSalt, fastParams)).rejects.toThrow('32 bytes');\r\n  });\r\n\r\n  it('generates valid random salts', () => {\r\n    const salts1 = generateSalts();\r\n    const salts2 = generateSalts();\r\n    expect(salts1.userSalt.length).toBe(16);\r\n    expect(salts1.accountSalt.length).toBe(16);\r\n    // Should be random (different each time)\r\n    expect(salts1.userSalt).not.toEqual(salts2.userSalt);\r\n    expect(salts1.accountSalt).not.toEqual(salts2.accountSalt);\r\n  });\r\n});\r\n"},"tests/utils.test.ts":{"tests":[{"id":"34","name":"utils concat concatenates multiple arrays"},{"id":"35","name":"utils concat handles empty arrays"},{"id":"36","name":"utils constantTimeEqual returns true for equal arrays"},{"id":"37","name":"utils constantTimeEqual returns false for different arrays"},{"id":"38","name":"utils constantTimeEqual returns false for different lengths"},{"id":"39","name":"utils sha256 produces consistent hashes"},{"id":"40","name":"utils sha256 produces different hashes for different data"},{"id":"41","name":"utils sha256Sync produces consistent hashes"},{"id":"42","name":"utils randomBytes generates bytes of correct length"},{"id":"43","name":"utils randomBytes generates different values each time"},{"id":"44","name":"utils base64 round-trip encodes and decodes correctly"},{"id":"45","name":"utils memzero zeros buffer contents"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { concat, constantTimeEqual, sha256, sha256Sync, memzero, randomBytes, toBase64, fromBase64, toBytes, fromBytes } from '../src/utils';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('utils', () => {\r\n  describe('concat', () => {\r\n    it('concatenates multiple arrays', () => {\r\n      const a = new Uint8Array([1, 2]);\r\n      const b = new Uint8Array([3, 4, 5]);\r\n      const c = new Uint8Array([6]);\r\n      expect(concat(a, b, c)).toEqual(new Uint8Array([1, 2, 3, 4, 5, 6]));\r\n    });\r\n\r\n    it('handles empty arrays', () => {\r\n      expect(concat()).toEqual(new Uint8Array(0));\r\n      expect(concat(new Uint8Array([1]), new Uint8Array(0))).toEqual(new Uint8Array([1]));\r\n    });\r\n  });\r\n\r\n  describe('constantTimeEqual', () => {\r\n    it('returns true for equal arrays', () => {\r\n      const a = new Uint8Array([1, 2, 3]);\r\n      const b = new Uint8Array([1, 2, 3]);\r\n      expect(constantTimeEqual(a, b)).toBe(true);\r\n    });\r\n\r\n    it('returns false for different arrays', () => {\r\n      expect(constantTimeEqual(new Uint8Array([1, 2, 3]), new Uint8Array([1, 2, 4]))).toBe(false);\r\n    });\r\n\r\n    it('returns false for different lengths', () => {\r\n      expect(constantTimeEqual(new Uint8Array([1, 2]), new Uint8Array([1, 2, 3]))).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('sha256', () => {\r\n    it('produces consistent hashes', async () => {\r\n      const data = new Uint8Array([1, 2, 3, 4, 5]);\r\n      const hash1 = await sha256(data);\r\n      const hash2 = await sha256(data);\r\n      expect(hash1).toBe(hash2);\r\n    });\r\n\r\n    it('produces different hashes for different data', async () => {\r\n      const hash1 = await sha256(new Uint8Array([1, 2, 3]));\r\n      const hash2 = await sha256(new Uint8Array([1, 2, 4]));\r\n      expect(hash1).not.toBe(hash2);\r\n    });\r\n  });\r\n\r\n  describe('sha256Sync', () => {\r\n    it('produces consistent hashes', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      expect(sha256Sync(data)).toBe(sha256Sync(data));\r\n    });\r\n  });\r\n\r\n  describe('randomBytes', () => {\r\n    it('generates bytes of correct length', () => {\r\n      expect(randomBytes(16).length).toBe(16);\r\n      expect(randomBytes(32).length).toBe(32);\r\n    });\r\n\r\n    it('generates different values each time', () => {\r\n      const a = randomBytes(32);\r\n      const b = randomBytes(32);\r\n      expect(constantTimeEqual(a, b)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('base64 round-trip', () => {\r\n    it('encodes and decodes correctly', () => {\r\n      const original = randomBytes(32);\r\n      const encoded = toBase64(original);\r\n      const decoded = fromBase64(encoded);\r\n      expect(decoded).toEqual(original);\r\n    });\r\n  });\r\n\r\n  describe('memzero', () => {\r\n    it('zeros buffer contents', () => {\r\n      const buf = new Uint8Array([1, 2, 3, 4]);\r\n      memzero(buf);\r\n      expect(buf).toEqual(new Uint8Array([0, 0, 0, 0]));\r\n    });\r\n  });\r\n\r\n  describe('toBytes and fromBytes', () => {\r\n    it('converts string to bytes and back', () => {\r\n      const original = 'Hello, World! 🌍';\r\n      const bytes = toBytes(original);\r\n      const restored = fromBytes(bytes);\r\n      expect(restored).toBe(original);\r\n    });\r\n\r\n    it('handles empty string', () => {\r\n      const empty = '';\r\n      const bytes = toBytes(empty);\r\n      expect(bytes.length).toBe(0);\r\n      expect(fromBytes(bytes)).toBe(empty);\r\n    });\r\n\r\n    it('handles unicode characters', () => {\r\n      const unicode = '日本語テスト';\r\n      const bytes = toBytes(unicode);\r\n      expect(fromBytes(bytes)).toBe(unicode);\r\n    });\r\n  });\r\n});\r\n"},"tests/sharing.test.ts":{"tests":[{"id":"46","name":"sharing round-trips seal/open"},{"id":"47","name":"sharing rejects invalid signature"},{"id":"48","name":"sharing rejects wrong recipient"},{"id":"49","name":"sharing rejects albumId mismatch"},{"id":"50","name":"sharing rejects old epochId"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { sealAndSignBundle, verifyAndOpenBundle, createEpochKeyBundle } from '../src/sharing';\r\nimport { deriveIdentityKeypair, generateIdentitySeed } from '../src/identity';\r\nimport { generateEpochKey } from '../src/epochs';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('sharing', () => {\r\n  const ownerSeed = generateIdentitySeed();\r\n  const recipientSeed = generateIdentitySeed();\r\n  const ownerIdentity = deriveIdentityKeypair(ownerSeed);\r\n  const recipientIdentity = deriveIdentityKeypair(recipientSeed);\r\n  const epoch = generateEpochKey(1);\r\n  const albumId = 'album-123';\r\n\r\n  const bundle = createEpochKeyBundle(\r\n    albumId,\r\n    epoch.epochId,\r\n    epoch.readKey,\r\n    epoch.signKeypair,\r\n    recipientIdentity.ed25519.publicKey\r\n  );\r\n\r\n  it('round-trips seal/open', () => {\r\n    const sealed = sealAndSignBundle(bundle, recipientIdentity.ed25519.publicKey, ownerIdentity);\r\n    const opened = verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      recipientIdentity,\r\n      { albumId, minEpochId: 0 }\r\n    );\r\n    \r\n    expect(opened.albumId).toBe(albumId);\r\n    expect(opened.epochId).toBe(epoch.epochId);\r\n    expect(opened.readKey).toEqual(epoch.readKey);\r\n  });\r\n\r\n  it('rejects invalid signature', () => {\r\n    const sealed = sealAndSignBundle(bundle, recipientIdentity.ed25519.publicKey, ownerIdentity);\r\n    sealed.signature[0] ^= 0xff;\r\n    \r\n    expect(() => verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      recipientIdentity,\r\n      { albumId, minEpochId: 0 }\r\n    )).toThrow('signature');\r\n  });\r\n\r\n  it('rejects wrong recipient', () => {\r\n    const wrongRecipient = deriveIdentityKeypair(generateIdentitySeed());\r\n    const sealed = sealAndSignBundle(bundle, recipientIdentity.ed25519.publicKey, ownerIdentity);\r\n    \r\n    expect(() => verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      wrongRecipient,\r\n      { albumId, minEpochId: 0 }\r\n    )).toThrow();\r\n  });\r\n\r\n  it('rejects albumId mismatch', () => {\r\n    const sealed = sealAndSignBundle(bundle, recipientIdentity.ed25519.publicKey, ownerIdentity);\r\n    \r\n    expect(() => verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      recipientIdentity,\r\n      { albumId: 'wrong-album', minEpochId: 0 }\r\n    )).toThrow('albumId');\r\n  });\r\n\r\n  it('rejects old epochId', () => {\r\n    const sealed = sealAndSignBundle(bundle, recipientIdentity.ed25519.publicKey, ownerIdentity);\r\n    \r\n    expect(() => verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      recipientIdentity,\r\n      { albumId, minEpochId: 5 }\r\n    )).toThrow('epochId');\r\n  });\r\n\r\n  it('rejects invalid recipient public key length', () => {\r\n    expect(() => sealAndSignBundle(\r\n      bundle,\r\n      new Uint8Array(16), // Wrong length\r\n      ownerIdentity\r\n    )).toThrow('32 bytes');\r\n  });\r\n\r\n  it('rejects recipient binding mismatch', () => {\r\n    // Create a bundle for a different recipient\r\n    const otherRecipient = deriveIdentityKeypair(generateIdentitySeed());\r\n    const bundleForOther = createEpochKeyBundle(\r\n      albumId,\r\n      epoch.epochId,\r\n      epoch.readKey,\r\n      epoch.signKeypair,\r\n      otherRecipient.ed25519.publicKey // Different recipient in bundle\r\n    );\r\n    \r\n    // Seal for the actual recipient but with wrong binding\r\n    const sealed = sealAndSignBundle(bundleForOther, recipientIdentity.ed25519.publicKey, ownerIdentity);\r\n    \r\n    // Try to open - should fail because recipientPubkey in bundle doesn't match\r\n    expect(() => verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      recipientIdentity,\r\n      { albumId, minEpochId: 0 }\r\n    )).toThrow('recipient');\r\n  });\r\n\r\n  it('rejects corrupted bundle JSON', () => {\r\n    // Create sealed bundle\r\n    const sealed = sealAndSignBundle(bundle, recipientIdentity.ed25519.publicKey, ownerIdentity);\r\n    \r\n    // We can't easily corrupt the JSON without breaking the seal first,\r\n    // but we can test by using a manually constructed test.\r\n    // The crypto_box_seal_open will fail for corrupted data, not JSON parse.\r\n    // This test verifies the decrypt failure path is properly exercised.\r\n    sealed.sealed[50] ^= 0xff; // Corrupt sealed data\r\n    \r\n    expect(() => verifyAndOpenBundle(\r\n      sealed.sealed,\r\n      sealed.signature,\r\n      ownerIdentity.ed25519.publicKey,\r\n      recipientIdentity,\r\n      { albumId, minEpochId: 0 }\r\n    )).toThrow(); // Will throw signature error since we also need to re-sign\r\n  });\r\n});\r\n"},"tests/envelope.test.ts":{"tests":[{"id":"51","name":"envelope round-trips encrypt/decrypt"},{"id":"52","name":"envelope includes epochId and shardId in header"},{"id":"53","name":"envelope produces different ciphertext each time (random nonce)"},{"id":"54","name":"envelope fails decrypt with wrong key"},{"id":"55","name":"envelope fails decrypt with corrupted ciphertext"},{"id":"56","name":"envelope fails decrypt with corrupted header (AAD verification)"},{"id":"57","name":"envelope fails if reserved bytes are non-zero"},{"id":"58","name":"envelope produces consistent SHA256 hash"},{"id":"59","name":"envelope rejects invalid key length"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { encryptShard, decryptShard, peekHeader, verifyShard, parseShardHeader } from '../src/envelope';\r\nimport { ENVELOPE_HEADER_SIZE, ENVELOPE_VERSION, MAX_SHARD_SIZE, CryptoErrorCode } from '../src/types';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('envelope', () => {\r\n  const readKey = sodium.randombytes_buf(32);\r\n  const testData = new TextEncoder().encode('Hello, encrypted world!');\r\n\r\n  it('round-trips encrypt/decrypt', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    const decrypted = await decryptShard(ciphertext, readKey);\r\n    expect(decrypted).toEqual(testData);\r\n  });\r\n\r\n  it('includes epochId and shardId in header', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 42, 7);\r\n    const header = peekHeader(ciphertext);\r\n    expect(header.epochId).toBe(42);\r\n    expect(header.shardId).toBe(7);\r\n  });\r\n\r\n  it('produces different ciphertext each time (random nonce)', async () => {\r\n    const { ciphertext: c1 } = await encryptShard(testData, readKey, 1, 0);\r\n    const { ciphertext: c2 } = await encryptShard(testData, readKey, 1, 0);\r\n    expect(c1).not.toEqual(c2);\r\n  });\r\n\r\n  it('fails decrypt with wrong key', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    const wrongKey = sodium.randombytes_buf(32);\r\n    await expect(decryptShard(ciphertext, wrongKey)).rejects.toThrow();\r\n  });\r\n\r\n  it('fails decrypt with corrupted ciphertext', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    ciphertext[ENVELOPE_HEADER_SIZE + 5] ^= 0xff;\r\n    await expect(decryptShard(ciphertext, readKey)).rejects.toThrow();\r\n  });\r\n\r\n  it('fails decrypt with corrupted header (AAD verification)', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    ciphertext[5] ^= 0xff; // Corrupt epochId byte\r\n    await expect(decryptShard(ciphertext, readKey)).rejects.toThrow();\r\n  });\r\n\r\n  it('fails if reserved bytes are non-zero', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    ciphertext[40] = 0x01; // Set a reserved byte\r\n    await expect(decryptShard(ciphertext, readKey)).rejects.toThrow('reserved');\r\n  });\r\n\r\n  it('produces consistent SHA256 hash', async () => {\r\n    const result = await encryptShard(testData, readKey, 1, 0);\r\n    const verified = await verifyShard(result.ciphertext, result.sha256);\r\n    expect(verified).toBe(true);\r\n  });\r\n\r\n  it('rejects invalid key length', async () => {\r\n    await expect(encryptShard(testData, new Uint8Array(16), 1, 0)).rejects.toThrow();\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    await expect(decryptShard(ciphertext, new Uint8Array(16))).rejects.toThrow();\r\n  });\r\n\r\n  it('rejects shard data exceeding MAX_SHARD_SIZE', async () => {\r\n    const oversizedData = new Uint8Array(MAX_SHARD_SIZE + 1);\r\n    await expect(encryptShard(oversizedData, readKey, 1, 0)).rejects.toThrow('too large');\r\n  });\r\n\r\n  it('rejects envelope with no ciphertext (header only)', async () => {\r\n    // Create a valid header but no ciphertext\r\n    const headerOnly = new Uint8Array(ENVELOPE_HEADER_SIZE);\r\n    // Set magic bytes\r\n    headerOnly.set([0x53, 0x47, 0x7a, 0x6b], 0);\r\n    // Set version\r\n    headerOnly[4] = ENVELOPE_VERSION;\r\n    // Epoch, shard, nonce are already zero, reserved is zero\r\n    // Need to set a valid nonce\r\n    headerOnly.set(sodium.randombytes_buf(24), 13);\r\n    \r\n    await expect(decryptShard(headerOnly, readKey)).rejects.toThrow('no ciphertext');\r\n  });\r\n\r\n  it('parseShardHeader returns complete header fields', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 42, 7);\r\n    const header = parseShardHeader(ciphertext);\r\n    expect(header.magic).toBe('SGzk');\r\n    expect(header.version).toBe(ENVELOPE_VERSION);\r\n    expect(header.epochId).toBe(42);\r\n    expect(header.shardId).toBe(7);\r\n    expect(header.nonce.length).toBe(24);\r\n    expect(header.reserved.length).toBe(27);\r\n    // Reserved bytes should all be zero\r\n    for (const byte of header.reserved) {\r\n      expect(byte).toBe(0);\r\n    }\r\n  });\r\n\r\n  it('verifyShard returns false for mismatched hash', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    const wrongHash = 'abcdef1234567890abcdef1234567890abcdef12';\r\n    const verified = await verifyShard(ciphertext, wrongHash);\r\n    expect(verified).toBe(false);\r\n  });\r\n\r\n  it('rejects envelope too short for header', async () => {\r\n    const tooShort = new Uint8Array(32);\r\n    await expect(decryptShard(tooShort, readKey)).rejects.toThrow('too short');\r\n  });\r\n\r\n  it('rejects invalid magic bytes', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    ciphertext[0] = 0x00; // Corrupt first magic byte\r\n    await expect(decryptShard(ciphertext, readKey)).rejects.toThrow('magic');\r\n  });\r\n\r\n  it('rejects unsupported version', async () => {\r\n    const { ciphertext } = await encryptShard(testData, readKey, 1, 0);\r\n    ciphertext[4] = 0xff; // Set unsupported version\r\n    await expect(decryptShard(ciphertext, readKey)).rejects.toThrow('version');\r\n  });\r\n});\r\n"},"tests/epochs.test.ts":{"tests":[{"id":"60","name":"epochs generates valid epoch keys"},{"id":"61","name":"epochs generates different keys each time"},{"id":"62","name":"epochs serializes epoch key public info"},{"id":"63","name":"epochs round-trips wrap/unwrap"},{"id":"64","name":"epochs rotates epoch with incremented id"},{"id":"65","name":"epochs validates epoch key structure"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { generateEpochKey, serializeEpochKeyPublic, wrapEpochKey, unwrapEpochKey, rotateEpochKey, isValidEpochKey } from '../src/epochs';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('epochs', () => {\r\n  const wrapper = sodium.randombytes_buf(32);\r\n\r\n  it('generates valid epoch keys', () => {\r\n    const epoch = generateEpochKey(1);\r\n    expect(epoch.epochId).toBe(1);\r\n    expect(epoch.readKey.length).toBe(32);\r\n    expect(epoch.signKeypair.publicKey.length).toBe(32);\r\n    expect(epoch.signKeypair.secretKey.length).toBe(64);\r\n    expect(isValidEpochKey(epoch)).toBe(true);\r\n  });\r\n\r\n  it('generates different keys each time', () => {\r\n    const e1 = generateEpochKey(1);\r\n    const e2 = generateEpochKey(1);\r\n    expect(e1.readKey).not.toEqual(e2.readKey);\r\n  });\r\n\r\n  it('serializes epoch key public info', () => {\r\n    const epoch = generateEpochKey(5);\r\n    const serialized = serializeEpochKeyPublic(epoch);\r\n    expect(serialized.epochId).toBe(5);\r\n    expect(typeof serialized.signPublicKey).toBe('string');\r\n  });\r\n\r\n  it('round-trips wrap/unwrap', () => {\r\n    const epoch = generateEpochKey(5);\r\n    const wrapped = wrapEpochKey(epoch, wrapper);\r\n    const unwrapped = unwrapEpochKey(wrapped.epochId, wrapped.signPublicKey, wrapped.wrapped, wrapper);\r\n    \r\n    expect(unwrapped.epochId).toBe(epoch.epochId);\r\n    expect(unwrapped.readKey).toEqual(epoch.readKey);\r\n    expect(unwrapped.signKeypair.publicKey).toEqual(epoch.signKeypair.publicKey);\r\n    expect(unwrapped.signKeypair.secretKey).toEqual(epoch.signKeypair.secretKey);\r\n  });\r\n\r\n  it('rotates epoch with incremented id', () => {\r\n    const current = generateEpochKey(3);\r\n    const next = rotateEpochKey(current);\r\n    expect(next.epochId).toBe(4);\r\n    expect(next.readKey).not.toEqual(current.readKey);\r\n  });\r\n\r\n  it('validates epoch key structure', () => {\r\n    const valid = generateEpochKey(1);\r\n    expect(isValidEpochKey(valid)).toBe(true);\r\n    \r\n    expect(isValidEpochKey({ ...valid, epochId: -1 })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, readKey: new Uint8Array(16) })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, signKeypair: { ...valid.signKeypair, publicKey: new Uint8Array(16) } })).toBe(false);\r\n    expect(isValidEpochKey({ ...valid, signKeypair: { ...valid.signKeypair, secretKey: new Uint8Array(16) } })).toBe(false);\r\n  });\r\n});\r\n"},"tests/signer.test.ts":{"tests":[{"id":"66","name":"signer manifest signing produces valid signatures"},{"id":"67","name":"signer manifest signing rejects tampered manifest"},{"id":"68","name":"signer manifest signing rejects wrong public key"},{"id":"69","name":"signer shard signing produces valid signatures"},{"id":"70","name":"signer shard signing rejects tampered header"},{"id":"71","name":"signer context signing works with custom context"},{"id":"72","name":"signer rejects invalid key lengths"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { signManifest, verifyManifest, signShard, verifyShard, signWithContext, verifyWithContext } from '../src/signer';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('signer', () => {\r\n  const keypair = sodium.crypto_sign_keypair();\r\n  const manifest = new TextEncoder().encode('{\"test\": \"manifest\"}');\r\n  const header = sodium.randombytes_buf(64);\r\n  const ciphertext = sodium.randombytes_buf(100);\r\n\r\n  describe('manifest signing', () => {\r\n    it('produces valid signatures', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      expect(verifyManifest(manifest, sig, keypair.publicKey)).toBe(true);\r\n    });\r\n\r\n    it('rejects tampered manifest', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      const tampered = new Uint8Array(manifest);\r\n      tampered[0] ^= 0xff;\r\n      expect(verifyManifest(tampered, sig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects wrong public key', () => {\r\n      const sig = signManifest(manifest, keypair.privateKey);\r\n      const other = sodium.crypto_sign_keypair();\r\n      expect(verifyManifest(manifest, sig, other.publicKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('shard signing', () => {\r\n    it('produces valid signatures', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      expect(verifyShard(header, ciphertext, sig, keypair.publicKey)).toBe(true);\r\n    });\r\n\r\n    it('rejects tampered header', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      const tampered = new Uint8Array(header);\r\n      tampered[0] ^= 0xff;\r\n      expect(verifyShard(tampered, ciphertext, sig, keypair.publicKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('context signing', () => {\r\n    it('works with custom context', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const ctx = 'MyApp_v1';\r\n      const sig = signWithContext(data, ctx, keypair.privateKey);\r\n      expect(verifyWithContext(data, sig, ctx, keypair.publicKey)).toBe(true);\r\n      expect(verifyWithContext(data, sig, 'WrongContext', keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('rejects invalid key length for signWithContext', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      expect(() => signWithContext(data, 'ctx', new Uint8Array(32))).toThrow();\r\n    });\r\n\r\n    it('returns false for invalid signature length in verifyWithContext', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const invalidSig = new Uint8Array(32); // Should be 64\r\n      expect(verifyWithContext(data, invalidSig, 'ctx', keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('returns false for invalid public key length in verifyWithContext', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      const sig = signWithContext(data, 'ctx', keypair.privateKey);\r\n      expect(verifyWithContext(data, sig, 'ctx', new Uint8Array(16))).toBe(false);\r\n    });\r\n\r\n    it('returns false when verifyWithContext crypto throws', () => {\r\n      const data = new Uint8Array([1, 2, 3]);\r\n      // Create a signature that looks valid but is garbage\r\n      const fakeSig = sodium.randombytes_buf(64);\r\n      expect(verifyWithContext(data, fakeSig, 'ctx', keypair.publicKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('shard signing edge cases', () => {\r\n    it('rejects invalid key length for signShard', () => {\r\n      expect(() => signShard(header, ciphertext, new Uint8Array(32))).toThrow();\r\n    });\r\n\r\n    it('returns false for invalid signature length in verifyShard', () => {\r\n      const invalidSig = new Uint8Array(32); // Should be 64\r\n      expect(verifyShard(header, ciphertext, invalidSig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('returns false for invalid public key length in verifyShard', () => {\r\n      const sig = signShard(header, ciphertext, keypair.privateKey);\r\n      expect(verifyShard(header, ciphertext, sig, new Uint8Array(16))).toBe(false);\r\n    });\r\n\r\n    it('returns false when verifyShard crypto throws', () => {\r\n      // Create a signature that looks valid length but is garbage\r\n      const fakeSig = sodium.randombytes_buf(64);\r\n      expect(verifyShard(header, ciphertext, fakeSig, keypair.publicKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  describe('manifest edge cases', () => {\r\n    it('returns false for invalid signature length in verifyManifest', () => {\r\n      const invalidSig = new Uint8Array(32); // Should be 64\r\n      expect(verifyManifest(manifest, invalidSig, keypair.publicKey)).toBe(false);\r\n    });\r\n\r\n    it('returns false when verifyManifest crypto throws', () => {\r\n      const fakeSig = sodium.randombytes_buf(64);\r\n      expect(verifyManifest(manifest, fakeSig, keypair.publicKey)).toBe(false);\r\n    });\r\n  });\r\n\r\n  it('rejects invalid key lengths', () => {\r\n    expect(() => signManifest(manifest, new Uint8Array(32))).toThrow();\r\n    expect(verifyManifest(manifest, new Uint8Array(64), new Uint8Array(16))).toBe(false);\r\n  });\r\n});\r\n"},"tests/keybox.test.ts":{"tests":[{"id":"73","name":"keybox round-trips wrap/unwrap"},{"id":"74","name":"keybox produces different ciphertext each time (random nonce)"},{"id":"75","name":"keybox fails unwrap with wrong wrapper key"},{"id":"76","name":"keybox fails unwrap with corrupted ciphertext"},{"id":"77","name":"keybox rejects wrapper keys not 32 bytes"},{"id":"78","name":"keybox rejects wrapped data too short"},{"id":"79","name":"keybox symmetric key helpers validates key length on wrap"},{"id":"80","name":"keybox symmetric key helpers validates unwrapped key length"}],"source":"import { describe, it, expect, beforeAll } from 'vitest';\r\nimport sodium from 'libsodium-wrappers-sumo';\r\nimport { wrapKey, unwrapKey, wrapSymmetricKey, unwrapSymmetricKey } from '../src/keybox';\r\nimport { CryptoErrorCode } from '../src/types';\r\n\r\nbeforeAll(async () => {\r\n  await sodium.ready;\r\n});\r\n\r\ndescribe('keybox', () => {\r\n  const wrapper = sodium.randombytes_buf(32);\r\n  const key = sodium.randombytes_buf(32);\r\n\r\n  it('round-trips wrap/unwrap', () => {\r\n    const wrapped = wrapKey(key, wrapper);\r\n    const unwrapped = unwrapKey(wrapped, wrapper);\r\n    expect(unwrapped).toEqual(key);\r\n  });\r\n\r\n  it('produces different ciphertext each time (random nonce)', () => {\r\n    const wrapped1 = wrapKey(key, wrapper);\r\n    const wrapped2 = wrapKey(key, wrapper);\r\n    expect(wrapped1).not.toEqual(wrapped2);\r\n  });\r\n\r\n  it('fails unwrap with wrong wrapper key', () => {\r\n    const wrapped = wrapKey(key, wrapper);\r\n    const wrongWrapper = sodium.randombytes_buf(32);\r\n    expect(() => unwrapKey(wrapped, wrongWrapper)).toThrow();\r\n  });\r\n\r\n  it('fails unwrap with corrupted ciphertext', () => {\r\n    const wrapped = wrapKey(key, wrapper);\r\n    wrapped[30] ^= 0xff; // Corrupt a byte\r\n    expect(() => unwrapKey(wrapped, wrapper)).toThrow();\r\n  });\r\n\r\n  it('rejects wrapper keys not 32 bytes', () => {\r\n    expect(() => wrapKey(key, new Uint8Array(16))).toThrow();\r\n    expect(() => unwrapKey(new Uint8Array(50), new Uint8Array(16))).toThrow();\r\n  });\r\n\r\n  it('rejects wrapped data too short', () => {\r\n    expect(() => unwrapKey(new Uint8Array(30), wrapper)).toThrow();\r\n  });\r\n\r\n  describe('symmetric key helpers', () => {\r\n    it('validates key length on wrap', () => {\r\n      expect(() => wrapSymmetricKey(new Uint8Array(16), wrapper)).toThrow();\r\n    });\r\n\r\n    it('validates unwrapped key length', () => {\r\n      const wrapped = wrapKey(new Uint8Array(16), wrapper); // 16 byte key\r\n      expect(() => unwrapSymmetricKey(wrapped, wrapper)).toThrow();\r\n    });\r\n  });\r\n});\r\n"}},"projectRoot":"G:\\Github\\Mosaic\\libs\\crypto","config":{"$schema":"https://raw.githubusercontent.com/stryker-mutator/stryker/master/packages/core/schema/stryker-schema.json","packageManager":"npm","testRunner":"vitest","reporters":["html","clear-text","progress"],"htmlReporter":{"fileName":"mutation-report/index.html"},"coverageAnalysis":"perTest","mutate":["src/**/*.ts","!src/index.ts","!src/mock.ts","!src/argon2-params.ts","!src/types.ts"],"thresholds":{"high":80,"low":60,"break":50},"timeoutMS":60000,"concurrency":4,"disableTypeChecks":"src/**/*.ts","vitest":{"configFile":"vitest.config.ts"},"ignorePatterns":["node_modules","dist","coverage","mutation-report"],"allowConsoleColors":true,"checkers":[],"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":{"baseUrl":"https://dashboard.stryker-mutator.io/api/reports","reportType":"full"},"dryRunOnly":false,"eventReporter":{"baseDir":"reports/mutation/events"},"ignoreStatic":false,"incremental":false,"incrementalFile":"reports/stryker-incremental.json","force":false,"fi
