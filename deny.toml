[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
]
confidence-threshold = 0.93

[bans]
deny = []
highlight = "all"
multiple-versions = "warn"
skip = [
  { crate = "winnow@0.7.15", reason = "Reviewed duplicate from the UniFFI TOML parser stack; keep newer winnow visible for duplicate detection." },
  { crate = "wit-bindgen@0.46.0", reason = "Reviewed duplicate from the UniFFI WASI/getrandom stack; keep newer wit-bindgen visible for duplicate detection." },
]
wildcards = "deny"

[bans.build]
allow-build-scripts = [
  "anyhow",
  "camino",
  "curve25519-dalek",
  "fs-err",
  "generic-array",
  "getrandom",
  "libc",
  "proc-macro2",
  "quote",
  "rustix",
  "rustversion",
  "serde",
  "serde_core",
  "serde_json",
  "wasm-bindgen",
  "wasm-bindgen-shared",
  "wit-bindgen",
  "zmij",
]

[sources]
allow-git = []
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
unknown-git = "deny"
unknown-registry = "deny"
