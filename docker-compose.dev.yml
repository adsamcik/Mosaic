# Mosaic - Development Docker Compose
# Use: docker compose -f docker-compose.dev.yml up

services:
  # PostgreSQL database for development
  postgres:
    image: postgres:17-alpine
    container_name: mosaic-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: mosaic
      POSTGRES_USER: mosaic
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - mosaic-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosaic -d mosaic"]
      interval: 5s
      timeout: 5s
      retries: 5

  # pgAdmin for database management (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mosaic-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mosaic.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    networks:
      - mosaic-dev
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  postgres_data_dev:
    driver: local

networks:
  mosaic-dev:
    driver: bridge
